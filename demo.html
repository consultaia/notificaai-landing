    {/* Alertas de status */}
    {!configured&&<div onClick={onConfig} style={{background:C.yellow+'18',border:'1px solid '+C.yellow+'44',borderRadius:12,padding:'13px 16px',cursor:'pointer'}}>
      <div style={{fontSize:13,fontWeight:700,color:C.yellow}}>Atencao Banco de dados não configurado</div>
      <div style={{fontSize:12,color:C.muted,marginTop:3}}>Toque para conectar o Supabase e ativar persistência.</div>
    </div>}
    {configured&&<div style={{background:C.green+'18',border:'1px solid '+C.green+'44',borderRadius:12,padding:'10px 16px',display:'flex',alignItems:'center',gap:10}}>
      <span>{String.fromCodePoint(9989)}</span><div style={{fontSize:12,color:C.green,fontWeight:600}}>Supabase conectado · {loading?'Carregando...':'Dados reais'}</div>
    </div>}
    {gestorMode&&testMode&&<div style={{background:C.yellow+'18',border:'1px solid '+C.yellow+'44',borderRadius:12,padding:'10px 16px',display:'flex',gap:10}}>
      <span></span><div style={{fontSize:12,color:C.yellow,fontWeight:600}}>Modo TESTE ativo - notificações marcadas como teste</div>
    </div>}

    {/* Cards de métricas principais */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
      <StatCard icon={String.fromCodePoint(128197)} label={mesAtual.charAt(0).toUpperCase()+mesAtual.slice(1)} value={loading?'...':s.total} sub={loading?'':diffLabel} color={diffColor}/>
      <StatCard icon={String.fromCodePoint(127973)} label="Seg. Paciente" value={loading?'...':s.sp} sub={s.total?`${Math.round(s.sp/Math.max(s.total,1)*100)}% do mês`:'-'} color={C.blue}/>
      <StatCard icon={String.fromCodePoint(128203)} label="Administrativas" value={loading?'...':s.adm} sub={s.total?`${Math.round(s.adm/Math.max(s.total,1)*100)}% do mês`:'-'} color={C.purple}/>
    </div>

    {/* Indicadores NSP */}
    {gestorMode&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
      <div onClick={()=>{setFiltroNotif('sentinela');setView('notificacoes');}} style={{background:C.card,border:'1px solid '+(s.sentinela>0?C.red:C.border),borderRadius:10,padding:'10px 8px',textAlign:'center',cursor:'pointer'}}>
        <div style={{fontSize:20,fontWeight:900,color:s.sentinela>0?C.red:C.muted}}>{s.sentinela}</div>
        <div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase',marginTop:2}}>Sentinela</div>
      </div>
      <div onClick={()=>{setFiltroNotif('semRCA');setView('notificacoes');}} style={{background:C.card,border:'1px solid '+(s.semRCA>0?C.yellow:C.border),borderRadius:10,padding:'10px 8px',textAlign:'center',cursor:'pointer'}}>
        <div style={{fontSize:20,fontWeight:900,color:s.semRCA>0?C.yellow:C.muted}}>{s.semRCA}</div>
        <div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase',marginTop:2}}>Sem Análise</div>
      </div>
      <div onClick={()=>setView('saq_dashboard')} style={{background:C.card,border:'1px solid '+C.teal+'44',borderRadius:10,padding:'10px 8px',textAlign:'center',cursor:'pointer'}}>
      <div style={{fontSize:13,fontWeight:900,color:C.teal}}>{String.fromCodePoint(128203)}</div>
      <div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase',marginTop:2}}>Cultura</div>
      </div>
    </div>}

    {/* Dias sem sentinela */}
    {gestorMode&&(alertas.protsVencidos.length>0||alertas.planosAtrasados.length>0||alertas.rcaPendentes.length>0)&&(
      <div style={{background:C.red+'10',border:'1px solid '+C.red+'44',borderRadius:12,padding:'12px 14px',marginBottom:10}}>
        <div style={{fontSize:12,fontWeight:800,color:C.red,marginBottom:8}}>{String.fromCodePoint(9888)} Alertas que requerem acao imediata</div>
        {alertas.rcaPendentes.length>0&&<div style={{fontSize:11,color:C.text,marginBottom:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>{String.fromCodePoint(128680)} {alertas.rcaPendentes.length} EA grave(s)/sentinela(s) sem RCA</span>
          <button onClick={()=>setView('notificacoes')} style={{fontSize:10,background:C.red,color:'#fff',border:'none',borderRadius:5,padding:'3px 8px',cursor:'pointer',fontWeight:700}}>Ver</button>
        </div>}
        {alertas.protsVencidos.length>0&&<div style={{fontSize:11,color:C.text,marginBottom:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>{String.fromCodePoint(128197)} {alertas.protsVencidos.length} protocolo(s) com revisao vencida</span>
          <button onClick={()=>setView('protocolos')} style={{fontSize:10,background:C.red,color:'#fff',border:'none',borderRadius:5,padding:'3px 8px',cursor:'pointer',fontWeight:700}}>Ver</button>
        </div>}
        {alertas.planosAtrasados.length>0&&<div style={{fontSize:11,color:C.text,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <span>{String.fromCodePoint(128336)} {alertas.planosAtrasados.length} plano(s) de acao com prazo vencido</span>
          <button onClick={()=>setView('notificacoes')} style={{fontSize:10,background:C.yellow,color:'#000',border:'none',borderRadius:5,padding:'3px 8px',cursor:'pointer',fontWeight:700}}>Ver</button>
        </div>}
      </div>
    )}
    {gestorMode&&s.diasSemSentinela!==null&&<div style={{background:s.diasSemSentinela>=30?C.green+'18':C.yellow+'18',border:'1px solid '+(s.diasSemSentinela>=30?C.green:C.yellow)+'44',borderRadius:12,padding:'12px 16px',display:'flex',alignItems:'center',gap:12}}>
      <div style={{fontSize:32,fontWeight:900,color:s.diasSemSentinela>=30?C.green:C.yellow,lineHeight:1}}>{s.diasSemSentinela}</div>
      <div><div style={{fontSize:13,fontWeight:700,color:s.diasSemSentinela>=30?C.green:C.yellow}}>dias sem evento sentinela</div><div style={{fontSize:11,color:C.muted}}>Meta ONA: 90 dias</div></div>
    </div>}

    {gestorMode&&<ListaMensal sbUrl={sbUrl} sbKey={sbKey} refreshKey={refreshKey} hospital={hospital} onSelect={()=>setView('notificacoes')}/>}

    {/* Botão notificar */}
    <button onClick={()=>setView('notificar')} style={{background:'linear-gradient(135deg,'+C.teal+'22,'+C.blue+'33)',border:'1px solid '+C.teal+'55',borderRadius:16,padding:'18px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',cursor:'pointer',width:'100%'}}>
      <div style={{textAlign:'left'}}><div style={{fontSize:16,fontWeight:800,color:C.teal}}>+ Nova Notificação</div><div style={{fontSize:12,color:C.muted,marginTop:2}}>Registre um evento agora</div></div>
      <IconMsg size={26} color={C.teal}/>
    </button>

  </div>);
}

function NotificarView({sbUrl,sbKey,webhookUrl,testMode,showToast,hospital,nspEmail}) {
  const h=hospital||DEFAULT_HOSPITAL;

  const [step,setStep]=useState('perfil');
  const [dados,setDados]=useState({});
  const [messages,setMessages]=useState([]);
  const [historico,setHistorico]=useState([]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const [saving,setSaving]=useState(false);
  const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[messages,step,loading]);

  const hojeISO=new Date().toISOString().slice(0,10);
  const ontemISO=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const horaNum=new Date().getHours();
  const turnoAtual=horaNum>=7&&horaNum<13?'Manhã':horaNum>=13&&horaNum<19?'Tarde':'Noite';

  const addMsg=(role,txt)=>setMessages(p=>[...p,{role,content:txt}]);

  const avancar=(novosDados,proximoStep,pergunta)=>{
    setHistorico(h=>[...h,{step,dados:{...dados},msgCount:messages.length}]);
    setDados(novosDados);
    if(pergunta) addMsg('assistant',pergunta);
    setStep(proximoStep);
  };

  const voltar=()=>{
    if(historico.length===0) return;
    const prev=historico[historico.length-1];
    setHistorico(h=>h.slice(0,-1));
    setStep(prev.step);
    setDados(prev.dados);
    setMessages(m=>m.slice(0,prev.msgCount));
    setInput('');
  };

  const isSP=(d)=>['seguranca_paciente','ccih'].includes(d.notification_type||dados.notification_type||'seguranca_paciente');
  const isADM=(d)=>(d.notification_type||dados.notification_type)==='administrativa';
  const isCCIH=(d)=>(d.notification_type||dados.notification_type)==='ccih';

  const responder=(valor,label)=>{
    const txt=label||valor;
    addMsg('user',txt);
    const d={...dados};

    switch(step){

      case 'perfil':{
        d.notifier_type=valor;
        const isPacFam=valor==='paciente'||valor==='familiar'||valor==='anonimo';
        if(isPacFam){
          d.notification_type='seguranca_paciente';
          avancar(d,'subtipo','Lamentamos o ocorrido. O que aconteceu?');
        } else {
          avancar(d,'tipo','O evento está relacionado ao **paciente** ou é uma **ocorrência administrativa**?');
        }
        break;
      }

      case 'tipo':{
        d.notification_type=valor;
        if(valor==='seguranca_paciente'){
          avancar(d,'subtipo','Qual foi o tipo de evento de segurança do paciente?');
        } else {
          avancar(d,'subtipo_adm','Qual o tipo de ocorrência administrativa?');
        }
        break;
      }

      case 'subtipo':{
        d.event_subtype=valor;
        if(valor==='Perda de AVP'){
          avancar(d,'avp_motivo','Qual foi o motivo da perda do acesso venoso periférico?');
        } else {
          avancar(d,'setor','Em qual setor ocorreu?');
        }
        break;
      }

      case 'subtipo_adm':{
        d.event_subtype=valor;
        avancar(d,'setor','Em qual setor ocorreu?');
        break;
      }

      case 'avp_motivo':{
        d.event_subtype='Perda de AVP - '+valor;
        avancar(d,'setor','Em qual setor ocorreu?');
        break;
      }

      case 'setor':{
        d.sector=valor;
        avancar(d,'data','Quando ocorreu o evento?');
        break;
      }

      case 'data':{
        let date=hojeISO,turno=turnoAtual;
        if(txt.includes('Manhã de hoje')){date=hojeISO;turno='Manhã';}
        else if(txt.includes('Tarde de hoje')){date=hojeISO;turno='Tarde';}
        else if(txt.includes('Noite de hoje')||txt.includes('Noite/madrugada')){date=hojeISO;turno='Noite';}
        else if(txt.includes('Manhã de ontem')){date=ontemISO;turno='Manhã';}
        else if(txt.includes('Tarde de ontem')){date=ontemISO;turno='Tarde';}
        else if(txt.includes('Noite de ontem')){date=ontemISO;turno='Noite';}
        else if(txt.toLowerCase().includes('hoje')){date=hojeISO;}
        else if(txt.toLowerCase().includes('ontem')){date=ontemISO;}
        d.event_date=date;d.shift=turno;
        avancar(d,'relato','Descreva o que aconteceu com o máximo de detalhes:');
        break;
      }

      case 'relato':{
        d.description=valor;
        avancar(d,'medidas','Quais medidas foram tomadas imediatamente após o evento?');
        break;
      }

      case 'medidas':{
        d.measures_taken=valor;
        if(isSP(d)){
          avancar(d,'nip','**NIP do paciente** (número de identificação):\n\nO NIP permite ao NSP rastrear os dados completos no prontuário. Se não souber, clique em "Não sei / Anônimo".');
        } else {
          gerarResumo(d);
        }
        break;
      }

      case 'nip':{
        if(valor!=='nao_informar') d.patient_nip=valor;
        avancar(d,'nome_pac','Nome completo do paciente (ou deixe em branco):');
        break;
      }

      case 'nome_pac':{
        if(valor&&valor.toLowerCase()!=='não informar'&&valor.toLowerCase()!=='nao informar') d.patient_name=valor;
        avancar(d,'idade','Idade do paciente (em anos):');
        break;
      }

      case 'idade':{
        if(valor&&valor!=='nao_informar'&&valor!=='Não informar') d.patient_age=parseInt(valor)||valor;
        avancar(d,'sexo','Sexo do paciente:');
        break;
      }

      case 'sexo':{
        if(valor!=='nao_informar') d.patient_sex=valor;
        avancar(d,'data_admissao','Data de admissao do paciente (ou "nao informar"):');
        break;
      }

      case 'data_admissao':{
        if(valor&&valor!=='nao informar'&&valor!=='nao_informar') d.patient_admission=valor;
        avancar(d,'motivo_internacao','Qual o motivo da internacao do paciente? (ou "nao informar")');
        break;
      }

      case 'motivo_internacao':{
        if(valor&&valor!=='nao informar'&&valor!=='nao_informar') d.motivo_internacao=valor;
        avancar(d,'desfecho','Qual foi o desfecho para o paciente?');
        break;
      }

      case 'desfecho':{
        d.patient_outcome=valor;
        avancar(d,'preventivel','O evento era evitável?');
        break;
      }

      case 'preventivel':{
        d.was_preventable=valor==='Sim'||txt.toLowerCase().includes('sim');
        gerarResumo(d);
        break;
      }

      default: break;
    }
  };

  const pular=()=>{
    const pulos={
      nip:'idade',
      idade:'sexo',
      sexo:'desfecho',
      data_admissao:'motivo_internacao',
      motivo_internacao:'desfecho',
    };
    const proximo=pulos[step];
    if(!proximo) return;
    const perguntas={
      idade:'Idade aproximada do paciente:',
      sexo:'Sexo do paciente:',
      motivo_internacao:'Qual o motivo da internacao do paciente?',
      desfecho:'Qual foi o desfecho para o paciente?',
    };
    addMsg('user','Não informado');
    avancar({...dados},proximo,perguntas[proximo]);
  };

  const gerarResumo=async(d)=>{
    setDados(d);setStep('resumo');setLoading(true);
    const ctx=[
      `Tipo: ${d.notification_type}`,
      d.event_subtype?`Evento: ${d.event_subtype}`:'',
      d.sector?`Setor: ${d.sector}`:'',
      d.event_date?`Data: ${new Date(d.event_date+'T12:00:00').toLocaleDateString('pt-BR')} (${d.shift||''})` :'',
      d.description?`Descrição: ${d.description}`:'',
      d.measures_taken?`Medidas: ${d.measures_taken}`:'',
      d.patient_nip?`NIP: ${d.patient_nip}`:'',
d.patient_name?`Paciente: ${d.patient_name}`:'',
d.patient_age?`Idade: ${d.patient_age} anos`:'',
      d.patient_age_range?`Idade: ${d.patient_age_range}`:'',
      d.patient_sex?`Sexo: ${d.patient_sex}`:'',
      d.motivo_internacao?`Motivo internacao: ${d.motivo_internacao}`:'',
      d.patient_outcome?`Desfecho: ${d.patient_outcome}`:'',
      d.was_preventable!==undefined?`Evitável: ${d.was_preventable?'Sim':'Não'}` :'',
    ].filter(Boolean).join(', ');
    try{
      const resumo=await callWorker(
        [{role:'user',content:`Faça um resumo técnico objetivo em 3-4 linhas desta notificação hospitalar, em português. Inclua os dados mais relevantes: ${ctx}`}],
        'Você é assistente do NSP. Resuma de forma objetiva e técnica. Máximo 4 linhas. Não faça perguntas.'
      );
      addMsg('assistant',`**Resumo da notificação:**\n\n${resumo}\n\nAs informações estão corretas?`);
      setDados({...d,ai_summary:resumo});
    }catch{
      addMsg('assistant',`**Resumo:** ${ctx}\n\nAs informações estão corretas?`);
    }
    setLoading(false);
  };

  const confirmar=async()=>{
    if(saving) return;
    setSaving(true);
    try{
      const payload={
        notification_type:dados.notification_type||'seguranca_paciente',
        sector:dados.sector||null,
        event_date:dados.event_date||null,
        shift:dados.shift||null,
        event_subtype:dados.event_subtype||null,
        description:dados.description||null,
        measures_taken:dados.measures_taken||null,
        patient_outcome:dados.patient_outcome||null,
        was_preventable:dados.was_preventable===true?true:dados.was_preventable===false?false:null,
        occurrence_subtype:dados.notification_type!=='seguranca_paciente'?(dados.event_subtype||null):null,
        patient_age:typeof dados.patient_age==='number'?dados.patient_age:(parseInt(dados.patient_age)||null),
        admission_reason:[
          dados.patient_nip?'NIP: '+dados.patient_nip:'',
          dados.patient_name?'Nome: '+dados.patient_name:'',
          dados.patient_age?dados.patient_age+' anos':'',
          dados.patient_sex?dados.patient_sex:'',
          dados.patient_admission?'Adm: '+dados.patient_admission:'',
          dados.motivo_internacao?'Motivo: '+dados.motivo_internacao:'',
          dados.avp_motivo?'AVP: '+dados.avp_motivo:'',
          dados.notifier_type?'Notificador: '+dados.notifier_type:'',
        ].filter(Boolean).join(' | ')||null,
        ai_summary:dados.ai_summary||null,
        gravidade:dados.event_subtype==='Evento sentinela'?'Evento sentinela':dados.event_subtype==='Near miss'?'Near miss':null,
        is_test:testMode||false,
        hospital_id:h.id,
        chat_history:messages.slice(-10),
      };
      let protocolo='';
      if(sbUrl&&sbKey){
        const res=await sbInsert(sbUrl,sbKey,'notifications',payload);
        protocolo=res?.[0]?.id?res[0].id.slice(0,8).toUpperCase():Math.random().toString(36).slice(2,10).toUpperCase();
        // BLOQUEIO DE SEGURANCA: arquivo demo NUNCA envia e-mail real.
        // Nenhuma chamada ao Worker/webhook eh feita aqui.
        showToast('Notificação salva na demonstração! (e-mail simulado, não enviado)','success');
      } else {
        protocolo=Math.random().toString(36).slice(2,10).toUpperCase();
        showToast('Notificação registrada!','success');
      }
      addMsg('user','Sim, confirmar e enviar.');
      addMsg('assistant','Notificação enviada com sucesso!\n\nProtocolo: '+protocolo+'\n\nGuarde este número. O Gestor do NSP foi notificado por e-mail e irá analisar o incidente.\n\n O NSP retornará com as ações tomadas. Em caso de evento sentinela ou adverso grave, a análise ocorrerá em até 72 horas.\n\nObrigado por contribuir com a segurança do hospital. Sua notificação é confidencial e protegida pela Lei 13.709/2018 (LGPD).');
      setStep('done');
    }catch(err){
      console.error('Erro ao salvar notificacao:',err);
      showToast('Erro ao salvar: '+(err?.message||'verifique a conexão e tente novamente.'),'error');
    }
    setSaving(false);
  };

  const corrigir=()=>{
    addMsg('user','Quero corrigir.');
    addMsg('assistant','Certo. Descreva novamente o que aconteceu:');
    setStep('relato');
  };

  const CHIPS_MAP={
    perfil:[
      {v:'profissional',l:'Enfermeiro(a)'},
      {v:'profissional',l:'Médico(a)'},
      {v:'profissional',l:'Técnico(a) de Enfermagem'},
      {v:'profissional',l:'Fisioterapeuta'},
      {v:'profissional',l:'Farmacêutico(a)'},
      {v:'profissional',l:'Outro profissional de saúde'},
      {v:'paciente',l:'Sou paciente'},
      {v:'familiar',l:'Sou familiar / acompanhante'},
      {v:'anonimo',l:'Notificação anônima'},
    ],
    tipo:[
      {v:'seguranca_paciente',l:'Relacionado ao paciente'},
      {v:'administrativa',l:'Ocorrência administrativa'},
    ],
    subtipo_sp:[
      {v:'Queda',l:'Queda'},
      {v:'Lesão por pressão',l:'Lesão por pressão'},
      {v:'Perda de AVP',l:'Perda de acesso venoso (AVP)'},
      {v:'Erro de medicação',l:'Erro de medicação / prescrição'},
      {v:'Falha na identificação',l:'Falha na identificação do paciente'},
      {v:'Cirurgia segura',l:'Evento relacionado à cirurgia'},
      {v:'Perda de SNE',l:'Perda de SNE / SNG'},
      {v:'Near miss',l:'Near miss (quase erro)'},
      {v:'Evento sentinela',l:'Evento sentinela'},
      {v:'Outro',l:'Outro evento'},
    ],
    subtipo_ccih:[
      {v:'ITU',l:'ITU - Infecção do Trato Urinário'},
      {v:'PAV',l:'PAV - Pneumonia por VM'},
      {v:'ISC',l:'ISC - Infecção de Sítio Cirúrgico'},
      {v:'IPCS',l:'IPCS - Corrente Sanguínea'},
      {v:'Outro foco',l:'Outro foco de infecção'},
    ],
    subtipo_adm:[
      {v:'Seguranca Organica',l:'Segurança orgânica'},
{v:'Acidente de trabalho',l:'Acidente de trabalho'},
{v:'Acidente com perfurocortante',l:'Acidente com perfurocortante'},
      {v:'Laboratorio',l:'Laboratório'},
      {v:'Hotelaria / limpeza',l:'Hotelaria / limpeza'},
      {v:'Nutricao / dieta',l:'Nutrição / dieta'},
      {v:'Vestimenta / adornos',l:'Vestimenta inadequada / adornos'},
      {v:'Farmacia',l:'Farmácia'},
      {v:'Infraestrutura / manutencao',l:'Infraestrutura / manutenção'},
      {v:'Comunicacao / documentacao',l:'Comunicação / documentação'},
      {v:'Outro',l:'Outro'},
    ],
    avp_motivo:[
      {v:'Flebite',l:'Flebite'},
      {v:'Infiltração',l:'Infiltração'},
      {v:'Extravasamento',l:'Extravasamento'},
      {v:'Paciente removeu',l:'Paciente removeu / arrancou'},
      {v:'Saída acidental',l:'Saída acidental durante procedimento'},
      {v:'Obstrução / coagulação',l:'Obstrução / coagulação'},
      {v:'Fixação inadequada',l:'Fixação inadequada'},
      {v:'Não identificado',l:'Não identificado'},
    ],
    setor: h.sectors.map(s=>({v:s,l:s})),
    data:[
      {v:'Manhã de hoje',l:'Manhã de hoje (07h-13h)'},
      {v:'Tarde de hoje',l:'Tarde de hoje (13h-19h)'},
      {v:'Noite de hoje',l:'Noite/madrugada de hoje (19h-07h)'},
      {v:'Manhã de ontem',l:'Manhã de ontem'},
      {v:'Tarde de ontem',l:'Tarde de ontem'},
      {v:'Noite de ontem',l:'Noite de ontem'},
    ],
    idade:[
      {v:'nao_informar',l:'Não informar'},
    ],
    sexo:[
      {v:'Masculino',l:'Masculino'},
      {v:'Feminino',l:'Feminino'},
      {v:'nao_informar',l:'Prefiro não informar'},
    ],
    desfecho:[
      {v:'Sem dano',l:'Sem dano'},
      {v:'Dano leve',l:'Dano leve - recuperação completa'},
      {v:'Dano moderado',l:'Dano moderado - requer tratamento adicional'},
      {v:'Dano grave',l:'Dano grave - permanente ou longa internação'},
      {v:'Óbito',l:'Óbito'},
      {v:'Near miss - sem dano',l:'Near miss - não atingiu o paciente'},
    ],
    preventivel:[
      {v:'Sim',l:'Sim, era evitável'},
      {v:'Não',l:'Não era evitável'},
      {v:'Não sei',l:'Não sei avaliar'},
    ],
  };

  const chipsAtivos=()=>{
    if(step==='subtipo') return CHIPS_MAP.subtipo_sp;
    return CHIPS_MAP[step]||[];
  };

  const ORDEM_SP=['perfil','tipo','subtipo','avp_motivo','setor','data','relato','medidas','nip','nome_pac','idade','sexo','data_admissao','desfecho','preventivel','resumo'];
  const ORDEM_ADM=['perfil','tipo','subtipo_adm','setor','data','relato','medidas','resumo'];
  const ORDEM_PACFAM=['perfil','subtipo','avp_motivo','setor','data','relato','medidas','nip','nome_pac','idade','sexo','data_admissao','desfecho','preventivel','resumo'];

  const getOrdem=()=>{
    const t=dados.notification_type;
    if(t==='administrativa') return ORDEM_ADM;
    if(dados.notifier_type==='paciente'||dados.notifier_type==='familiar'||dados.notifier_type==='anonimo') return ORDEM_PACFAM;
    return ORDEM_SP;
  };

  const getProgresso=()=>{
    const ordem=getOrdem().filter(s=>dados.event_subtype==='Perda de AVP'?true:s!=='avp_motivo');
    const idx=ordem.indexOf(step);
    return{atual:Math.max(idx,0)+1,total:ordem.length};
  };

  const LABELS_STEP={
    perfil:'Identificação',
    tipo:'Tipo de evento',
    subtipo:'O que aconteceu?',
    subtipo_adm:'Tipo de ocorrência',
    avp_motivo:'Motivo da perda do AVP',
    setor:'Setor',
    data:'Quando?',
    relato:'Descrição do evento',
    medidas:'Medidas tomadas',
    nip:'Identificação do paciente',
nome_pac:'Nome do paciente',
idade:'Idade do paciente',
    idade:'Idade do paciente',
    sexo:'Sexo do paciente',
    desfecho:'Desfecho',
    preventivel:'Evitabilidade',
        data_admissao:'Data de admissao',
    resumo:'Confirmação',
    done:'Concluído',
  };

  const chips=chipsAtivos();
  const prog=step!=='done'?getProgresso():{atual:1,total:1};
  const inputSteps=['relato','medidas','nip','nome_pac','idade','setor','data','data_admissao'];
  const showInput=inputSteps.includes(step)&&!loading&&!saving;
  const showPular=['nip','nome_pac','idade','sexo'].includes(step)&&!loading&&!saving;
  const showConfirm=step==='resumo'&&!loading&&!saving;

  useEffect(()=>{
    setMessages([{role:'assistant',content:'Olá! Vamos registrar a notificação passo a passo.\n\n**Quem é você?**\n\nVocê pode notificar anonimamente se preferir - nenhum dado pessoal é obrigatório.'}]);
  },[]);

  return(<div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 64px)'}}>

    {/* Header com barra de progresso */}
    <div style={{padding:'12px 16px',borderBottom:'1px solid '+C.border,background:C.surface}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:step!=='done'?6:0}}>
        <div style={{fontSize:14,fontWeight:700,color:C.text}}>Registrar Notificação</div>
        {step!=='done'&&<div style={{display:'flex',alignItems:'center',gap:8}}>{historico.length>0&&<button onClick={voltar} style={{background:'none',border:'none',color:C.teal,fontSize:11,fontWeight:700,cursor:'pointer',padding:'2px 6px',borderRadius:6,border:'1px solid '+C.teal+'44'}}>Voltar</button>}<div style={{fontSize:11,color:C.muted,fontWeight:600}}>Passo {prog.atual}/{prog.total}</div></div>}
      </div>
      {step!=='done'&&<div>
        <div style={{height:3,background:C.border,borderRadius:2,overflow:'hidden',marginBottom:4}}>
          <div style={{width:(prog.atual/prog.total)*100+'%',height:'100%',background:'linear-gradient(90deg,'+C.teal+','+C.blue+')',borderRadius:2,transition:'width .4s'}}/>
        </div>
        <div style={{fontSize:10,color:C.teal,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.06em'}}>{LABELS_STEP[step]||''}</div>
      </div>}
    </div>

    {/* Área de mensagens */}
    <div style={{flex:1,overflowY:'auto',padding:16,display:'flex',flexDirection:'column',gap:10}}>
      {messages.map((m,i)=>(
        <div key={i} style={{display:'flex',justifyContent:m.role==='user'?'flex-end':'flex-start'}}>
          <div style={{maxWidth:'88%',background:m.role==='user'?'linear-gradient(135deg,'+C.teal+','+C.blue+')':C.card,border:m.role==='assistant'?'1px solid '+C.border:'none',borderRadius:m.role==='user'?'16px 16px 4px 16px':'16px 16px 16px 4px',padding:'11px 14px',fontSize:14,color:m.role==='user'?'#fff':C.text,lineHeight:1.65}}
            dangerouslySetInnerHTML={{__html:md(m.content)}}/>
        </div>
      ))}
      {(loading||saving)&&<div style={{display:'flex',alignItems:'center',gap:8}}>
        <Dots/>
        {saving&&<span style={{fontSize:12,color:C.green}}>Salvando...</span>}
      </div>}
      <div ref={endRef}/>
    </div>

    {/* Área de entrada */}
    {step!=='done'&&(
      <div style={{borderTop:'1px solid '+C.border,background:C.surface}}>

        {/* Chips clicáveis */}
        {chips.length>0&&!loading&&!saving&&(
          <div style={{padding:'10px 14px 6px',display:'flex',flexWrap:'wrap',gap:7,maxHeight:200,overflowY:'auto'}}>
            {chips.map((c,i)=>(
              <button key={i} onClick={()=>responder(c.v,c.l)}
                style={{background:C.card,border:'1px solid '+C.teal+'55',borderRadius:20,padding:'7px 14px',color:C.teal,fontSize:13,fontWeight:600,cursor:'pointer',whiteSpace:'nowrap'}}>
                {c.l}
              </button>
            ))}
          </div>
        )}

        {/* Botão pular (campos opcionais) */}
        {showPular&&(
          <div style={{padding:'4px 14px 0',display:'flex',justifyContent:'flex-end'}}>
            <button onClick={pular} style={{background:'none',border:'none',color:C.muted,fontSize:12,cursor:'pointer',textDecoration:'underline'}}>
              Pular (não informar)
            </button>
          </div>
        )}

        {/* Botões confirmar / corrigir */}
        {showConfirm&&(
          <div style={{padding:'8px 14px 6px',display:'flex',gap:8}}>
            <button onClick={confirmar} disabled={saving} style={{flex:2,background:saving?C.border:C.teal,border:'none',borderRadius:12,padding:'13px',color:saving?C.muted:'#06101F',fontWeight:800,fontSize:13,cursor:saving?'default':'pointer',opacity:saving?0.7:1}}>
              {saving?'Salvando...':'Confirmar e Enviar'}
            </button>
            <button onClick={corrigir} disabled={saving} style={{flex:1,background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'13px',color:C.muted,fontWeight:600,fontSize:12,cursor:saving?'default':'pointer'}}>
              Corrigir
            </button>
          </div>
        )}

        {/* Campo texto livre */}
        {showInput&&(
          <div style={{padding:'8px 14px 12px',display:'flex',gap:10}}>
            <input type={(step==='data'||step==='data_admissao')?'date':'text'} value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&!e.shiftKey&&input.trim()&&(responder(input.trim(),input.trim()),setInput(''))}
              placeholder={
                step==='nip'?'Digite o NIP do paciente...' :
                step==='relato'?'Descreva o que aconteceu...' :
                step==='medidas'?'Descreva as medidas tomadas...' :
                chips.length>0?'Ou escreva livremente...' :
                'Escreva aqui...'
              }
              style={{flex:1,background:C.card,border:'1px solid '+C.border,borderRadius:22,padding:'10px 16px',color:C.text,fontSize:14,outline:'none'}}/>
            <button onClick={()=>{if(input.trim()){responder(input.trim(),input.trim());setInput('');}}}
              disabled={!input.trim()}
              style={{width:44,height:44,borderRadius:'50%',border:'none',background:input.trim()?C.teal:C.border,cursor:input.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <IconSend size={17} color={input.trim()?'#06101F':C.muted}/>
            </button>
          </div>
        )}

        {/* NIP - só texto (sem chips) */}
        {step==='nip'&&!loading&&!saving&&chips.length===0&&(
          <div style={{padding:'8px 14px 12px',display:'flex',gap:10}}>
            <input type={(step==='data'||step==='data_admissao')?'date':'text'} value={input} onChange={e=>setInput(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&input.trim()&&(responder(input.trim(),input.trim()),setInput(''))}
              placeholder="Digite o NIP do paciente..."
              style={{flex:1,background:C.card,border:'1px solid '+C.border,borderRadius:22,padding:'10px 16px',color:C.text,fontSize:14,outline:'none'}}/>
            <button onClick={()=>{if(input.trim()){responder(input.trim(),input.trim());setInput('');}}}
              disabled={!input.trim()}
              style={{width:44,height:44,borderRadius:'50%',border:'none',background:input.trim()?C.teal:C.border,cursor:input.trim()?'pointer':'default',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
              <IconSend size={17} color={input.trim()?'#06101F':C.muted}/>
            </button>
          </div>
        )}
      </div>
    )}
  </div>);
}

const SAQ_CATEGORIAS=['Enfermagem','Medicina','Tecnico de Enfermagem','Fisioterapia','Farmacia','Outro'];
function saqCicloAtual(){const d=new Date();return d.getMonth()<6?`${d.getFullYear()}-1`:`${d.getFullYear()}-2`;}

function SAQPublicoView({sbUrl,sbKey,hospital,showToast}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const [etapa,setEtapa]=useState('intro');
  const [setor,setSetor]=useState('');
  const [categoria,setCategoria]=useState('');
  const [saqResp,setSaqResp]=useState({});
  const [enviando,setEnviando]=useState(false);

  const totalItens=SAQ_DOMINIOS.reduce((a,d)=>a+d.itens.length,0);
  const respondidos=Object.keys(saqResp).length;

  const reiniciar=()=>{setSetor('');setCategoria('');setSaqResp({});setEtapa('intro');};

  const enviar=async()=>{
    if(respondidos<totalItens||enviando) return;
    setEnviando(true);
    try{
      if(sbUrl&&sbKey){
        await sbInsert(sbUrl,sbKey,'saq_respostas',{
          hospital_id:h.id,
          setor,
          categoria:categoria||null,
          ciclo:saqCicloAtual(),
          respostas:saqResp,
        });
      }
      setEtapa('obrigado');
    }catch(e){
      showToast('Erro ao enviar. Verifique a conexao e tente novamente.','error');
    }
    setEnviando(false);
  };

  const inp={background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'11px 14px',color:C.text,fontSize:13,outline:'none',width:'100%',marginBottom:16};

  if(etapa==='obrigado') return(
    <div style={{padding:'48px 24px',textAlign:'center'}}>
      <div style={{fontSize:52,marginBottom:14}}>{String.fromCodePoint(9989)}</div>
      <div style={{fontSize:18,fontWeight:900,color:C.text,marginBottom:8}}>Obrigado pela sua resposta!</div>
      <div style={{fontSize:13,color:C.muted,marginBottom:28,lineHeight:1.6}}>Sua participacao ajuda a fortalecer a cultura de seguranca do {h.short_name}. As respostas sao analisadas apenas de forma agregada e anonima por setor.</div>
      <button onClick={reiniciar} style={{background:C.teal,border:'none',borderRadius:12,padding:'13px 24px',color:'#06101F',fontWeight:800,fontSize:13,cursor:'pointer'}}>Outra pessoa quer responder</button>
    </div>
  );

  if(etapa==='intro') return(
    <div style={{padding:'24px 16px',maxWidth:480,margin:'0 auto'}}>
      <div style={{fontSize:18,fontWeight:900,color:C.text,marginBottom:4}}>Pesquisa de Clima de Seguranca</div>
      <div style={{fontSize:12,color:C.muted,lineHeight:1.7,marginBottom:20}}>
        Instrumento validado internacionalmente - SAQ (Sexton et al., 2006), adaptado para o {h.short_name}.<br/><br/>
        {String.fromCodePoint(128274)} <strong style={{color:C.text}}>100% anonimo</strong> - nao pedimos seu nome, apenas setor e (opcional) categoria profissional. Os resultados so sao analisados de forma agregada por setor, nunca individualmente.<br/><br/>
        Leva cerca de 5 minutos. Responda com base na sua experiencia nos ultimos 30 dias no seu setor.
      </div>

      <label style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:'uppercase',display:'block',marginBottom:6}}>Seu setor *</label>
      <select value={setor} onChange={e=>setSetor(e.target.value)} style={{...inp,appearance:'none'}}>
        <option value="">Selecione</option>
        {h.sectors.map(s=><option key={s} value={s}>{s}</option>)}
      </select>

      <label style={{fontSize:11,color:C.muted,fontWeight:700,textTransform:'uppercase',display:'block',marginBottom:6}}>Categoria profissional (opcional)</label>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:24}}>
        {SAQ_CATEGORIAS.map(c=>(
          <button key={c} onClick={()=>setCategoria(categoria===c?'':c)} style={{padding:'8px 12px',borderRadius:20,border:'1px solid '+(categoria===c?C.teal:C.border),background:categoria===c?C.teal+'22':C.card,color:categoria===c?C.teal:C.muted,fontSize:12,fontWeight:600,cursor:'pointer'}}>{c}</button>
        ))}
      </div>

      <button onClick={()=>setor&&setEtapa('form')} disabled={!setor} style={{width:'100%',background:setor?C.teal:C.border,border:'none',borderRadius:12,padding:'14px',color:setor?'#06101F':C.muted,fontWeight:800,fontSize:14,cursor:setor?'pointer':'default'}}>
        Comecar pesquisa
      </button>
    </div>
  );

  // etapa==='form'
  return(<div style={{paddingBottom:96}}>
    <div style={{position:'sticky',top:0,background:C.surface,borderBottom:'1px solid '+C.border,padding:'12px 16px',zIndex:10}}>
      <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text}}>{setor}{categoria?' · '+categoria:''}</div>
        <div style={{fontSize:11,color:C.muted}}>{respondidos}/{totalItens}</div>
      </div>
      <div style={{height:4,background:C.border,borderRadius:2,overflow:'hidden',marginBottom:6}}>
        <div style={{width:(respondidos/totalItens*100)+'%',height:'100%',background:'linear-gradient(90deg,'+C.teal+','+C.blue+')',borderRadius:2,transition:'width .3s'}}/>
      </div>
      <div style={{fontSize:9,color:C.muted}}>1=DT Discordo totalmente · 2=D Discordo · 3=N Neutro · 4=C Concordo · 5=CT Concordo totalmente</div>
    </div>

    <div style={{padding:16,maxWidth:480,margin:'0 auto'}}>
      {SAQ_DOMINIOS.map(dom=>(
        <div key={dom.id} style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'14px',marginBottom:10}}>
          <div style={{fontSize:12,fontWeight:800,color:dom.cor,marginBottom:10,borderBottom:'1px solid '+dom.cor+'33',paddingBottom:6}}>{dom.label}</div>
          {dom.itens.map((item,ii)=>(
            <div key={ii} style={{marginBottom:14}}>
              <div style={{fontSize:12,color:C.text,marginBottom:6,lineHeight:1.5}}>{ii+1}. {item.t}</div>
              <div style={{display:'flex',gap:4}}>
                {[0,1,2,3,4].map(v=>(
                  <button key={v} onClick={()=>setSaqResp(r=>({...r,[dom.id+'_'+ii]:v}))}
                    style={{flex:1,padding:'8px 2px',borderRadius:6,border:'1px solid '+(saqResp[dom.id+'_'+ii]===v?dom.cor:C.border),

function SAQDashboardView({sbUrl,sbKey,hospital,showToast}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const [respostas,setRespostas]=useState([]);
  const [loading,setLoading]=useState(false);
  const [ciclo,setCiclo]=useState(saqCicloAtual());
  const N_MIN=5;

  const load=async()=>{
    if(!sbUrl||!sbKey) return;
    setLoading(true);
    try{
      const d=await sbSelect(sbUrl,sbKey,'saq_respostas',`hospital_id=eq.${h.id}&select=*`);
      setRespostas(d||[]);
    }catch{setRespostas([]);}
    setLoading(false);
  };
  useEffect(()=>{load();},[sbUrl,sbKey]);

  const calcDominios=(lista)=>SAQ_DOMINIOS.map(dom=>{
    let soma=0,n=0;
    lista.forEach(r=>{
      dom.itens.forEach((item,i)=>{
        const raw=r.respostas?.[dom.id+'_'+i];
        if(raw!==undefined&&raw!==null){
          const v=item.inv?(4-raw):raw;
          soma+=v;n++;
        }
      });
    });
    if(n===0) return{...dom,pct:null};
    return{...dom,pct:Math.round((soma/n/4)*100)};
  });
  const scoreDe=(doms)=>doms.every(d=>d.pct!==null)?Math.round(doms.reduce((a,d)=>a+d.pct,0)/doms.length):null;

  const doCiclo=respostas.filter(r=>r.ciclo===ciclo);
  const dominiosGeral=calcDominios(doCiclo);
  const scoreGeral=scoreDe(dominiosGeral);

  const porSetor=h.sectors.map(s=>{
    const lista=doCiclo.filter(r=>r.setor===s);
    const doms=lista.length>=N_MIN?calcDominios(lista):null;
    return{setor:s,n:lista.length,score:doms?scoreDe(doms):null};
  }).sort((a,b)=>b.n-a.n);

  const ciclosComDados=[...new Set(respostas.map(r=>r.ciclo))];
  const ciclosSelecionaveis=[...new Set([...ciclosComDados,saqCicloAtual()])].sort().reverse();
  const tendencia=[...ciclosComDados].sort().map(c=>{
    const lista=respostas.filter(r=>r.ciclo===c);
    return{ciclo:c,n:lista.length,score:scoreDe(calcDominios(lista))||0};
  });

  const corScore=(v)=>v===null?C.muted:v>=75?C.green:v>=60?C.yellow:C.red;

  return(<div style={{padding:'20px 16px',display:'flex',flexDirection:'column',gap:14,paddingBottom:80}}>
    <div>
      <div style={{fontSize:17,fontWeight:900,color:C.text}}>Cultura de Seguranca</div>
      <div style={{fontSize:11,color:C.muted}}>SAQ - Safety Attitudes Questionnaire (Sexton et al., 2006) · respostas anonimas</div>
    </div>

    <div style={{display:'flex',gap:8,alignItems:'center'}}>
      <label style={{fontSize:11,color:C.muted,fontWeight:700}}>Ciclo:</label>
      <select value={ciclo} onChange={e=>setCiclo(e.target.value)} style={{background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'7px 10px',color:C.text,fontSize:12,outline:'none',appearance:'none'}}>
        {ciclosSelecionaveis.map(c=><option key={c} value={c}>{c}</option>)}
      </select>
      <button onClick={load} style={{marginLeft:'auto',background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'6px 12px',color:C.teal,fontSize:11,fontWeight:700,cursor:'pointer'}}>Atualizar</button>
    </div>

    {loading&&<div style={{textAlign:'center',color:C.muted,padding:20}}><Dots/></div>}

    {!loading&&doCiclo.length===0&&<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:20,textAlign:'center'}}>
      <div style={{fontSize:13,color:C.muted,lineHeight:1.7}}>Ainda nao ha respostas para este ciclo.<br/>Divulgue o link publico da pesquisa para a equipe (aba "Cultura" no menu publico, ou um QR code afixado no setor).</div>
    </div>}

    {!loading&&doCiclo.length>0&&<>
      <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:16,display:'flex',alignItems:'center',gap:16}}>
        <div style={{textAlign:'center',flexShrink:0}}>
          <div style={{fontSize:36,fontWeight:900,color:corScore(scoreGeral)}}>{scoreGeral??'-'}</div>
          <div style={{fontSize:9,color:C.muted,fontWeight:700}}>pts / 100</div>
        </div>
        <div>
          <div style={{fontSize:14,fontWeight:800,color:corScore(scoreGeral)}}>{scoreGeral===null?'Aguardando mais respostas':scoreGeral>=75?'Cultura positiva de seguranca':scoreGeral>=60?'Em desenvolvimento':'Necessita intervencao'}</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>{doCiclo.length} resposta(s) neste ciclo · corte de positividade: 75 pts</div>
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
        {dominiosGeral.map(dom=>(
          <div key={dom.id} style={{background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'10px 12px'}}>
            <div style={{fontSize:11,fontWeight:700,color:dom.cor,marginBottom:6}}>{dom.label}</div>
            {dom.pct!==null?<div>
              <div style={{fontSize:18,fontWeight:900,color:dom.cor}}>{dom.pct}<span style={{fontSize:10,color:C.muted}}> pts</span></div>
              <div style={{height:4,background:C.border,borderRadius:2,marginTop:6,overflow:'hidden'}}>
                <div style={{width:dom.pct+'%',height:'100%',background:dom.cor,borderRadius:2}}/>
              </div>
            </div>:<div style={{fontSize:10,color:C.muted}}>Sem dados</div>}
          </div>
        ))}
      </div>

      <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Por setor</div>
        {porSetor.map(p=>(
          <div key={p.setor} style={{display:'flex',alignItems:'center',gap:10,padding:'8px 0',borderBottom:'1px solid '+C.border+'33'}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:12,fontWeight:600,color:C.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.setor}</div>
              <div style={{fontSize:10,color:C.muted}}>{p.n} resposta(s){p.n>0&&p.n<N_MIN?' · abaixo do minimo para exibir':''}</div>
            </div>
            {p.score!==null?
              <div style={{fontSize:16,fontWeight:900,color:corScore(p.score),flexShrink:0}}>{p.score}</div>
              :<div style={{fontSize:10,color:C.muted,flexShrink:0}}>—</div>}
          </div>
        ))}
        <div style={{fontSize:10,color:C.muted,marginTop:10,lineHeight:1.5}}>Por protecao ao anonimato, setores com menos de {N_MIN} respostas nao exibem score individual.</div>
      </div>

      {tendencia.length>1&&<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:16}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Evolucao entre ciclos</div>
        <BarChart data={tendencia} xKey="ciclo" yKey="score" color={C.teal} height={140}/>
      </div>}
    </>}
  </div>);
}

function TicketForm({sbUrl,sbKey,hospital,showToast,onBack}) {
  const [step,setStep]=useState('type');
  const [type,setType]=useState(null);
  const [form,setForm]=useState({sector:'',responsavel:'',description:'',priority:'normal',patient_name:'',destination:'',scheduled_at:'',requester_name:''});
  const [saving,setSaving]=useState(false);
  const h=hospital||DEFAULT_HOSPITAL;
  const tt=TICKET_TYPES.find(t=>t.id===type)||TICKET_TYPES[0];

  const submit=async()=>{
    if(!form.description.trim()){showToast('Descreva o chamado','error');return;}
    setSaving(true);
    try {
      const payload={hospital_id:h.id,ticket_type:type,responsavel:form.responsavel||null,origin_sector:form.sector,description:form.description,priority:form.priority,patient_name:form.patient_name||null,requester_name:form.requester_name||null,destination_sector:tt?.dest||null,scheduled_at:form.scheduled_at||null,status:'aberto',opened_at:new Date().toISOString()};
      if(sbUrl&&sbKey) await sbInsert(sbUrl,sbKey,'tickets',payload);
      showToast('OK Chamado aberto! '+tt?.dest+' foi notificado.','success');
      setStep('done');
    } catch(e) { showToast('Erro: '+e.message,'error'); }
    setSaving(false);
  };

  const inp={background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'11px 14px',color:C.text,fontSize:13,outline:'none',width:'100%',marginBottom:12};
  const lbl={fontSize:11,color:C.muted,fontWeight:600,textTransform:'uppercase',letterSpacing:'0.08em',display:'block',marginBottom:6};

  if(step==='done') return(<div style={{padding:32,textAlign:'center'}}>
    <div style={{fontSize:52,marginBottom:14}}>OK</div>
    <div style={{fontSize:18,fontWeight:900,color:C.text,marginBottom:8}}>Chamado aberto!</div>
    <div style={{fontSize:14,color:C.muted,marginBottom:24}}>{tt?.dest} foi notificado.</div>
    <button onClick={onBack} style={{background:C.teal,border:'none',borderRadius:12,padding:'12px 28px',color:'#06101F',fontWeight:800,fontSize:14,cursor:'pointer'}}>Ver chamados</button>
  </div>);

  if(step==='type') return(<div style={{padding:'20px 16px'}}>
    {onBack&&<button onClick={onBack} style={{background:'none',border:'none',color:C.teal,cursor:'pointer',fontSize:22,marginBottom:16}}>←</button>}
    <div style={{fontSize:17,fontWeight:900,color:C.text,marginBottom:4}}>Novo Chamado</div>
    <div style={{fontSize:12,color:C.muted,marginBottom:20}}>Qual o tipo de chamado?</div>

          <div style={{flex:1}}><div style={{fontSize:14,fontWeight:700,color:C.text}}>{t.label}</div><div style={{fontSize:11,color:C.muted}}> {t.dest} · {t.desc}</div></div>

    </div>
  </div>);

  return(<div style={{padding:'20px 16px'}}>
    <button onClick={()=>setStep('type')} style={{background:'none',border:'none',color:C.teal,cursor:'pointer',fontSize:22,marginBottom:8}}>←</button>
    <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:20}}>
      <div style={{width:44,height:44,borderRadius:12,background:tt?.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>{ticketEmoji(tt?.icon)}</div>
      <div><div style={{fontSize:16,fontWeight:800,color:C.text}}>{tt?.label}</div><div style={{fontSize:11,color:C.muted}}>-> {tt?.dest}</div></div>

    <input value={form.requester_name} onChange={e=>setForm({...form,requester_name:e.target.value})} placeholder="Nome" style={inp}/>

      <label style={lbl}>Nome do paciente</label>
      <input value={form.patient_name} onChange={e=>setForm({...form,patient_name:e.target.value})} placeholder="Nome completo (opcional)" style={inp}/>
      <label style={lbl}>Destino / Unidade de referência</label>
      <input value={form.destination} onChange={e=>setForm({...form,destination:e.target.value})} placeholder="Ex: Hospital Roberto Santos" style={inp}/>

    <textarea value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="Descreva o chamado..." style={{...inp,height:90,resize:'none',fontFamily:'inherit'}}/>
    <label style={lbl}>Prioridade</label>

function TicketsList({sbUrl,sbKey,hospital,showToast,profileMode}) {
  const [tickets,setTickets]=useState([]);
  const [loading,setLoading]=useState(false);
  const [filter,setFilter]=useState('todos');
  const [commenting,setCommenting]=useState(null);
  const [commentText,setCommentText]=useState('');
  const h=hospital||DEFAULT_HOSPITAL;
  const isDsg=profileMode==='dsg';
  const isMotorista=profileMode==='motorista';
  const isGestor=profileMode==='gestor';
  const canAct=isDsg||isMotorista||isGestor;

  const load=async()=>{
    if(!sbUrl||!sbKey) return;
    setLoading(true);
    try {
      let data=await sbSelect(sbUrl,sbKey,'tickets',`select=*&hospital_id=eq.${h.id}&order=opened_at.desc`);
      let r=data||[];
      if(isDsg) r=r.filter(t=>t.ticket_type==='manutencao');
      if(isMotorista) r=r.filter(t=>t.ticket_type==='ambulancia');
      setTickets(r);
    } catch { showToast('Erro ao carregar chamados','error'); }
    setLoading(false);
  };
  useEffect(()=>{load();},[sbUrl,sbKey,profileMode]);
  useEffect(()=>{
    if(!sbUrl||!sbKey||(!isDsg&&!isMotorista)||tickets.length===0) return;
    const toMark=tickets.filter(t=>t.status==='aberto');
    toMark.forEach(async t=>{try{await sbPatch(sbUrl,sbKey,'tickets',`id=eq.${t.id}`,{status:'visualizado',viewed_at:new Date().toISOString(),viewed_by:profileMode});}catch{}});
    if(toMark.length>0) setTickets(prev=>prev.map(t=>t.status==='aberto'?{...t,status:'visualizado'}:t));
  },[tickets.length,isDsg,isMotorista]);

  const updateStatus=async(ticket,newStatus,notes)=>{
    try {
      const patch={status:newStatus,responded_at:new Date().toISOString(),...(notes!==undefined?{response_notes:notes}:{}),...(newStatus==='concluido'?{closed_at:new Date().toISOString()}:{})};
      await sbPatch(sbUrl,sbKey,'tickets',`id=eq.${ticket.id}`,patch);
      setTickets(prev=>prev.map(t=>t.id===ticket.id?{...t,...patch}:t));
      setCommenting(null);setCommentText('');
      showToast({recebido:'? Recebido!',em_andamento:'Aguarde Em andamento!',concluido:'OK Concluído!',pendente:'ATENCAO Pendente'}[newStatus]||'Atualizado!','success');
    } catch { showToast('Erro ao atualizar','error'); }
  };

  const filtered=filter==='todos'?tickets:tickets.filter(t=>t.status===filter);
  const counts={aberto:tickets.filter(t=>t.status==='aberto').length,em_andamento:tickets.filter(t=>t.status==='em_andamento').length,pendente:tickets.filter(t=>['pendente','visualizado','recebido'].includes(t.status)).length};

  const renderActions=(ticket)=>{
    if(!canAct||ticket.status==='concluido') return null;
    const st=ticket.status;
    const isComm=commenting===ticket.id;
    if(isComm) return(<div style={{marginTop:8}}>
      <textarea value={commentText} onChange={e=>setCommentText(e.target.value)} placeholder="Comentário ou observação..." style={{width:'100%',background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'10px',color:C.text,fontSize:12,outline:'none',resize:'none',height:70,fontFamily:'inherit',marginBottom:8}}/>
      <div style={{display:'flex',gap:6}}>
        <button onClick={()=>{setCommenting(null);setCommentText('');}} style={{flex:1,background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'8px',color:C.muted,fontSize:11,fontWeight:700,cursor:'pointer'}}>Cancelar</button>
        <button onClick={()=>updateStatus(ticket,st,commentText)} style={{flex:2,background:C.teal,border:'none',borderRadius:8,padding:'8px',color:'#06101F',fontSize:11,fontWeight:800,cursor:'pointer'}}>Chat Salvar</button>
      </div>
    </div>);
    return(<div style={{marginTop:8,display:'flex',gap:6,flexWrap:'wrap'}}>
      <button onClick={()=>setCommenting(ticket.id)} style={{flex:1,minWidth:80,background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'8px',color:C.muted,fontSize:11,fontWeight:700,cursor:'pointer'}}>Chat Comentar</button>
      {st==='visualizado'&&<button onClick={()=>updateStatus(ticket,'recebido')} style={{flex:1,minWidth:80,background:C.blue+'22',border:'1px solid '+C.blue+'44',borderRadius:8,padding:'8px',color:C.blue,fontSize:11,fontWeight:700,cursor:'pointer'}}> Recebido</button>}
      {st==='recebido'&&<button onClick={()=>updateStatus(ticket,'em_andamento')} style={{flex:1,minWidth:80,background:C.teal+'22',border:'1px solid '+C.teal+'44',borderRadius:8,padding:'8px',color:C.teal,fontSize:11,fontWeight:700,cursor:'pointer'}}> Andamento</button>}
      {(st==='em_andamento'||st==='recebido')&&<button onClick={()=>updateStatus(ticket,'concluido')} style={{flex:1,minWidth:80,background:C.green+'22',border:'1px solid '+C.green+'44',borderRadius:8,padding:'8px',color:C.green,fontSize:11,fontWeight:700,cursor:'pointer'}}>Ok Concluído</button>}
    </div>);
  };

  if(!profileMode) return(<div style={{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',height:'calc(100vh - 64px)',padding:32,textAlign:'center'}}>
    <div style={{fontSize:48,marginBottom:16}}></div>
    <div style={{fontSize:17,fontWeight:800,color:C.text,marginBottom:8}}>Acesso restrito</div>
    <div style={{fontSize:13,color:C.muted,maxWidth:260}}>Faça login para abrir ou visualizar chamados operacionais.</div>
  </div>);

  return(<div style={{padding:'0 0 80px',maxWidth:900,margin:'0 auto'}}>
    {/* Modal de edicao */}
    <BackHeader title='Chamados' subtitle={filtered.length+' chamado(s)'} right={<button onClick={load} style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'6px 12px',color:C.teal,fontSize:11,fontWeight:700,cursor:'pointer'}}>Atualizar</button>}/>
    <div style={{padding:'16px'}}>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
      {[['aberto','Abertos',C.yellow],['em_andamento','Andamento',C.blue],['pendente','Pendentes',C.red]].map(([id,label,color])=>(
        <div key={id} style={{background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
          <div style={{fontSize:22,fontWeight:900,color}}>{counts[id]||0}</div>
          <div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase'}}>{label}</div>
        </div>
      ))}
    </div>
    <div style={{display:'flex',gap:6,overflowX:'auto',marginBottom:14,paddingBottom:4}}>
      {[['todos','Todos'],['aberto','Aberto'],['visualizado','Visualizado'],['recebido','Recebido'],['em_andamento','Andamento'],['concluido','Concluído']].map(([id,label])=>(
        <button key={id} onClick={()=>setFilter(id)} style={{flexShrink:0,padding:'6px 12px',borderRadius:16,border:'none',background:filter===id?C.teal:C.card,color:filter===id?'#06101F':C.muted,fontSize:11,fontWeight:700,cursor:'pointer'}}>{label}</button>
      ))}
      <button onClick={load} style={{flexShrink:0,padding:'6px 12px',borderRadius:16,border:'1px solid '+C.border,background:'transparent',color:C.teal,fontSize:11,fontWeight:700,cursor:'pointer'}}></button>
    </div>
    {loading&&<div style={{textAlign:'center',color:C.muted,padding:32}}>Carregando...</div>}
    {!loading&&filtered.length===0&&<div style={{textAlign:'center',color:C.muted,padding:32}}>Nenhum chamado{filter!=='todos'?' com este filtro':''}.</div>}
    {filtered.map(ticket=>{
      const tt=TICKET_TYPES.find(t=>t.id===ticket.ticket_type)||{id:'outro',label:ticket.ticket_type||'Chamado',icon:String.fromCodePoint(128203),color:'#5A7AA0',dest:'Gestao',desc:''};
      const st=TICKET_STATUS[ticket.status]||TICKET_STATUS.aberto;
      return(<div key={ticket.id} style={{background:C.card,border:'1px solid '+(ticket.status==='aberto'?'#F59E0B55':C.border),borderRadius:14,padding:14,marginBottom:10}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:12,marginBottom:8}}>
          <div style={{width:40,height:40,borderRadius:10,background:tt.color+'22',display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{ticketEmoji(tt.icon)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',gap:8}}>
              <div style={{fontSize:13,fontWeight:700,color:C.text}}>{tt.label}</div>
              <div style={{background:st.bg,color:st.color,borderRadius:6,padding:'2px 8px',fontSize:10,fontWeight:700,flexShrink:0}}>{st.label}</div>
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>{ticket.origin_sector} -> {tt.dest} · {formatTime(ticket.opened_at)}</div>
            {ticket.requester_name&&<div style={{fontSize:11,color:C.teal,marginTop:2}}> {ticket.requester_name}</div>}
            {ticket.priority==='critico'&&<div style={{display:'inline-block',background:C.red+'22',color:C.red,borderRadius:4,padding:'1px 6px',fontSize:9,fontWeight:700,marginTop:3}}> CRÍTICO</div>}
            {ticket.priority==='urgente'&&<div style={{display:'inline-block',background:C.yellow+'22',color:C.yellow,borderRadius:4,padding:'1px 6px',fontSize:9,fontWeight:700,marginTop:3}}> URGENTE</div>}
          </div>
        </div>
        <div style={{fontSize:13,color:C.text,lineHeight:1.5,marginBottom:8}}>{ticket.description}</div>
        {ticket.response_notes&&<div style={{background:C.surface,borderRadius:8,padding:'8px 10px',marginBottom:8,borderLeft:'3px solid '+(tt.color)}}>
          <div style={{fontSize:10,color:C.muted,fontWeight:700,marginBottom:2}}>{tt.dest}:</div>
          <div style={{fontSize:12,color:C.text}}>{ticket.response_notes}</div>
        </div>}
        {renderActions(ticket)}
      </div>);
    })}
  </div>
  </div>);
}

  const carregar=async()=>{
    if(!sbUrl||!sbKey) return;
    setLoading(true);
    try{
      const mesStr=String(mes).padStart(2,'0');
      const inicio=`${ano}-${mesStr}-01`;
      const ultimoDia=new Date(ano,mes,0).getDate();
      const fim=`${ano}-${mesStr}-${ultimoDia}`;
      const data=await sbSelect(sbUrl,sbKey,'notifications',
        `hospital_id=eq.${(hospital||DEFAULT_HOSPITAL).id}&event_date=gte.${inicio}&event_date=lte.${fim}&is_test=neq.true&order=event_date.asc&limit=200`);
      setNots(data||[]);
    }catch(e){setNots([]);}
    setLoading(false);
  };

  React.useEffect(()=>{if(aberta)carregar();},[mes,ano,aberta,sbUrl,sbKey]);

  const getTag=(n)=>{
    if(n.notification_type==='seguranca_paciente') return{l:'SP',c:C.red};
    if(n.notification_type==='ccih'||n.event_subtype?.startsWith('CCIH')) return{l:'CCIH',c:'#7C3AED'};
    return{l:'ADM',c:C.muted};
  };

  const navMes=(dir)=>{
    let m=mes+dir, a=ano;
    if(m>12){m=1;a++;}
    if(m<1){m=12;a--;}
    setMes(m);setAno(a);
  };

  const spCount=nots.filter(n=>n.notification_type==='seguranca_paciente'||n.notification_type==='ccih').length;
  const admCount=nots.filter(n=>n.notification_type==='administrativa').length;

  return(<div style={{marginBottom:12}}>
    {/* Header clicável */}
    <button onClick={()=>setAberta(a=>{if(!a)setTimeout(carregar,50);return!a;})}
      style={{width:'100%',background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'10px 14px',display:'flex',justifyContent:'space-between',alignItems:'center',cursor:'pointer'}}>
      <div style={{fontSize:12,fontWeight:700,color:C.text}}>
        {String.fromCodePoint(128197)} Notificações do mês
      </div>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        {!aberta&&nots.length>0&&<span style={{fontSize:11,color:C.muted}}>{nots.length} registros</span>}
        <span style={{fontSize:14,color:C.muted}}>{aberta?String.fromCodePoint(9650):String.fromCodePoint(9660)}</span>
      </div>
    </button>

    {aberta&&(<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:'0 0 12px 12px',borderTop:'none',overflow:'hidden'}}>
      {/* Navegação de mês */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'8px 14px',borderBottom:'1px solid '+C.border}}>
        <button onClick={()=>navMes(-1)} style={{background:'none',border:'none',color:C.teal,fontSize:18,cursor:'pointer',padding:'0 4px'}}>{String.fromCodePoint(8249)}</button>
        <div style={{fontSize:13,fontWeight:700,color:C.text}}>{MESES[mes-1]}/{ano}</div>
        <button onClick={()=>navMes(1)} style={{background:'none',border:'none',color:mes===hoje.getMonth()+1&&ano===hoje.getFullYear()?C.muted:C.teal,fontSize:18,cursor:'pointer',padding:'0 4px'}}
          disabled={mes===hoje.getMonth()+1&&ano===hoje.getFullYear()}>{String.fromCodePoint(8250)}</button>
      </div>

      {/* Resumo rápido */}
      {nots.length>0&&<div style={{display:'flex',gap:8,padding:'8px 14px',borderBottom:'1px solid '+C.border}}>
        <span style={{fontSize:11,background:C.red+'15',color:C.red,borderRadius:6,padding:'2px 8px',fontWeight:700}}>SP+CCIH: {spCount}</span>
        <span style={{fontSize:11,background:C.muted+'15',color:C.muted,borderRadius:6,padding:'2px 8px',fontWeight:700}}>Adm: {admCount}</span>
        <span style={{fontSize:11,background:C.teal+'15',color:C.teal,borderRadius:6,padding:'2px 8px',fontWeight:700}}>Total: {nots.length}</span>
      </div>}

      {/* Tabela */}
      {loading&&<div style={{textAlign:'center',padding:16,color:C.muted,fontSize:12}}><Dots/></div>}
      {!loading&&nots.length===0&&<div style={{textAlign:'center',padding:16,color:C.muted,fontSize:12}}>Nenhuma notificação neste mês</div>}
      {!loading&&nots.map((n,i)=>{
        const tag=getTag(n);
        const data=n.event_date?new Date(n.event_date+'T12:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'}):'--';
        const titulo=(n.event_subtype||n.description||'Notificação').slice(0,45);
        const pacInfo=n.admission_reason?n.admission_reason.split('|')[0].trim():'';
        return(<div key={n.id||i} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 14px',borderBottom:i<nots.length-1?'1px solid '+C.border+'55':'none',cursor:'pointer'}}
          onClick={()=>onSelect&&onSelect(n)}>
          <span style={{fontSize:10,background:tag.c+'20',color:tag.c,borderRadius:4,padding:'2px 5px',fontWeight:700,flexShrink:0,minWidth:34,textAlign:'center'}}>{tag.l}</span>
          <span style={{fontSize:11,color:C.muted,flexShrink:0,fontFamily:'monospace',width:36}}>{data}</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,color:C.text,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{titulo}</div>
            {pacInfo&&<div style={{fontSize:10,color:C.muted,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{pacInfo}</div>}
          </div>
          <span style={{fontSize:10,color:C.muted,flexShrink:0}}>{n.sector||''}</span>
        </div>);
      })}
    </div>)}
  </div>);
}

        <button onClick={loadNots} style={{background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'5px 10px',color:C.teal,fontSize:11,fontWeight:700,cursor:'pointer'}}>Atualizar</button>
      </div>
      <div style={{display:'flex',gap:6,marginBottom:12}}>
        {[['all','Todas',notifications.length],['test','Teste',testCount],['prod','Prod',notifications.length-testCount]].map(([id,label,count])=>(
          <button key={id} onClick={()=>setFilterTest(id)} style={{flex:1,padding:'6px 8px',borderRadius:8,border:'none',background:filterTest===id?C.teal:C.surface,color:filterTest===id?'#06101F':C.muted,fontSize:10,fontWeight:700,cursor:'pointer'}}>{label} ({count})</button>

      </div>
      {testCount>0&&<button onClick={clearTests} style={{width:'100%',background:confirmClear?C.red:C.red+'22',border:'1px solid '+C.red+'55',borderRadius:10,padding:'10px',color:confirmClear?'#fff':C.red,fontWeight:700,fontSize:12,cursor:'pointer',marginBottom:12}}>

      </button>}
      {loading&&<div style={{textAlign:'center',color:C.muted,fontSize:12,padding:20}}>Carregando...</div>}
      {!loading&&filtered.length===0&&<div style={{textAlign:'center',color:C.muted,fontSize:12,padding:20}}>Nenhuma notificacao</div>}
      {filtered.slice(0,20).map(n=>{const tag=getTag(n);const title=getTitle(n);return(
        <div key={n.id} style={{background:C.surface,border:'1px solid '+C.border,borderRadius:10,padding:'10px 12px',marginBottom:6,display:'flex',alignItems:'center',gap:10}}>
          <div style={{background:tag.color+'22',color:tag.color,borderRadius:5,padding:'2px 6px',fontSize:9,fontWeight:700,minWidth:38,textAlign:'center'}}>{tag.label}</div>
          {n.is_test&&<div style={{background:C.yellow+'22',color:C.yellow,borderRadius:5,padding:'2px 6px',fontSize:9,fontWeight:700}}>TESTE</div>}
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{title}</div>
            <div style={{fontSize:10,color:C.muted}}>{n.sector} · {formatTime(n.event_date?n.event_date+'T12:00:00':n.created_at)}</div>
          </div>
          {n.is_test&&<button onClick={()=>promover(n.id)} disabled={deleting===n.id} title='Promover para producao' style={{background:C.green+'22',border:'1px solid '+C.green+'44',borderRadius:6,padding:'4px 8px',cursor:'pointer',color:C.green,fontSize:9,fontWeight:700,flexShrink:0}}>{deleting===n.id?'...':'Promover'}</button>}
          <button onClick={()=>del(n.id)} disabled={deleting===n.id} style={{background:'none',border:'none',cursor:'pointer',padding:6,display:'flex'}}>
            <IconTrash size={14} color={deleting===n.id?C.muted:C.red}/>
          </button>
        </div>
      );})}
    </div>

    <PinManager sbUrl={sbUrl} sbKey={sbKey} showToast={showToast}/>
  </div>);
}

// Supabase Storage upload
function buildStoragePath(tipo, meta, originalName) {
  const ext = (originalName.includes('.')?originalName.split('.').pop():'pdf').toLowerCase();
  const safe = s => (s||'').replace(/[^a-zA-Z0-9\-_.]/g,'_').replace(/__+/g,'_').trim();
  const ano  = meta.ano       || String(new Date().getFullYear());
  const sem  = meta.semestre  || (new Date().getMonth()<6?'1':'2');
  const mes  = new Date().toLocaleDateString('pt-BR',{month:'short',year:'2-digit'}).replace(/\. |\./, '');
  if(tipo==='protocolo') return `protocolos/${ano}/${sem}S/${meta.crit||'XX'}-${safe((meta.nomeProt||'').slice(0,20))}-Rev${mes}.${ext}`;
  if(tipo==='treinamento') return `treinamentos/${ano}/${sem}S/${safe((meta.subnucleo||'nsp').slice(0,15))}/${meta.data||new Date().toISOString().slice(0,10)}${meta.participantes?'_'+meta.participantes+'p':''}.${ext}`;
  if(tipo==='relatorio') return `relatorios/${ano}/${sem}S/RelatorioSemestral-DEMO-${ano}-${sem}S.xlsx`;
  return `outros/${Date.now()}_${safe(originalName)}`;
}

async function uploadToStorage(file, tipo, meta, sbUrl, sbKey) {
  const path = buildStoragePath(tipo, meta, file.name);
  const resp = await fetch(`${sbUrl}/storage/v1/object/nsp-documentos/${path}`, {
    method:'POST',
    headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':file.type||'application/octet-stream','x-upsert':'true'},
    body: file,
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error||`Upload falhou (${resp.status})`);}
  return `${sbUrl}/storage/v1/object/public/nsp-documentos/${path}`;
}

function StorageUploadBtn({tipo, meta, sbUrl, sbKey, onUploaded, label='Anexar'}) {
  const [st,setSt]=useState(null);
  const [msg,setMsg]=useState('');
  const ref=React.useRef();
  const handle=async(e)=>{
    const file=e.target.files?.[0];
    if(!file)return;
    setSt('uploading');setMsg('Enviando...');
    try{
      const link=await uploadToStorage(file,tipo,meta,sbUrl,sbKey);
      setSt('done');setMsg('OK Salvo');
      onUploaded(link);
    }catch(err){setSt('error');setMsg('X '+err.message);}
    e.target.value='';
  };
  return(<div style={{display:'flex',alignItems:'center',gap:6}}>
    <input type='file' ref={ref} onChange={handle} style={{display:'none'}} accept='.pdf,.doc,.docx,.xls,.xlsx,.png,.jpg,.jpeg'/>
    <button onClick={()=>ref.current?.click()} disabled={st==='uploading'}
      style={{padding:'6px 12px',background:C.card,border:'1px solid '+C.border,borderRadius:8,color:st==='done'?C.green:C.muted,fontSize:11,fontWeight:700,cursor:st==='uploading'?'default':'pointer',whiteSpace:'nowrap'}}>
      {st==='uploading'?'Enviando...':label}
    </button>
    {msg&&<span style={{fontSize:10,color:st==='done'?C.green:st==='error'?C.red:C.muted}}>{msg}</span>}
  </div>);
}

async function sbUpsertDSM(sbUrl, sbKey, tabela, data, onConflict) {
  const res = await fetch(`${sbUrl}/rest/v1/${tabela}`, {
    method:'POST',
    headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':'application/json',
              'Prefer':'resolution=merge-duplicates,return=minimal','on-conflict':onConflict},
    body:JSON.stringify(data),
  });
  if(!res.ok){const t=await res.text();throw new Error(t);}
  return true;
}

function dsmPct(n,d){if(!d||d===0)return null;return((n||0)/d*100).toFixed(1);}
function dsmSum(rows,f){return rows.reduce((a,r)=>a+(Number(r[f])||0),0);}
function dsmContain(str,terms){const s=(str||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');return terms.some(t=>s.includes(t.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')));}

function ProtocolosView({sbUrl,sbKey,showToast,hospital}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const [registros,setRegistros]=useState({});
  const [cfg,setCfg]=useState({});
  const [loading,setLoading]=useState(false);
  const [editando,setEditando]=useState({});
  const [hoje]=useState(new Date().toISOString().slice(0,10));

  const carregar=async()=>{
    if(!sbUrl||!sbKey)return;
    setLoading(true);
    try{
      const [prots,cfgData]=await Promise.all([
        sbSelect(sbUrl,sbKey,'protocolos',`hospital_id=eq.${h.id}&select=*`).catch(()=>[]),
        fetch(`${sbUrl}/rest/v1/config_dsm?hospital_id=eq.${h.id}&select=*`,{headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey}}).then(r=>r.json()).then(d=>d&&d[0]?d[0]:{}).catch(()=>{}),
      ]);
      const map={};(prots||[]).forEach(p=>{map[p.nome]=p;});
      setRegistros(map);setCfg(cfgData||{});
    }catch(e){showToast('Erro: '+e.message,'error');}
    setLoading(false);
  };
  useEffect(()=>{carregar();},[sbUrl,sbKey]);

  const abrirEdit=(def)=>{
    const r=registros[def.nome];
    setEditando(e=>({...e,[def.crit]:{aprovado_em:r?.aprovado_em||'',link:r?.link||'',responsavel:r?.responsavel||'',numero:r?.numero||'',saving:false}}));
  };
  const setEdit=(crit,k,v)=>setEditando(e=>({...e,[crit]:{...e[crit],[k]:v}}));

  const salvar=async(def)=>{
    const ed=editando[def.crit];
    if(!ed?.aprovado_em){showToast('Informe a data de aprovacao','error');return;}
    setEditando(e=>({...e,[def.crit]:{...e[def.crit],saving:true}}));
    try{
      const prox=new Date(ed.aprovado_em);prox.setFullYear(prox.getFullYear()+3);
      const payload={hospital_id:h.id,nome:def.nome,aprovado_em:ed.aprovado_em,proxima_revisao:prox.toISOString().slice(0,10),link:ed.link||null,responsavel:ed.responsavel||null,numero:ed.numero||null,categoria:def.sub,status:'ativo'};
      const existente=registros[def.nome];
      if(existente){await sbPatch(sbUrl,sbKey,'protocolos',`id=eq.${existente.id}`,payload);}
      else{await sbInsert(sbUrl,sbKey,'protocolos',payload);}
      showToast('Protocolo salvo!','success');
      setEditando(e=>{const n={...e};delete n[def.crit];return n;});
      carregar();
    }catch(e){showToast('Erro: '+e.message,'error');}
    setEditando(e=>({...e,[def.crit]:{...e[def.crit],saving:false}}));
  };

  const getStatus=(def)=>{
    const naMap={C6:!cfg.tem_centro_cirurgico,C7:!cfg.tem_internacao,C10:!cfg.tem_cvc,C11:!cfg.tem_cvd,C12:!cfg.tem_uti,C13:!cfg.tem_centro_cirurgico};
    if(naMap[def.crit])return'na';
    const r=registros[def.nome];
    if(!r||!r.aprovado_em)return'missing';
    const prox=r.proxima_revisao||new Date(new Date(r.aprovado_em).setFullYear(new Date(r.aprovado_em).getFullYear()+3)).toISOString().slice(0,10);
    if(prox<hoje)return'vencido';
    if(prox<=new Date(Date.now()+60*86400000).toISOString().slice(0,10))return'proximo';
    return'ok';
  };

  const ST={ok:{label:'Valido',color:C.green},proximo:{label:'Vence em 60d',color:C.yellow},vencido:{label:'VENCIDO',color:C.red},missing:{label:'Nao cadastrado',color:C.muted},na:{label:'N/A',color:C.muted}};
  const vencidos=PROTOCOLOS_DSM.filter(d=>getStatus(d)==='vencido');
  const faltando=PROTOCOLOS_DSM.filter(d=>getStatus(d)==='missing');
  const inp={background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'8px 10px',color:C.text,fontSize:12,outline:'none',width:'100%'};

  return(<div style={{padding:'16px 0 80px',display:'flex',flexDirection:'column',gap:10}}>
    <BackHeader title='Protocolos Institucionais' subtitle='Controle de validade - RDC 36/2013'/>
    {vencidos.length>0&&<div style={{background:C.red+'15',border:'1px solid '+C.red+'44',borderRadius:12,padding:'12px 14px'}}>
      <div style={{fontSize:13,fontWeight:700,color:C.red,marginBottom:4}}>{vencidos.length} protocolo(s) com revisao vencida</div>
      {vencidos.map(d=>{const r=registros[d.nome];return(<div key={d.crit} style={{fontSize:12,color:C.muted}}>- {d.nome} - venceu em {r?.proxima_revisao?new Date(r.proxima_revisao+'T12:00:00').toLocaleDateString('pt-BR'):'-'}</div>);})}
    </div>}
    {faltando.length>0&&<div style={{background:C.yellow+'10',border:'1px solid '+C.yellow+'33',borderRadius:12,padding:'10px 14px'}}>
      <div style={{fontSize:12,color:C.muted}}>{faltando.length} protocolo(s) sem data cadastrada.</div>
    </div>}
    {loading&&<div style={{textAlign:'center',color:C.muted,padding:20}}>Carregando...</div>}
    {PROTOCOLOS_DSM.map(def=>{
      const st=getStatus(def);const {label,color}=ST[st];
      const r=registros[def.nome];const ed=editando[def.crit];
      const isNA=st==='na';
      return(<div key={def.crit} style={{background:C.card,border:'1px solid '+color+'44',borderRadius:14,padding:'12px 14px',borderLeft:'4px solid '+color,opacity:isNA?0.55:1}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
              <span style={{background:C.teal+'22',color:C.teal,borderRadius:5,padding:'1px 7px',fontSize:10,fontWeight:800}}>{def.crit}</span>
              <span style={{fontSize:13,fontWeight:700,color:C.text}}>{def.nome}</span>
            </div>
            <div style={{fontSize:10,color:C.muted}}>{def.base}</div>

            {!isNA&&!ed&&<button onClick={()=>abrirEdit(def)} style={{background:C.card,border:'1px solid '+C.border,borderRadius:7,padding:'4px 10px',color:C.muted,fontSize:11,cursor:'pointer',fontWeight:700}}>{r?'Editar':'+ Registrar'}</button>}
