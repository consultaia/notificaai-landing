async function sbReq(url,key,path,opts={}) {
  const res=await fetch(`${url}/rest/v1${path}`,{...opts,headers:{
    'Content-Type':'application/json',apikey:key,Authorization:`Bearer ${key}`,Prefer:'return=representation',...(opts.headers||{})
  }});
  if(!res.ok){const t=await res.text();throw new Error(`Supabase ${res.status}: ${t}`);}
  if(res.status===204) return [];
  const t=await res.text(); return t?JSON.parse(t):[];
}

async function hashPin(pin) {
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(pin+'notificaai_salt_2025'));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function formatTime(iso){
  if(!iso) return '-';
  const diff=Date.now()-new Date(iso).getTime();
  if(diff<3600000) return Math.floor(diff/60000)+'min';
  if(diff<86400000) return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
  return new Date(iso).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
}

function computeStats(notifications) {
  const now=new Date(),tm=now.getMonth(),ty=now.getFullYear();
  const pm=tm===0?11:tm-1,py=tm===0?ty-1:ty;
  const isTM=n=>{const d=new Date(n.event_date?n.event_date+'T12:00:00':n.created_at);return d.getMonth()===tm&&d.getFullYear()===ty;};
  const isPM=n=>{const d=new Date(n.event_date?n.event_date+'T12:00:00':n.created_at);return d.getMonth()===pm&&d.getFullYear()===py;};
  const thisM=notifications.filter(isTM),prevM=notifications.filter(isPM);
  const isValid=n=>n.notification_type==='seguranca_paciente'||n.notification_type==='ccih'||n.notification_type==='administrativa';const total=thisM.filter(isValid).length,totalPrev=prevM.filter(isValid).length;
  const sp=thisM.filter(n=>n.notification_type==='seguranca_paciente'||n.notification_type==='ccih').length;
  const ccih=0;
  const adm=thisM.filter(n=>n.notification_type==='administrativa').length;
  const sentinela=notifications.filter(n=>n.gravidade==='Evento sentinela').length;
  const semRCA=notifications.filter(n=>n.notification_type==='seguranca_paciente'&&!n.rca_gerado).length;
  const sm={};notifications.forEach(n=>{if(n.sector)sm[n.sector]=(sm[n.sector]||0)+1;});
  const SETOR_NOMES={'UPG':'UPG (Unidade de Pacientes Graves)','SEP':'SEP (Servico de Estabilizacao de Pacientes)','CC':'Centro Cirurgico','Centro Cirurgico':'Centro Cirurgico','Ala A':'Ala A','Oncologia':'Oncologia','Geral':'Hospital Demonstracao'};
  const sectorData=Object.entries(sm).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([k,v])=>({setor:k==='Centro Cirurgico'?'CC':k,setorNome:SETOR_NOMES[k]||k,eventos:v}));
  const tm2={};notifications.forEach(n=>{const t=n.event_subtype||n.occurrence_subtype||'outros';const l=t.charAt(0).toUpperCase()+t.slice(1);tm2[l]=(tm2[l]||0)+1;});
  const tc=['#EF4444','#F59E0B','#8B5CF6','#1D6FE8','#10B981','#5A7AA0'];
  const typeData=Object.entries(tm2).sort((a,b)=>b[1]-a[1]).slice(0,6).map(([name,value],i)=>({name,value,color:tc[i]}));
  const TURNOS=['Manhã','Tarde','Noite'];
  const heatmap=TURNOS.map(t=>({turno:t,v:[0,0,0,0,0,0,0]}));
  notifications.forEach(n=>{
    if(!n.event_date||!n.shift) return;
    const day=new Date(n.event_date+'T12:00:00').getDay();
    const si=TURNOS.indexOf(n.shift);
    if(si>=0) heatmap[si].v[day]++;
  });
  let pv=0,pt='',pd='';
  heatmap.forEach(row=>row.v.forEach((v,di)=>{if(v>pv){pv=v;pt=row.turno;pd=DIAS[di];}}));
  const heatmapPeak=pv>0?{turno:pt,dia:pd,val:pv}:null;
  const mm={};
  notifications.forEach(n=>{
    const d=new Date(n.created_at);
    const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const label=d.toLocaleDateString('pt-BR',{month:'short'});
    if(!mm[k]) mm[k]={mes:label,sp:0,adm:0,ccih:0};
    if(n.notification_type==='seguranca_paciente'||n.notification_type==='ccih') mm[k].sp++;
    else mm[k].adm++;
  });
  const monthly=Object.entries(mm).sort(([a],[b])=>a.localeCompare(b)).slice(-6).map(([,v])=>v);
  const critSector=sectorData.reduce((m,s)=>s.eventos>m.eventos?s:m,sectorData[0]||{setor:'-',eventos:0});
  const isSentinela=n=>n.gravidade==='Evento sentinela'||n.event_subtype==='Evento sentinela'||n.occurrence_subtype==='Evento sentinela';
  const sevts=notifications.filter(isSentinela).sort((a,b)=>new Date(b.event_date||b.created_at)-new Date(a.event_date||a.created_at));
  const diasSemSentinela=sevts.length>0?Math.floor((Date.now()-new Date(sevts[0].event_date||sevts[0].created_at))/86400000):null;
  const nmCount=notifications.filter(n=>n.gravidade==='Near miss').length;
  const concl=notifications.filter(n=>n.status==='concluido').length;
  const nSets=new Set(notifications.map(n=>n.sector).filter(Boolean)).size;
  const ratioNM=notifications.length>0?Math.round(nmCount/notifications.length*100):0;
  const txC=notifications.length>0?Math.round(concl/notifications.length*100):0;
  const culturaScore=Math.min(100,Math.round(ratioNM*0.4+txC*0.4+Math.min(nSets,5)/5*20));
  return{total,totalPrev,sp,ccih,adm,sentinela,semRCA,sectorData,typeData,heatmap,heatmapPeak,monthly,critSector,diasSemSentinela,culturaScore,ratioNM,txC,nSets};
}

async function callWorker(messages,system) {
  const converted=messages.map(m=>({role:m.role==='assistant'?'assistant':'user',content:m.content}));
  const fi=converted.findIndex(m=>m.role==='user');
  const filtered=fi>=0?converted.slice(fi):converted;
  const msgs=[];
  if(system) msgs.push({role:'system',content:system});
  filtered.forEach(m=>msgs.push(m));
  if(msgs.length===0||(msgs.length===1&&msgs[0].role==='system')) return 'Olá! Como posso ajudá-lo?';
  try {
    const res=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:msgs})});
    const data=await res.json();
    if(data.error) throw new Error(data.error.message||JSON.stringify(data.error));
    return data.choices?.[0]?.message?.content||'Erro ao processar.';
  } catch(e) { console.error('Worker:',e); if(e.message?.includes('fetch')||e.name==='TypeError') return 'Erro: Worker IA indisponivel. Verifique se o Cloudflare Worker esta ativo em https://dash.cloudflare.com'; return 'Erro ao processar: '+e.message; }
}
async function extractData(chatMsgs,hospital) {
  const hoje=new Date().toLocaleDateString('pt-BR',{weekday:'long',year:'numeric',month:'2-digit',day:'2-digit'});
  const hojeISO=new Date().toISOString().slice(0,10);
  const ontemISO=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const sys=`Extraia os dados da conversa como JSON puro (sem markdown, sem explicação).
Formato:{"notifier_type":"profissional"|"paciente"|"familiar","notification_type":"seguranca_paciente"|"ccih"|"administrativa","sector":"string","event_date":"YYYY-MM-DD"|null,"event_time":"HH:MM"|null,"shift":"Manhã"|"Tarde"|"Noite"|null,"description":"string","measures_taken":"string"|null,"event_subtype":"string"|null,"patient_outcome":"string"|null,"was_preventable":true|false|null,"occurrence_subtype":"string"|null,"patient_age":null,"admission_reason":null,"infection_topography":null,"invasive_procedure":null,"microorganism":null,"is_test":false,"ai_summary":"string"}
DATA: ${hoje} (${hojeISO}). "hoje"=${hojeISO}, "ontem"=${ontemISO}.`;
  const text=await callWorker([...chatMsgs,{role:'user',content:'Extraia os dados no formato JSON.'}],sys);
  try {
    const p=JSON.parse(text.replace(/```json|```/g,'').trim());
    if(hospital) p.hospital_id=hospital.id;
    return p;
  } catch { return null; }
}

  return(<div style={{position:'fixed',top:16,left:'50%',transform:'translateX(-50%)',background:bg,color:'#fff',borderRadius:12,padding:'12px 20px',fontSize:13,fontWeight:700,zIndex:9999,maxWidth:340,textAlign:'center',boxShadow:'0 4px 24px '+bg+'66',whiteSpace:'pre-wrap'}}>{msg}</div>);
}
function Dots({color}) {
  return(<div style={{display:'flex',gap:5,padding:'13px 16px',background:C.card,border:'1px solid '+C.border,borderRadius:'16px 16px 16px 4px',width:'fit-content'}}>
    {[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:'50%',background:color||C.teal,animation:'pulse 1.2s '+(i*0.2)+'s ease-in-out infinite'}}/>)}
  </div>);
}
function LineChart({data,lines,height=150}) {
  if(!data||!data.length) return null;
  const all=data.flatMap(d=>lines.map(l=>d[l.key]||0));
  const maxV=Math.max(...all,1),w=300,h=height,pad=24;
  const xs=(w-pad*2)/Math.max(data.length-1,1);
  return(<svg viewBox={'0 0 '+w+' '+h} style={{width:'100%',height}} preserveAspectRatio="none">
    {lines.map(line=>{
      const pts=data.map((d,i)=>{const x=pad+i*xs;const y=h-pad-((d[line.key]||0)/maxV)*(h-pad*2);return`${x},${y}`;}).join(' ');
      return<polyline key={line.key} points={pts} fill="none" stroke={line.color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>;
    })}
    {data.map((d,i)=><text key={i} x={pad+i*xs} y={h-4} textAnchor="middle" fontSize="9" fill="#5A7AA0">{d.mes}</text>)}
  </svg>);
}
function BarChart({data,xKey,yKey,color,height=150}) {
  if(!data||!data.length) return null;
  const maxV=Math.max(...data.map(d=>d[yKey]||0),1),w=300,h=height,pad=24;
  const bw=(w-pad*2)/data.length-4;
  return(<svg viewBox={'0 0 '+w+' '+h} style={{width:'100%',height}}>
    {data.map((d,i)=>{
      const bh=((d[yKey]||0)/maxV)*(h-pad*2),x=pad+i*((w-pad*2)/data.length)+2,y=h-pad-bh;
      return(<g key={i}><rect x={x} y={y} width={bw} height={bh} fill={color} rx="3" opacity="0.85"/>
        <text x={x+bw/2} y={h-4} textAnchor="middle" fontSize="9" fill="#5A7AA0">{d[xKey]}</text>
        {bh>12&&<text x={x+bw/2} y={y+10} textAnchor="middle" fontSize="9" fill="#fff">{d[yKey]}</text>}
      </g>);
    })}
  </svg>);
}
function PieChart({data,size=160}) {
  if(!data||!data.length) return null;
  const total=data.reduce((s,d)=>s+(d.value||0),0)||1;
  const cx=size/2,cy=size/2,r=size*0.38;
  let angle=-Math.PI/2;
  const slices=data.map(d=>{
    const sweep=(d.value/total)*2*Math.PI;
    const x1=cx+r*Math.cos(angle),y1=cy+r*Math.sin(angle);
    angle+=sweep;
    const x2=cx+r*Math.cos(angle),y2=cy+r*Math.sin(angle);
    return{path:`M${cx},${cy} L${x1},${y1} A${r},${r} 0 ${sweep>Math.PI?1:0},1 ${x2},${y2} Z`,color:d.color,name:d.name,pct:Math.round(d.value/total*100)};
  });
  return(<div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
    <svg viewBox={'0 0 '+size+' '+size} style={{width:size,height:size,flexShrink:0}}>
      {slices.map((s,i)=><path key={i} d={s.path} fill={s.color} stroke={C.card} strokeWidth="1.5"/>)}
    </svg>
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {slices.map((s,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:6}}>
        <div style={{width:10,height:10,borderRadius:2,background:s.color,flexShrink:0}}/>
        <span style={{fontSize:11,color:C.muted}}>{s.name} <span style={{color:C.text,fontWeight:700}}>{s.pct}%</span></span>
      </div>)}
    </div>
  </div>);
}
function HeatCell({value,maxVal}) {
  const t=maxVal>0?Math.min((value||0)/maxVal,1):0;
  const bg=t===0?C.surface:t<0.2?'#D1FAE5':t<0.4?'#6EE7B7':t<0.6?'#FCD34D':t<0.8?'#F97316':'#EF4444';
  const tc=t===0?C.muted:t<0.4?'#065F46':t<0.6?'#78350F':'#fff';
  return(<div style={{background:bg,borderRadius:6,height:40,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:tc}}>{value||0}</div>);
}

function PinModal({sbUrl,sbKey,onSuccess,onClose}) {
  const [pin,setPin]=useState('');
  const [error,setError]=useState(false);
  const [loading,setLoading]=useState(false);
  const ref=useRef(null);
  useEffect(()=>{setTimeout(()=>ref.current?.focus(),100);},[]);

  const check=async()=>{
    if(loading||!pin) return;
    setLoading(true);
    let matched=null;
    if(IS_DEMO){
      if(pin==='54321') matched={key:'gestor',label:'Gestor Demo',color:PROFILES.gestor?.color||C.teal,icon:PROFILES.gestor?.icon||'[]'};
      else if(pin==='12345') matched={key:'membro_nsp',label:'Membro Demo',color:PROFILES.membro_nsp?.color||C.teal,icon:PROFILES.membro_nsp?.icon||'[]'};
    }
    else if(sbUrl&&sbKey) {
      try {
        const h=await hashPin(pin);
        const rows=await sbSelect(sbUrl,sbKey,'nsp_usuarios',`pin_hash=eq.${h}&ativo=eq.true&limit=1`);
        if(rows&&rows[0]) {
          const perfil=rows[0].perfil||'gestor';
          matched={key:perfil,label:rows[0].nome,color:PROFILES[perfil]?.color||C.teal,icon:PROFILES[perfil]?.icon||'[]'};
          sbPatch(sbUrl,sbKey,'nsp_usuarios',`id=eq.${rows[0].id}`,{ultimo_acesso:new Date().toISOString()}).catch(()=>{});
        }
      } catch(e) { console.warn('PIN Supabase falhou, usando local',e); }
    }
    if(!matched) {
      const lm=Object.entries(PROFILES).find(([,p])=>p.pin===pin);
      if(lm) matched={key:lm[0],label:lm[1].label,color:lm[1].color,icon:lm[1].icon};
    }
    setLoading(false);
    if(matched) onSuccess(matched.key,matched);
    else { setError(true); setPin(''); setTimeout(()=>setError(false),1200); }
  };

  return(<div style={{position:'fixed',inset:0,background:'#000c',zIndex:300,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
    <div style={{background:C.surface,borderRadius:20,padding:'32px 24px',width:'100%',maxWidth:320,border:'1px solid '+(error?C.red:C.border),transition:'border-color 0.3s',textAlign:'center'}}>
      <div style={{fontSize:36,marginBottom:12}}>{String.fromCodePoint(128272)}</div>
      <div style={{fontSize:16,fontWeight:800,color:C.text,marginBottom:6}}>Área Restrita</div>
      <div style={{fontSize:12,color:C.muted,marginBottom:18}}>Gestor · DSG · Motorista · Enfermeiro</div>
      <div style={{display:'flex',gap:6,justifyContent:'center',flexWrap:'wrap',marginBottom:18}}>
        {Object.entries(PROFILES).map(([k,p])=>(
          <div key={k} style={{background:p.color+'15',border:'1px solid '+p.color+'33',borderRadius:6,padding:'3px 8px',fontSize:10,color:p.color,fontWeight:700}}>{p.icon} {p.label}</div>
        ))}
      </div>
      <input ref={ref} type="password" value={pin} onChange={e=>setPin(e.target.value)} onKeyDown={e=>e.key==='Enter'&&check()} placeholder="****" maxLength={8}
        style={{width:'100%',background:C.card,border:'1px solid '+(error?C.red:C.border),borderRadius:12,padding:'14px',color:C.text,fontSize:24,textAlign:'center',letterSpacing:'0.4em',outline:'none',marginBottom:8}}/>
      {error&&<div style={{fontSize:12,color:C.red,marginBottom:8}}>PIN incorreto.</div>}
      <div style={{display:'flex',gap:10,marginTop:8}}>
        <button onClick={onClose} style={{flex:1,background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'12px',color:C.muted,fontWeight:600,fontSize:13,cursor:'pointer'}}>Cancelar</button>
        <button onClick={check} disabled={loading} style={{flex:2,background:C.teal,border:'none',borderRadius:10,padding:'12px',color:'#06101F',fontWeight:800,fontSize:13,cursor:'pointer'}}>{loading?'Aguarde Verificando...':'Entrar'}</button>
      </div>
    </div>
  </div>);
}

function PinManager({sbUrl,sbKey,showToast}) {
  const [users,setUsers]=useState([]);
  const [loading,setLoading]=useState(false);
  const [showForm,setShowForm]=useState(false);
  const [editing,setEditing]=useState(null);
  const [form,setForm]=useState({nome:'',pin:'',confirma:'',perfil:'gestor',ativo:true});
  const [saving,setSaving]=useState(false);
  const [deleting,setDeleting]=useState(null);

  const load=async()=>{
    if(!sbUrl||!sbKey){setUsers([]);return;}
    setLoading(true);
    try{const d=await sbSelect(sbUrl,sbKey,'nsp_usuarios','order=created_at.asc');setUsers(d||[]);}
    catch{showToast('Erro ao carregar usuários','error');}
    setLoading(false);
  };
  useEffect(()=>{load();},[sbUrl,sbKey]);

  const openForm=(u=null)=>{
    setEditing(u?u.id:null);
    setForm(u?{nome:u.nome,pin:'',confirma:'',perfil:u.perfil||'gestor',ativo:u.ativo!==false}:{nome:'',pin:'',confirma:'',perfil:'gestor',ativo:true});
    setShowForm(true);
  };
  const save=async()=>{
    if(!form.nome.trim()){showToast('Nome obrigatório','error');return;}
    if(!editing&&!form.pin){showToast('PIN obrigatório','error');return;}
    if(form.pin&&form.pin.length!==4){showToast('PIN deve ter 4 dígitos','error');return;}
    if(form.pin&&form.pin!==form.confirma){showToast('PINs não coincidem','error');return;}
    if(form.pin&&!/^\d{4}$/.test(form.pin)){showToast('Só números no PIN','error');return;}
    setSaving(true);
    try{
      const payload={nome:form.nome,perfil:form.perfil,ativo:form.ativo};
      if(form.pin) payload.pin_hash=await hashPin(form.pin);
      if(form.pin&&!editing){
        const ex=await sbSelect(sbUrl,sbKey,'nsp_usuarios',`pin_hash=eq.${await hashPin(form.pin)}&limit=1`);
        if(ex&&ex.length>0){showToast('Este PIN já está em uso','error');setSaving(false);return;}
      }
      if(editing) await sbPatch(sbUrl,sbKey,'nsp_usuarios',`id=eq.${editing}`,payload);
      else await sbInsert(sbUrl,sbKey,'nsp_usuarios',payload);
      await load(); setShowForm(false); showToast('OK Usuário salvo!','success');
    }catch(e){showToast('Erro: '+e.message,'error');}
    setSaving(false);
  };
  const del=async(id)=>{
    if(!confirm('Remover este usuário?')) return;
    setDeleting(id);
    try{await sbDelete(sbUrl,sbKey,'nsp_usuarios',`id=eq.${id}`);await load();showToast('OK Removido','success');}
    catch{showToast('Erro ao remover','error');}
    setDeleting(null);
  };

  const inp={background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'10px 12px',color:C.text,fontSize:13,outline:'none',width:'100%',marginBottom:10};

  if(!sbUrl||!sbKey) return(
    <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:16}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:8}}>{String.fromCodePoint(128272)+' Usuários e PINs'}</div>
      <div style={{fontSize:12,color:C.muted,lineHeight:1.7}}>Configure o Supabase para gerenciar usuários. PINs locais ativos:<br/>
        {Object.entries(PROFILES).map(([k,p])=><span key={k} style={{display:'inline-block',background:p.color+'15',color:p.color,borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:700,margin:'2px'}}>{p.icon} {p.label}: {p.pin}</span>)}
      </div>
    </div>
  );

  return(<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:16}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text}}>{String.fromCodePoint(128272)+' Usuários e PINs'}</div>
      <button onClick={()=>openForm()} style={{background:C.teal,border:'none',borderRadius:8,padding:'6px 12px',color:'#06101F',fontWeight:700,fontSize:12,cursor:'pointer'}}>+ Novo</button>
    </div>
    {showForm&&(
      <div style={{background:C.surface,border:'1px solid '+C.teal+'44',borderRadius:10,padding:14,marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>{editing?'Editar':'Novo'} usuário</div>
        <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Nome completo</label>
        <input value={form.nome} onChange={e=>setForm({...form,nome:e.target.value})} placeholder="Ex: Cap Janan - Gestor NSP" style={inp}/>
        <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>PIN (4 dígitos){editing?' - deixe em branco para manter':''}</label>
        <input type="password" value={form.pin} onChange={e=>setForm({...form,pin:e.target.value.replace(/\D/g,'').slice(0,4)})} placeholder="****" inputMode="numeric" style={inp}/>
        <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Confirmar PIN</label>
        <input type="password" value={form.confirma} onChange={e=>setForm({...form,confirma:e.target.value.replace(/\D/g,'').slice(0,4)})} placeholder="****" inputMode="numeric" style={inp}/>
        <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Perfil de acesso</label>
        <select value={form.perfil} onChange={e=>setForm({...form,perfil:e.target.value})} style={{...inp,appearance:'none'}}>
          <option value="gestor">Gestor - acesso total</option>
          <option value="dsg">DSG - apenas manutenção</option>
          <option value="motorista">Motorista - apenas ambulância</option>

          <button onClick={()=>sbPatch(sbUrl,sbKey,'nsp_usuarios','id=eq.'+u.id,{ativo:!u.ativo}).then(load)} style={{background:C.card,border:'1px solid '+C.border,borderRadius:6,padding:'5px 9px',color:u.ativo!==false?C.yellow:C.green,fontSize:11,cursor:'pointer'}}>{u.ativo!==false?'Off':'On'}</button>

        </div>
      </div>
    ))}
  </div>);
}

function CSVImporter({sbUrl,sbKey,showToast,onDone}) {
  const [step,setStep]=useState(1);
  const [csvData,setCsvData]=useState([]);
  const [cols,setCols]=useState([]);
  const [periodo,setPeriodo]=useState('');
  const [importados,setImportados]=useState(0);
  const CAMPOS=[
    {key:'event_date',label:'Data do evento',ob:true},
    {key:'notification_type',label:'Tipo (sp/ccih/adm)',ob:true},
    {key:'sector',label:'Setor',ob:true},
    {key:'gravidade',label:'Gravidade',ob:false},
    {key:'event_time',label:'Hora',ob:false},
    {key:'shift',label:'Turno',ob:false},
    {key:'description',label:'Descrição',ob:false},
    {key:'measures_taken',label:'Medidas tomadas',ob:false},
    {key:'patient_outcome',label:'Desfecho',ob:false},
    {key:'status',label:'Status',ob:false},
  ];
  const nm=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');
  const autoMap=cs=>{
    const m={};cs.forEach(c=>{CAMPOS.forEach(campo=>{const nc=nm(c),nk=nm(campo.key),nl=nm(campo.label);if(!m[campo.key]&&(nc.includes(nk)||nk.includes(nc)||nc.includes(nl)))m[campo.key]=c;});});return m;
  };
  const processFile=file=>{
    if(!file.name.toLowerCase().endsWith('.csv')){showToast('Envie um arquivo .csv','error');return;}
    window.Papa.parse(file,{header:true,skipEmptyLines:true,complete:(r)=>{
      setCsvData(r.data);setCols(r.meta.fields||[]);
      setTimeout(()=>{
        const am=autoMap(r.meta.fields||[]);
        Object.entries(am).forEach(([k,v])=>{const s=document.getElementById('map_'+k);if(s)s.value=v;});
      },100);
      setStep(2);
    },error:(e)=>showToast('Erro: '+e.message,'error')});
  };
  const getMapping=()=>{const m={};CAMPOS.forEach(c=>{const s=document.getElementById('map_'+c.key);if(s?.value)m[c.key]=s.value;});return m;};
  const executar=async()=>{
    const mp=getMapping();
    const regs=csvData.map(row=>{const r={};Object.entries(mp).forEach(([k,v])=>{r[k]=row[v]||null;});if(periodo)r.periodo_importado=periodo;return r;}).filter(r=>r.event_date||r.notification_type);
    let n=0;
    try{
      if(sbUrl&&sbKey){for(let i=0;i<regs.length;i+=100){await sbInsert(sbUrl,sbKey,'notifications',regs.slice(i,i+100));n+=Math.min(100,regs.length-i);}}
      else n=regs.length;
      const h=JSON.parse(localStorage.getItem('nai_imports')||'[]');
      h.unshift({data:new Date().toLocaleDateString('pt-BR'),registros:n,periodo});
      localStorage.setItem('nai_imports',JSON.stringify(h.slice(0,20)));
      setImportados(n);setStep(4);
    }catch(e){showToast('Erro: '+e.message,'error');}
  };
  const stepLabel=(n)=>({flex:1,textAlign:'center',padding:'8px 6px',borderRadius:8,fontSize:11,color:step===n?C.teal:step>n?C.green:C.muted,background:step===n?C.card:'transparent',border:step===n?'1px solid '+C.border:'none'});
  return(<div>
    <div style={{display:'flex',background:C.surface,border:'1px solid '+C.border,borderRadius:10,padding:3,gap:2,marginBottom:16}}>
      {['Upload','Colunas','Revisão','Concluído'].map((l,i)=><div key={i} style={stepLabel(i+1)}>{step>i+1?'Ok ':''}{l}</div>)}
    </div>
    {step===1&&(<div>
      <div style={{background:C.teal+'10',border:'1px solid '+C.teal+'33',borderRadius:10,padding:'10px 14px',marginBottom:14,fontSize:12,color:C.teal}}>
        i Google Sheets: <strong>Arquivo → Download → Valores separados por vírgula (.csv)</strong>
      </div>
      <div onClick={()=>document.getElementById('csvInput').click()} style={{border:'2px dashed '+C.border,borderRadius:12,padding:'36px 24px',textAlign:'center',cursor:'pointer'}}
        onDragOver={e=>e.preventDefault()} onDrop={e=>{e.preventDefault();if(e.dataTransfer.files[0])processFile(e.dataTransfer.files[0]);}}>
        <div style={{fontSize:32,marginBottom:8}}>{String.fromCodePoint(128194)}</div>
        <div style={{fontSize:14,fontWeight:600,color:C.text,marginBottom:4}}>Clique ou arraste o arquivo CSV</div>
        <div style={{fontSize:12,color:C.muted}}>Exportado do Google Sheets ou outro sistema</div>
        <input id="csvInput" type="file" accept=".csv" style={{display:'none'}} onChange={e=>{if(e.target.files[0])processFile(e.target.files[0]);}}/>
      </div>
      {JSON.parse(localStorage.getItem('nai_imports')||'[]').length>0&&(
        <div style={{marginTop:12}}>
          <div style={{fontSize:11,color:C.muted,marginBottom:6,textTransform:'uppercase',letterSpacing:'0.08em'}}>Importações anteriores</div>
          {JSON.parse(localStorage.getItem('nai_imports')||'[]').slice(0,3).map((h,i)=>(
            <div key={i} style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'8px 12px',marginBottom:4,display:'flex',justifyContent:'space-between',fontSize:12}}>
              <span style={{color:C.text}}>{h.data}{h.periodo?' · '+h.periodo:''}</span>
              <span style={{color:C.teal,fontWeight:700}}>{h.registros} registros</span>
            </div>
          ))}
        </div>
      )}
    </div>)}
    {step===2&&(<div>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Mapeie as colunas ({csvData.length} linhas)</div>
      {CAMPOS.map(c=>(
        <div key={c.key} style={{display:'grid',gridTemplateColumns:'1fr 16px 1fr',gap:8,alignItems:'center',marginBottom:8}}>
          <div style={{fontSize:12,color:C.text,background:C.surface,border:'1px solid '+C.border,borderRadius:7,padding:'7px 10px'}}>{c.label}{c.ob?' *':''}</div>
          <div style={{color:C.muted,textAlign:'center',fontSize:12}}>→</div>
          <select id={'map_'+c.key} style={{background:C.surface,border:'1px solid '+C.border,color:C.text,padding:'7px 10px',borderRadius:7,fontSize:12,outline:'none'}}>
            <option value="">- Não mapear -</option>
            {cols.map(col=><option key={col} value={col}>{col}</option>)}
          </select>
        </div>
      ))}
      <div style={{display:'flex',gap:8,marginTop:12}}>
        <button onClick={()=>setStep(1)} style={{flex:1,background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'9px',color:C.muted,fontSize:12,fontWeight:700,cursor:'pointer'}}>Voltar</button>
        <button onClick={()=>setStep(3)} style={{flex:2,background:C.teal,border:'none',borderRadius:8,padding:'9px',color:'#06101F',fontSize:12,fontWeight:800,cursor:'pointer'}}>Revisar →</button>
      </div>
    </div>)}
    {step===3&&(()=>{
      const mp=getMapping();
      const regs=csvData.map(row=>{const r={};Object.entries(mp).forEach(([k,v])=>{r[k]=row[v]||null;});return r;});
      return(<div>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:8}}>{regs.length} registros para importar</div>
        <div style={{marginBottom:10}}>
          <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Período de referência (opcional)</label>
          <input value={periodo} onChange={e=>setPeriodo(e.target.value)} placeholder="Ex: Jan-Jun 2024" style={{background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:12,outline:'none',width:'100%'}}/>
        </div>
        <div style={{maxHeight:180,overflowY:'auto',border:'1px solid '+C.border,borderRadius:8,marginBottom:12}}>
          {regs.slice(0,8).map((r,i)=>(
            <div key={i} style={{padding:'7px 12px',borderBottom:'1px solid '+C.border+'22',fontSize:12,color:C.muted}}>
              <span style={{color:C.text}}>{r.event_date||'-'}</span> · {r.notification_type||'-'} · {r.sector||'-'}
            </div>
          ))}
          {regs.length>8&&<div style={{padding:'7px 12px',fontSize:11,color:C.muted}}>+{regs.length-8} registros...</div>}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setStep(2)} style={{flex:1,background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'9px',color:C.muted,fontSize:12,fontWeight:700,cursor:'pointer'}}>Voltar</button>
          <button onClick={executar} style={{flex:2,background:C.teal,border:'none',borderRadius:8,padding:'9px',color:'#06101F',fontSize:12,fontWeight:800,cursor:'pointer'}}>{String.fromCodePoint(11014)+' Importar {regs.length} registros'}</button>
        </div>
      </div>);
    })()}
    {step===4&&(<div style={{textAlign:'center',padding:'32px 16px'}}>
      <div style={{fontSize:48,marginBottom:12}}>{String.fromCodePoint(9989)}</div>
      <div style={{fontSize:18,fontWeight:900,color:C.text,marginBottom:6}}>Importação concluída!</div>
      <div style={{fontSize:13,color:C.muted,marginBottom:20}}>{importados+' registros importados'+(periodo?' - '+periodo:'')}</div>
      <div style={{display:'flex',gap:8,justifyContent:'center'}}>
        <button onClick={()=>{setCsvData([]);setCols([]);setPeriodo('');setStep(1);}} style={{background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'10px 18px',color:C.muted,fontSize:13,fontWeight:700,cursor:'pointer'}}>Importar outro</button>
        <button onClick={onDone} style={{background:C.teal,border:'none',borderRadius:10,padding:'10px 18px',color:'#06101F',fontSize:13,fontWeight:800,cursor:'pointer'}}>Ver dashboard →</button>
      </div>
    </div>)}
  </div>);
}

function RCAPanel({notification,sbUrl,sbKey,showToast,onClose,onSaved}) {
  const [rca,setRca]=useState(null);
  const [loading,setLoading]=useState(false);
  const [tab,setTab]=useState('porques');
  const [saving,setSaving]=useState(false);

  const gerar=async()=>{
    setLoading(true);
    const prompt=`Voce e especialista em seguranca do paciente (ANVISA/ONA). Analise este incidente hospitalar e gere uma Analise de Causa Raiz (RCA) completa.

INCIDENTE:
- Tipo: ${notification.notification_type}
- Evento: ${notification.event_subtype||notification.occurrence_subtype||'nao especificado'}
- Setor: ${notification.sector}
- Descricao: ${(notification.description||'').replace(/"/g,"'")}
- Desfecho: ${notification.patient_outcome||'nao informado'}

RETORNE APENAS um objeto JSON valido, sem markdown, sem explicacoes, sem texto antes ou depois.
Use aspas duplas em todas as chaves e valores string.
NAO use aspas duplas dentro dos textos dos valores - use aspas simples se necessario.

Formato exato:
{"cinco_porques":[{"pergunta":"Por que ocorreu?","resposta":"TEXTO"},{"pergunta":"Por que isso aconteceu?","resposta":"TEXTO"},{"pergunta":"Por que isso aconteceu?","resposta":"TEXTO"},{"pergunta":"Por que isso aconteceu?","resposta":"TEXTO"},{"pergunta":"Causa raiz identificada:","resposta":"TEXTO"}],"ishikawa":[{"categoria":"Pessoa","cor":"#EF4444","causas":["CAUSA1","CAUSA2"]},{"categoria":"Processo","cor":"#F59E0B","causas":["CAUSA1","CAUSA2"]},{"categoria":"Equipamento","cor":"#8B5CF6","causas":["CAUSA1"]},{"categoria":"Ambiente","cor":"#1D6FE8","causas":["CAUSA1"]},{"categoria":"Gestao","cor":"#00C9B8","causas":["CAUSA1"]}],"fatores":[{"icone":"humano","tipo":"Fator humano","descricao":"TEXTO"},{"icone":"processo","tipo":"Fator de processo","descricao":"TEXTO"},{"icone":"ambiente","tipo":"Fator ambiental","descricao":"TEXTO"},{"icone":"gestao","tipo":"Fator organizacional","descricao":"TEXTO"}],"plano":[{"acao":"TEXTO","responsavel":"Coordenador NSP","prazo":"7 dias"},{"acao":"TEXTO","responsavel":"Chefia do setor","prazo":"15 dias"},{"acao":"TEXTO","responsavel":"Gestao","prazo":"30 dias"}]}`;
    let text='';
    try {
      text=await callWorker([{role:'user',content:prompt}],null);
      // Limpar markdown e extrair bloco JSON
      let cleaned=text.replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
      // Tentar extrair o maior bloco JSON possível
      const jsonMatch=cleaned.match(/\{[\s\S]*\}/);
      if(!jsonMatch) throw new Error('Sem JSON na resposta');
      let jsonStr=jsonMatch[0];
      // Sanitizar: remover caracteres de controle que quebram o parse
      jsonStr=jsonStr.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g,'');
      // Tentar parse direto
      let parsed=null;
      try { parsed=JSON.parse(jsonStr); }
      catch(e1) {
        // Fallback 1: tentar reparar aspas duplas dentro de strings
        try {
          // Substituir aspas duplas não escapadas dentro de valores de string
          const repaired=jsonStr.replace(/:(\s*)"((?:[^"\\]|\\.)*)"/g,(m,sp,val)=>{
            const fixed=val.replace(/(?<!\\)"/g,'\\"');
            return ':'+sp+'"'+fixed+'"';
          });
          parsed=JSON.parse(repaired);
        } catch(e2) {
          // Fallback 2: montar RCA básico com texto da resposta
          console.warn('RCA JSON parse falhou, usando fallback estrutural');
          parsed={
            cinco_porques:[
              {pergunta:'Por que ocorreu?',resposta:'Análise gerada. Edite conforme necessário.'},
              {pergunta:'Por que isso aconteceu?',resposta:'Fator identificado pela IA.'},
              {pergunta:'Por que isso aconteceu?',resposta:'Processo ou protocolo envolvido.'},
              {pergunta:'Por que isso aconteceu?',resposta:'Fator organizacional ou de gestão.'},
              {pergunta:'Causa raiz:',resposta:'Revisar o relato e editar esta causa raiz.'},
            ],
            ishikawa:[
              {categoria:'Pessoa',cor:'#EF4444',causas:['Verificar fatores humanos']},
              {categoria:'Processo',cor:'#F59E0B',causas:['Verificar protocolo relacionado']},
              {categoria:'Equipamento',cor:'#8B5CF6',causas:['Verificar equipamentos envolvidos']},
              {categoria:'Ambiente',cor:'#1D6FE8',causas:['Verificar condições do ambiente']},
              {categoria:'Gestão',cor:'#00C9B8',causas:['Verificar fatores organizacionais']},
            ],
            fatores:[
              {icone:'humano',tipo:'Fator humano',descricao:'Revisar fatores humanos envolvidos.'},
              {icone:'processo',tipo:'Fator de processo',descricao:'Revisar processo ou protocolo.'},
              {icone:'ambiente',tipo:'Fator ambiental',descricao:'Revisar condições ambientais.'},
              {icone:'gestao',tipo:'Fator organizacional',descricao:'Revisar aspectos de gestão.'},
            ],
            plano:[
              {acao:'Revisar protocolo relacionado ao evento',responsavel:'Coordenador NSP',prazo:'15 dias'},
              {acao:'Capacitar equipe envolvida',responsavel:'Chefia do setor',prazo:'30 dias'},
              {acao:'Monitorar recorrência do evento',responsavel:'NSP',prazo:'60 dias'},
            ]
          };
        }
      }
      if(parsed) setRca(parsed);
      else throw new Error('Não foi possível processar a resposta da IA');
    } catch(e) { console.error('RCA parse error:',e); showToast('Erro ao gerar: '+e.message,'error'); }
    setLoading(false);
  };

  const finalizar=async()=>{
    if(!sbUrl||!sbKey){showToast('Configure o Supabase','error');return;}
    setSaving(true);
    try {
      await sbPatch(sbUrl,sbKey,'notifications',`id=eq.${notification.id}`,{rca_gerado:true,rca_autor:profileMode||'membro_nsp',rca_concluido_em:new Date().toISOString()});
      await sbAuditLog(sbUrl,sbKey,notification.hospital_id,notification.id,'RCA_CONCLUIDO','rca_gerado','false','true',profileMode||'membro_nsp','membro_nsp');
      showToast('Análise de Causa salva!','success');
      if(onSaved) onSaved(); else onClose();
    } catch { showToast('Erro ao salvar','error'); }
    setSaving(false);
  };

  const tb=(id,label)=><button onClick={()=>setTab(id)} style={{flex:1,padding:'8px 4px',borderRadius:7,border:'none',background:tab===id?C.teal:'transparent',color:tab===id?'#06101F':C.muted,fontSize:11,fontWeight:700,cursor:'pointer'}}>{label}</button>;

  return(<div style={{position:'fixed',inset:0,background:'#000b',zIndex:200,display:'flex',alignItems:'flex-end'}}>
    <div style={{background:C.surface,borderRadius:'20px 20px 0 0',padding:'20px 16px 32px',width:'100%',maxWidth:480,margin:'0 auto',border:'1px solid '+C.border,maxHeight:'92vh',overflowY:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:800,color:C.text}}>{String.fromCodePoint(129504)+' Análise de Causa Raiz'}</div>
        <button onClick={onClose} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20}}>{String.fromCodePoint(10005)}</button>
      </div>
      <div style={{background:C.card,border:'1px solid '+C.border,borderLeft:'3px solid '+C.red,borderRadius:10,padding:'10px 14px',marginBottom:14}}>
        <div style={{fontSize:11,color:C.red,fontWeight:700,marginBottom:3}}>{notification.notification_type?.toUpperCase()} · {notification.sector}</div>
        <div style={{fontSize:13,color:C.text}}>{(notification.description||'-').slice(0,120)}</div>
      </div>
      {!rca&&!loading&&<button onClick={gerar} style={{width:'100%',background:'linear-gradient(135deg,'+C.teal+','+C.blue+')',border:'none',borderRadius:12,padding:'14px',color:'#06101F',fontWeight:800,fontSize:14,cursor:'pointer'}}>{String.fromCodePoint(129504)+' Analisar Causa Raiz com IA'}</button>}
      {loading&&<div style={{textAlign:'center',padding:32}}><Dots/><div style={{fontSize:12,color:C.muted,marginTop:12}}>Analisando incidente...</div></div>}
      {rca&&(<div>
        <div style={{display:'flex',background:C.card,borderRadius:10,padding:3,gap:2,marginBottom:14}}>
          {tb('porques','5 Porquês')}{tb('ishikawa','Ishikawa')}{tb('fatores','Fatores')}{tb('plano','Plano')}
        </div>
        {tab==='porques'&&(<div>
          {rca.cinco_porques?.map((p,i)=>(
            <div key={i} style={{display:'grid',gridTemplateColumns:'36px 1fr',gap:10,alignItems:'flex-start',marginBottom:12}}>
              <div style={{width:36,height:36,borderRadius:'50%',background:C.card,border:'1px solid '+C.border,display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'monospace',fontSize:13,color:C.teal}}>P{i+1}</div>
              <div>
                <input
                  value={p.pergunta}
                  onChange={e=>{const n=[...rca.cinco_porques];n[i]={...n[i],pergunta:e.target.value};setRca(r=>({...r,cinco_porques:n}));}}
                  style={{fontSize:10,color:C.muted,background:'transparent',border:'none',borderBottom:'1px solid '+C.border+'66',width:'100%',marginBottom:4,padding:'1px 2px',outline:'none',textTransform:'uppercase'}}
                />
                <textarea
                  value={p.resposta}
                  onChange={e=>{const n=[...rca.cinco_porques];n[i]={...n[i],resposta:e.target.value};setRca(r=>({...r,cinco_porques:n}));}}
                  rows={2}
                  style={{fontSize:13,color:C.text,background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'10px 12px',lineHeight:1.5,width:'100%',resize:'vertical',outline:'none',fontFamily:'inherit'}}
                />
              </div>
            </div>
          ))}
          <button onClick={()=>setRca(r=>({...r,cinco_porques:[...(r.cinco_porques||[]),{pergunta:'Por que isso ocorreu?',resposta:''}]}))}
            style={{width:'100%',background:'none',border:'1px dashed '+C.teal+'66',borderRadius:8,padding:'6px',color:C.teal,fontSize:11,cursor:'pointer',marginTop:4}}>+ Por quê</button>
        </div>)}

function NotiVisaPanel({notification,sbUrl,sbKey,showToast,onClose}) {  const [step,setStep]=useState(1);  const [marking,setMarking]=useState(false);  const normTipo=(v)=>{    if(!v) return '';    const s=v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');    if(s.includes('medic')||s.includes('farmac')||s.includes('prescri')||s.includes('dispens')) return 'Erro de medicacao';    if(s.includes('queda')) return 'Queda';    if(s.includes('press')||s.includes('lpp')) return 'Lesao por pressao';    if(s.includes('infec')||s.includes('iras')||s.includes('pav')||s.includes('ipcs')||s.includes('itu')||s.includes('isc')) return 'Infeccao relacionada a assistencia';    if(s.includes('identif')||s.includes('pulseira')) return 'Falha de identificacao';    if(s.includes('cirurg')||s.includes('lvcs')) return 'Falha em procedimento cirurgico';    if(s.includes('avp')||s.includes('acesso venoso')||s.includes('infiltr')||s.includes('flebite')||s.includes('extravasamento')) return 'Perda de acesso venoso periferico';    if(s.includes('sne')||s.includes('sng')||s.includes('sonda')||s.includes('nasoenter')||s.includes('nasogastr')||s.includes('svd')||s.includes('cateter urinario')||s.includes('sondagem')||s.includes('exteriori')) return 'Perda/exteriorizacao de dispositivo invasivo';    if(s.includes('comunic')||s.includes('sbar')||s.includes('prescricao verbal')) return 'Falha de comunicacao';    return 'Outros';  };  const normGrav=(v)=>{    if(!v) return '';    const s=v.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');    if(s.includes('sentinela')) return 'Evento sentinela';    if(s.includes('grave')) return 'Evento adverso grave';    if(s.includes('moderado')) return 'Evento adverso moderado';    if(s.includes('leve')) return 'Evento adverso leve';    if(s.includes('sem dano')||s.includes('incidente')) return 'Incidente sem dano';    if(s.includes('near miss')||s.includes('quase')) return 'Near miss';    if(s.includes('risco')||s.includes('circunstanci   const SEV=[
    {v:1,label:'Insignificante',desc:'Sem dano ao paciente'},
    {v:2,label:'Leve',desc:'Dano mínimo, recuperação imediata'},
    {v:3,label:'Moderado',desc:'Dano requer tratamento adicional'},
    {v:4,label:'Grave',desc:'Dano permanente ou perda de função'},
    {v:5,label:'Catastrófico',desc:'Morte ou dano irreversível grave'},
  ];
  const [prob,setProb]=useState(notification.risco_probabilidade||0);
  const [sev,setSev]=useState(notification.risco_severidade||0);
  const [saving,setSaving]=useState(false);
  const score=prob*sev;
  const risco=score>=15?{label:'EXTREMO',color:'#7C0000',bg:'#7C000022'}:score>=10?{label:'ALTO',color:C.red,bg:C.red+'22'}:score>=5?{label:'MÉDIO',color:C.yellow,bg:C.yellow+'22'}:score>0?{label:'BAIXO',color:C.green,bg:C.green+'22'}:{label:'-',color:C.muted,bg:C.muted+'22'};

  const salvar=async()=>{
    if(!prob||!sev){showToast('Selecione probabilidade e severidade','error');return;}
    setSaving(true);
    try{
      await sbPatch(sbUrl,sbKey,'notifications',`id=eq.${notification.id}`,{risco_probabilidade:prob,risco_severidade:sev,risco_score:score,risco_classificacao:risco.label});
      showToast('OK Matriz de risco salva!','success');
      if(onSaved)onSaved({...notification,risco_probabilidade:prob,risco_severidade:sev,risco_score:score,risco_classificacao:risco.label});
      onClose();
    }catch{showToast('Erro ao salvar','error');}
    setSaving(false);
  };

  const CelBtn=({item,selected,onClick,tipo})=>(
    <button onClick={onClick} style={{background:selected?tipo==='prob'?C.blue+'33':C.red+'33':C.surface,border:'1px solid '+(selected?tipo==='prob'?C.blue:C.red:C.border),borderRadius:8,padding:'8px 10px',cursor:'pointer',textAlign:'left',width:'100%',marginBottom:6}}>
      <div style={{display:'flex',alignItems:'center',gap:8}}>
        <div style={{width:24,height:24,borderRadius:'50%',background:selected?tipo==='prob'?C.blue:C.red:C.border,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:900,color:'#fff',flexShrink:0}}>{item.v}</div>
        <div>
          <div style={{fontSize:12,fontWeight:700,color:C.text}}>{item.label}</div>
          <div style={{fontSize:10,color:C.muted}}>{item.desc}</div>
        </div>
      </div>
    </button>
  );

  return(<div style={{position:'fixed',inset:0,background:'#000b',zIndex:200,display:'flex',alignItems:'flex-end'}}>
    <div style={{background:C.surface,borderRadius:'20px 20px 0 0',padding:'20px 16px 32px',width:'100%',maxWidth:480,margin:'0 auto',border:'1px solid '+C.border,maxHeight:'92vh',overflowY:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:800,color:C.text}}>⚠️ Matriz de Risco</div>
        <button onClick={onClose} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20}}>{String.fromCodePoint(10005)}</button>
      </div>
      <div style={{background:C.card,border:'1px solid '+C.border,borderLeft:'3px solid '+C.yellow,borderRadius:10,padding:'10px 14px',marginBottom:16}}>
        <div style={{fontSize:11,color:C.yellow,fontWeight:700,marginBottom:2}}>Notificação</div>
        <div style={{fontSize:13,color:C.text}}>{(notification.description||'-').slice(0,100)}</div>
      </div>

      {/* Score atual */}
      {score>0&&<div style={{background:risco.bg,border:'1px solid '+risco.color+'44',borderRadius:12,padding:'12px 16px',marginBottom:16,display:'flex',alignItems:'center',gap:12}}>
        <div style={{fontSize:32,fontWeight:900,color:risco.color,lineHeight:1}}>{score}</div>
        <div>
          <div style={{fontSize:14,fontWeight:800,color:risco.color}}>RISCO {risco.label}</div>
          <div style={{fontSize:11,color:C.muted}}>Probabilidade {prob} × Severidade {sev} = {score} pontos</div>
        </div>
      </div>}

      {/* Probabilidade */}
      <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:8}}>1. Probabilidade de recorrência</div>
      {PROB.map(p=><CelBtn key={p.v} item={p} selected={prob===p.v} onClick={()=>setProb(p.v)} tipo="prob"/>)}

      {/* Severidade */}
      <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:8,marginTop:14}}>2. Severidade do dano</div>
      {SEV.map(s=><CelBtn key={s.v} item={s} selected={sev===s.v} onClick={()=>setSev(s.v)} tipo="sev"/>)}

      {/* Tabela referência */}
      <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'12px 14px',marginTop:14,marginBottom:14}}>
        <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:8}}>Referência - Classificação do risco</div>
        {[['1 a 4','Baixo','Verde - monitorar','#10B981'],['5 a 9','Médio','Amarelo - acao planejada','#F59E0B'],['10 a 14','Alto','Vermelho - acao imediata','#EF4444'],['15 a 25','Extremo','Bordeaux - investigacao urgente','#7C0000']].map(([r,l,a,c])=>(
          <div key={r} style={{display:'flex',gap:8,alignItems:'center',marginBottom:5}}>
            <div style={{width:6,height:6,borderRadius:'50%',background:c,flexShrink:0}}/>
            <span style={{fontSize:10,color:c,fontWeight:700,minWidth:32}}>{r}</span>
            <span style={{fontSize:10,color:C.text,fontWeight:700,minWidth:52}}>{l}</span>
            <span style={{fontSize:10,color:C.muted}}>{a}</span>
          </div>
        ))}
      </div>

      <button onClick={salvar} disabled={saving||!prob||!sev} style={{width:'100%',background:prob&&sev?C.teal:C.border,border:'none',borderRadius:12,padding:'13px',color:prob&&sev?'#06101F':C.muted,fontWeight:800,fontSize:13,cursor:prob&&sev?'pointer':'default'}}>
        {saving?'Salvando...':'Ok Salvar classificação de risco'}
      </button>
    </div>
  </div>);
}

function PlanoAcaoPanel({notification,sbUrl,sbKey,showToast,onClose}) {
  const [acoes,setAcoes]=useState([]);
  const [loading,setLoading]=useState(true);
  const [showForm,setShowForm]=useState(false);
  const [saving,setSaving]=useState(false);
  const [form,setForm]=useState({acao:'',responsavel:'',prazo:'',prioridade:'media'});

  const load=async()=>{
    setLoading(true);
    try{
      const d=await sbSelect(sbUrl,sbKey,'plano_acoes',`notification_id=eq.${notification.id}&order=created_at.asc`);
      setAcoes(d||[]);
    }catch{setAcoes([]);}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const addAcao=async()=>{
    if(!form.acao.trim()||!form.responsavel.trim()||!form.prazo){showToast('Preencha ação, responsável e prazo','error');return;}
    setSaving(true);
    try{
      await sbInsert(sbUrl,sbKey,'plano_acoes',{notification_id:notification.id,hospital_id:notification.hospital_id,...form,status:'pendente',created_at:new Date().toISOString()});
      await load();setShowForm(false);setForm({acao:'',responsavel:'',prazo:'',prioridade:'media'});
      showToast('OK Ação adicionada!','success');
    }catch{showToast('Erro ao salvar','error');}
    setSaving(false);
  };

  const updateStatus=async(id,status)=>{
    try{
      await sbPatch(sbUrl,sbKey,'plano_acoes',`id=eq.${id}`,{status,...(status==='concluido'?{concluido_em:new Date().toISOString()}:{})});
      if(status==='concluido'){
        await sbAuditLog(sbUrl,sbKey,notification.hospital_id,notification.id,'PLANO_CONCLUIDO','status','em_andamento','concluido','gestor','gestor');
      }
      await load();showToast('OK Status atualizado!','success');
    }catch{showToast('Erro','error');}
  };

  const delAcao=async(id)=>{
    if(!confirm('Excluir esta ação?'))return;
    try{await sbDelete(sbUrl,sbKey,'plano_acoes',`id=eq.${id}`);await load();}
    catch{showToast('Erro','error');}
  };

  const STATUS={pendente:{label:'Pendente',color:C.yellow},em_andamento:{label:'Em andamento',color:C.blue},concluido:{label:'Concluído',color:C.green},cancelado:{label:'Cancelado',color:C.muted}};
  const PRIO={alta:{label:'Alta',color:C.red},media:{label:'Média',color:C.yellow},baixa:{label:'Baixa',color:C.green}};
  const inp={background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,outline:'none',width:'100%',marginBottom:10};

  const vencidas=acoes.filter(a=>a.status!=='concluido'&&a.status!=='cancelado'&&new Date(a.prazo)<new Date());
  const concluidas=acoes.filter(a=>a.status==='concluido').length;
  const pct=acoes.length>0?Math.round(concluidas/acoes.length*100):0;

  return(<div style={{position:'fixed',inset:0,background:'#000b',zIndex:200,display:'flex',alignItems:'flex-end'}}>
    <div style={{background:C.surface,borderRadius:'20px 20px 0 0',padding:'20px 16px 32px',width:'100%',maxWidth:480,margin:'0 auto',border:'1px solid '+C.border,maxHeight:'92vh',overflowY:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div style={{fontSize:15,fontWeight:800,color:C.text}}>{String.fromCodePoint(128203)+' Plano de Acao'}</div>
        <button onClick={onClose} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20}}>{String.fromCodePoint(10005)}</button>
      </div>
      <div style={{background:C.card,border:'1px solid '+C.border,borderLeft:'3px solid '+C.blue,borderRadius:10,padding:'10px 14px',marginBottom:14}}>
        <div style={{fontSize:11,color:C.blue,fontWeight:700,marginBottom:2}}>Notificação</div>
        <div style={{fontSize:13,color:C.text}}>{(notification.description||'-').slice(0,100)}</div>
      </div>

      {/* Progress */}
      {acoes.length>0&&<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'12px 14px',marginBottom:14}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>
          <div style={{fontSize:12,fontWeight:700,color:C.text}}>Progresso - {concluidas}/{acoes.length} concluídas</div>
          <div style={{fontSize:13,fontWeight:900,color:pct===100?C.green:C.teal}}>{pct}%</div>
        </div>
        <div style={{height:6,background:C.border,borderRadius:3,overflow:'hidden',marginBottom:6}}>
          <div style={{width:pct+'%',height:'100%',background:pct===100?C.green:C.teal,borderRadius:3,transition:'width .4s'}}/>
        </div>
        {vencidas.length>0&&<div style={{fontSize:11,color:C.red,fontWeight:700}}>⚠️ {vencidas.length} ação(ões) com prazo vencido</div>}
      </div>}

      {/* Lista de ações */}
      {loading&&<div style={{textAlign:'center',color:C.muted,padding:20,fontSize:12}}>Carregando...</div>}
      {!loading&&acoes.length===0&&!showForm&&<div style={{textAlign:'center',color:C.muted,padding:20,fontSize:12}}>Nenhuma ação cadastrada ainda.</div>}
      {acoes.map(a=>{
        const st=STATUS[a.status]||STATUS.pendente;
        const pr=PRIO[a.prioridade]||PRIO.media;
        const vencida=a.status!=='concluido'&&a.status!=='cancelado'&&new Date(a.prazo)<new Date();
        return(<div key={a.id} style={{background:C.card,border:'1px solid '+(vencida?C.red:C.border),borderRadius:12,padding:'12px 14px',marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:6}}>
            <div style={{flex:1,marginRight:8}}>
              <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:3}}>{a.acao}</div>
              <div style={{display:'flex',gap:8,flexWrap:'wrap',fontSize:10,color:C.muted}}>
                <span>{String.fromCodePoint(128100)+' {a.responsavel}'}</span>
                <span style={{color:vencida?C.red:C.muted}}>⏱ {new Date(a.prazo).toLocaleDateString('pt-BR')}{vencida?' atencao VENCIDO':''}</span>
                <span style={{color:pr.color,fontWeight:700}}>{pr.label}</span>
              </div>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6,flexShrink:0}}>
              <div style={{background:st.color+'22',color:st.color,borderRadius:6,padding:'3px 8px',fontSize:10,fontWeight:700}}>{st.label}</div>
              <button onClick={()=>delAcao(a.id)} style={{background:'none',border:'none',cursor:'pointer',color:C.red,fontSize:14,padding:2}}>{String.fromCodePoint(128465)}</button>
            </div>
          </div>
          {a.status!=='concluido'&&a.status!=='cancelado'&&(
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              {a.status==='pendente'&&<button onClick={()=>updateStatus(a.id,'em_andamento')} style={{background:C.blue+'22',border:'1px solid '+C.blue+'44',borderRadius:7,padding:'5px 10px',color:C.blue,fontSize:11,fontWeight:700,cursor:'pointer'}}>▶ Iniciar</button>}
              {(a.status==='pendente'||a.status==='em_andamento')&&<button onClick={()=>updateStatus(a.id,'concluido')} style={{background:C.green+'22',border:'1px solid '+C.green+'44',borderRadius:7,padding:'5px 10px',color:C.green,fontSize:11,fontWeight:700,cursor:'pointer'}}>✓ Concluir</button>}
              <button onClick={()=>updateStatus(a.id,'cancelado')} style={{background:C.muted+'15',border:'1px solid '+C.muted+'33',borderRadius:7,padding:'5px 10px',color:C.muted,fontSize:11,fontWeight:700,cursor:'pointer'}}>Cancelar</button>
            </div>
          )}
          {a.concluido_em&&<div style={{fontSize:10,color:C.green,marginTop:4}}>{String.fromCodePoint(10003)} Concluido em {new Date(a.concluido_em).toLocaleDateString('pt-BR')}</div>}
          {a.status==='concluido'&&!a.efetividade_verificada&&<div style={{marginTop:6,background:C.yellow+'15',borderRadius:6,padding:'6px 8px'}}>
            <div style={{fontSize:10,color:C.yellow,fontWeight:700,marginBottom:4}}>Verificar efetividade (PDCA - Check)</div>
            <div style={{display:'flex',gap:4}}>
              {['efetiva','parcial','ineficaz'].map(ef=>(<button key={ef} onClick={()=>{
                sbPatch(sbUrl,sbKey,'plano_acoes',`id=eq.${a.id}`,{efetividade_verificada:ef,efetividade_em:new Date().toISOString()}).then(()=>{showToast('Efetividade: '+ef,'success');carregar();}).catch(()=>showToast('Erro','error'));
              }} style={{flex:1,fontSize:9,padding:'4px',background:ef==='efetiva'?C.green+'22':ef==='parcial'?C.yellow+'22':C.red+'22',color:ef==='efetiva'?C.green:ef==='parcial'?C.yellow:C.red,border:'1px solid '+(ef==='efetiva'?C.green:ef==='parcial'?C.yellow:C.red)+'44',borderRadius:4,cursor:'pointer',fontWeight:700,textTransform:'capitalize'}}>{ef}</button>))}
            </div>
          </div>}
          {a.efetividade_verificada&&<div style={{fontSize:10,marginTop:4,color:a.efetividade_verificada==='efetiva'?C.green:a.efetividade_verificada==='parcial'?C.yellow:C.red,fontWeight:700}}>Efetividade: {a.efetividade_verificada.toUpperCase()}{a.efetividade_em?' ('+new Date(a.efetividade_em).toLocaleDateString('pt-BR')+')':''}</div>}
        </div>);
      })}

      {/* Form nova ação */}
      {showForm&&(<div style={{background:C.card,border:'1px solid '+C.teal+'44',borderRadius:12,padding:'14px',marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Nova ação</div>
        <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Ação *</label>
        <textarea value={form.acao} onChange={e=>setForm({...form,acao:e.target.value})} placeholder="Descreva a ação corretiva ou preventiva" rows={2} style={{...inp,resize:'none',fontFamily:'inherit'}}/>
        <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Responsável *</label>
        <input value={form.responsavel} onChange={e=>setForm({...form,responsavel:e.target.value})} placeholder="Nome ou cargo responsável" style={inp}/>
        <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Prazo *</label>
        <input type="date" value={form.prazo} onChange={e=>setForm({...form,prazo:e.target.value})} style={inp}/>
        <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Prioridade</label>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          {Object.entries(PRIO).map(([k,p])=>(
            <button key={k} onClick={()=>setForm({...form,prioridade:k})} style={{flex:1,padding:'7px',borderRadius:7,border:'1px solid '+(form.prioridade===k?p.color:C.border),background:form.prioridade===k?p.color+'22':C.surface,color:form.prioridade===k?p.color:C.muted,fontSize:12,fontWeight:700,cursor:'pointer'}}>{p.label}</button>
          ))}
        </div>
        <div style={{display:'flex',gap:8}}>
          <button onClick={()=>setShowForm(false)} style={{flex:1,background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'9px',color:C.muted,fontSize:12,fontWeight:700,cursor:'pointer'}}>Cancelar</button>
          <button onClick={addAcao} disabled={saving} style={{flex:2,background:C.teal,border:'none',borderRadius:8,padding:'9px',color:'#06101F',fontSize:12,fontWeight:800,cursor:'pointer'}}>{saving?'Salvando...':'+ Adicionar ação'}</button>
        </div>
      </div>)}

      {!showForm&&<button onClick={()=>setShowForm(true)} style={{width:'100%',background:C.teal+'15',border:'1px dashed '+C.teal,borderRadius:12,padding:'12px',color:C.teal,fontSize:13,fontWeight:700,cursor:'pointer',marginTop:4}}>+ Nova ação</button>}

      <div style={{background:C.yellow+'10',border:'1px solid '+C.yellow+'33',borderRadius:8,padding:'10px 12px',marginTop:12}}>
        <div style={{fontSize:10,color:C.muted,lineHeight:1.6}}>⚠ Para persistir o plano de ação, execute no Supabase SQL Editor:<br/>
          <span style={{fontFamily:'monospace',color:'#9ECFFF',fontSize:10}}>CREATE TABLE IF NOT EXISTS plano_acoes (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, created_at TIMESTAMPTZ DEFAULT NOW(), notification_id UUID, hospital_id TEXT, acao TEXT, responsavel TEXT, prazo DATE, prioridade TEXT DEFAULT 'media', status TEXT DEFAULT 'pendente', concluido_em TIMESTAMPTZ, efetividade_verificada TEXT, efetividade_em TIMESTAMPTZ);</span>
          <span style={{fontFamily:'monospace',color:'#9ECFFF',fontSize:10,display:'block',marginTop:6}}>CREATE TABLE IF NOT EXISTS audit_log (id UUID DEFAULT gen_random_uuid() PRIMARY KEY, created_at TIMESTAMPTZ DEFAULT NOW(), hospital_id TEXT, notification_id UUID, acao TEXT, campo TEXT, valor_anterior TEXT, valor_novo TEXT, usuario TEXT, perfil TEXT);</span>
          <span style={{fontFamily:'monospace',color:'#F97316',fontSize:10,display:'block',marginTop:6}}>-- Adicionar campos de auditoria na tabela existente (rodar uma vez):</span>
          <span style={{fontFamily:'monospace',color:'#9ECFFF',fontSize:10,display:'block'}}>ALTER TABLE notifications ADD COLUMN IF NOT EXISTS rca_autor TEXT; ALTER TABLE notifications ADD COLUMN IF NOT EXISTS rca_concluido_em TIMESTAMPTZ; ALTER TABLE notifications ADD COLUMN IF NOT EXISTS notivisa_enviado_em TIMESTAMPTZ; ALTER TABLE notifications ADD COLUMN IF NOT EXISTS updated_at TIMESTAMPTZ;</span>
        </div>
      </div>
    </div>
  </div>);
}
