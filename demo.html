          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:18,fontWeight:900,color:C.teal}}>{reunioesNSP.length}</div>
            <div style={{fontSize:9,color:C.muted}}>reuniao(oes)</div>
          </div>
        </div>
        {reunioesNSP.length===0?<div style={{fontSize:11,color:C.muted,fontStyle:'italic'}}>Nenhuma reuniao registrada</div>:reunioesNSP.slice(0,3).map(r=>(
          <div key={r.id} style={{background:C.surface,borderRadius:8,padding:'8px 10px',marginBottom:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:C.text}}>{r.tipo==='reuniao_mensal'?'Reuniao Mensal':'Reuniao Extraordinaria'} {r.data?new Date(r.data+'T12:00:00').toLocaleDateString('pt-BR'):''}</div>
              <div style={{fontSize:10,color:C.muted,marginTop:1}}>{r.participantes||0} participante(s){r.descricao?' · '+r.descricao.slice(0,40):''}</div>
            </div>
            {r.link_gdrive&&<a href={r.link_gdrive} target='_blank' rel='noreferrer' style={{fontSize:10,color:C.teal,fontWeight:700}}>Ata</a>}
          </div>
        ))}
        {reunioesNSP.length>3&&<div style={{fontSize:10,color:C.muted,textAlign:'center',marginTop:4}}>+{reunioesNSP.length-3} mais. Filtre por tipo para ver todas.</div>}
      </div>
    {/* Cards por subnucleo */}
    <div style={{display:'flex',flexDirection:'column',gap:8,marginBottom:16}}>
      {SUBNUCLEOS_HNSA.map(s=>{
        const t=totaisPorSub[s.id]||{treinamentos:0,reunioes:0,participantes:0};
        const ativo=subnucleoAtivo===s.id;
        return(<button key={s.id} onClick={()=>setSubnucleoAtivo(ativo?'todos':s.id)}
          style={{background:ativo?s.color+'22':C.card,border:'1px solid '+(ativo?s.color:C.border),borderRadius:12,padding:'12px 14px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',textAlign:'left',width:'100%'}}>
          <span style={{fontSize:22}}>{s.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text}}>{s.label}</div>
            <div style={{fontSize:10,color:C.muted,marginTop:2}}>{t.treinamentos} treinamento(s) · {t.reunioes} reuniao(oes) · {t.participantes} participantes</div>
          </div>
          {(t.treinamentos===0&&t.reunioes===0)&&<div style={{background:C.red+'22',color:C.red,borderRadius:6,padding:'2px 8px',fontSize:9,fontWeight:700}}>Sem registro</div>}
        </button>);
      })}
    </div>

    {/* Formulario */}
    {showForm&&canEdit&&<div style={{background:C.card,border:'1px solid '+C.teal+'44',borderRadius:14,padding:16,marginBottom:14}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>Novo registro</div>
      <div style={{display:'flex',gap:8,marginBottom:10}}>
        {[['treinamento','Treinamento'],['reuniao','Reuniao subnucleo'],['reuniao_mensal','Reuniao NSP Mensal'],['reuniao_extraordinaria','Reuniao Extraordinaria']].map(([v,l])=>(
          <button key={v} onClick={()=>setForm(f=>({...f,tipo:v,subnucleo:(v==='reuniao_mensal'||v==='reuniao_extraordinaria')?'nsp_pleno':f.subnucleo}))} style={{flex:1,padding:'7px 4px',borderRadius:8,border:'1px solid '+(form.tipo===v?C.teal:C.border),background:form.tipo===v?C.teal+'22':C.card,color:form.tipo===v?C.teal:C.muted,fontSize:9,fontWeight:700,cursor:'pointer',textAlign:'center'}}>{l}</button>
        ))}
      </div>
      {(form.tipo==='treinamento'||form.tipo==='reuniao')&&<div>
      <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4,marginTop:8}}>Subnucleo *</label>
      <select value={form.subnucleo} onChange={e=>setForm({...form,subnucleo:e.target.value})} style={{...inp,appearance:'none',marginBottom:10}}>
        {SUBNUCLEOS_HNSA.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
      </select></div>}
      <input value={form.protocolo} onChange={e=>setForm({...form,protocolo:e.target.value})} placeholder="Ex: Higienizacao das Maos, Prevencao de Quedas" style={inp}/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
        <div>
          <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Data *</label>
          <input type="date" value={form.data} onChange={e=>setForm({...form,data:e.target.value})} style={inp}/>
        </div>
        <div>
          <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>N. de participantes *</label>
          <input type="number" value={form.participantes} onChange={e=>setForm({...form,participantes:e.target.value})} placeholder="Ex: 45" style={inp}/>
        </div>
      </div>
      <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Responsavel</label>
      <input value={form.responsavel} onChange={e=>setForm({...form,responsavel:e.target.value})} placeholder="Nome ou cargo" style={inp}/>
      <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Descricao / Pauta</label>
      <textarea value={form.descricao} onChange={e=>setForm({...form,descricao:e.target.value})} rows={2} placeholder="Resumo do conteudo abordado" style={{...inp,resize:'none',fontFamily:'inherit'}}/>
      <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Link Google Drive (lista de presenca, ata)</label>
      <input value={form.link_gdrive} onChange={e=>setForm({...form,link_gdrive:e.target.value})} placeholder="https://drive.google.com/..." style={inp}/>

      <div style={{display:'flex',gap:8}}>
        <button onClick={()=>setShowForm(false)} style={{flex:1,background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'9px',color:C.muted,fontSize:12,fontWeight:700,cursor:'pointer'}}>Cancelar</button>
        <button onClick={salvar} disabled={saving} style={{flex:2,background:C.teal,border:'none',borderRadius:8,padding:'9px',color:'#06101F',fontSize:12,fontWeight:800,cursor:'pointer'}}>{saving?'Salvando...':'Salvar registro'}</button>
      </div>
    </div>}

    {/* Lista de registros */}
    {loading&&<div style={{textAlign:'center',color:C.muted,padding:20}}><Dots/></div>}
    {!loading&&filteredPeriodo.length===0&&<div style={{textAlign:'center',color:C.muted,padding:20,fontSize:12}}>Nenhum registro{subnucleoAtivo!=='todos'?' para este subnucleo':''}.</div>}
    {filteredPeriodo.map(r=>{
      const sub=SUBNUCLEOS_HNSA.find(s=>s.id===r.subnucleo)||{icon:'clipboard',color:C.muted,label:r.subnucleo};
      return(<div key={r.id} style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'12px 14px',marginBottom:8}}>
        <div style={{display:'flex',alignItems:'flex-start',gap:10,marginBottom:4}}>
          <span style={{fontSize:18}}>{sub.icon}</span>
          <div style={{flex:1}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:12,fontWeight:700,color:C.text}}>{r.protocolo||sub.label}</div>
              <div style={{background:r.tipo==='treinamento'?C.blue+'22':r.tipo==='reuniao_mensal'?C.teal+'22':r.tipo==='reuniao_extraordinaria'?C.orange+'22':C.green+'22',color:r.tipo==='treinamento'?C.blue:r.tipo==='reuniao_mensal'?C.teal:r.tipo==='reuniao_extraordinaria'?C.orange:C.green,borderRadius:6,padding:'2px 8px',fontSize:9,fontWeight:700}}>{r.tipo==='treinamento'?'Treinamento':r.tipo==='reuniao_mensal'?'NSP Mensal':r.tipo==='reuniao_extraordinaria'?'NSP Extra':'Reuniao'}</div>
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:2}}>
              {r.data&&new Date(r.data+'T12:00:00').toLocaleDateString('pt-BR')}
              {r.participantes&&<span> · {r.participantes} participante(s)</span>}
              {r.responsavel&&<span> · {r.responsavel}</span>}
            </div>
          </div>
        </div>
        {r.descricao&&<div style={{fontSize:11,color:C.muted,marginBottom:4,borderLeft:'2px solid '+sub.color+'44',paddingLeft:8}}>{r.descricao}</div>}
        {r.link_gdrive&&<a href={r.link_gdrive} target="_blank" rel="noreferrer" style={{fontSize:11,color:C.teal,fontWeight:600}}>Abrir documento</a>}
      </div>);
    })}
  </div>
  </div>);
}

function RelatorioDSMView({sbUrl,sbKey,showToast,hospital}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const [tab,setTab]=useState('dsm');
  const [semestre,setSemestre]=useState(()=>{const d=new Date();return d.getMonth()<6?`${d.getFullYear()}-1`:`${d.getFullYear()}-2`;});
  const [dados,setDados]=useState(null);
  const [loading,setLoading]=useState(false);
  const [gestor,setGestor]=useState('');
  const [boasPraticasNSP,setBoasPraticasNSP]=useState('Implementacao do sistema NotificaAI para gestao de incidentes em tempo real, possibilitando notificacao digital pelos profissionais, analise automatizada por inteligencia artificial, geracao de relatorios automaticos e monitoramento continuo dos indicadores de seguranca do paciente. O sistema promoveu melhora na cultura de notificacao e reducao do tempo de resposta aos eventos adversos.');
  const [cfgLocal,setCfgLocal]=useState({});
  const [salvandoConfig,setSalvandoConfig]=useState(false);

  // Carregar config_dsm ao montar
  React.useEffect(()=>{
    if(!sbUrl||!sbKey) return;
    fetch(`${sbUrl}/rest/v1/config_dsm?hospital_id=eq.${h.id}&select=*`,{
      headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey}
    }).then(r=>r.ok?r.json():Promise.resolve([])).then(d=>{
      if(d&&d[0]) setCfgLocal(d[0]);
    }).catch(()=>{});
  },[sbUrl,sbKey]);

  const gerarPacoteAuditoria=async()=>{
    if(!window.JSZip){showToast('JSZip carregando, tente em 3s','error');return;}
    if(!dados){showToast('Gere o relatorio primeiro','error');return;}
    showToast('Gerando pacote de auditoria...','success');
    try{
      const zip=new window.JSZip();
      const hoje=new Date().toISOString().slice(0,10);
      const csvEscape=(v)=>{const s=String(v??'');return s.includes(',')||s.includes('"')||s.includes('\n')?'"'+s.replace(/"/g,'""')+'"':s;};
      const toCSV=(rows,cols)=>cols.join(',')+'\n'+rows.map(r=>cols.map(c=>csvEscape(r[c])).join(',')).join('\n');

      // 1. Notificações do período
      if(dados.nots?.length){
        zip.file('01_notificacoes.csv',toCSV(dados.nots,['id','created_at','event_date','sector','notification_type','event_subtype','gravidade','status','rca_gerado','rca_autor','rca_concluido_em','notivisa_enviado','notivisa_enviado_em','patient_outcome','description']));
      }
      // 2. Audit log
      const audit=await sbSelect(sbUrl,sbKey,'audit_log',`hospital_id=eq.${h.id}&order=created_at.desc&limit=1000`).catch(()=>[]);
      if(audit?.length) zip.file('02_audit_log.csv',toCSV(audit,['created_at','notification_id','acao','campo','valor_anterior','valor_novo','usuario','perfil']));
      // 3. Treinamentos
      if(dados.treinsTodos?.length) zip.file('03_treinamentos.csv',toCSV(dados.treinsTodos,['data','tipo','subnucleo','protocolo','qtd','participantes']));
      // 4. Protocolos
      if(dados.protocolos?.length) zip.file('04_protocolos.csv',toCSV(dados.protocolos,['nome','aprovado_em','proxima_revisao','link']));
      // 5. Planos de ação
      const planos=await sbSelect(sbUrl,sbKey,'plano_acoes',`hospital_id=eq.${h.id}&order=created_at.desc`).catch(()=>[]);
      if(planos?.length) zip.file('05_planos_acao.csv',toCSV(planos,['created_at','acao','responsavel','prazo','prioridade','status','concluido_em','efetividade_verificada','efetividade_em']));
      // 6. Indicadores DSM
      if(dados.indDSM?.length) zip.file('06_indicadores_dsm.csv',toCSV(dados.indDSM,Object.keys(dados.indDSM[0]||{})));
      // 7. Status dos 24 critérios ANVISA
      const cfg2=dados.cfg||{};
      const resumoAnvisa=['PACOTE DE AUDITORIA NSP — '+h.name,'Gerado em: '+new Date().toLocaleString('pt-BR'),'Periodo: '+label,'',
        'DOCUMENTOS INSTITUCIONAIS:',
        'Portaria NSP: '+(cfg2.numero_portaria_nsp||'NAO CADASTRADA')+(cfg2.data_portaria_nsp?' de '+cfg2.data_portaria_nsp:''),
        'Portaria CCIH: '+(cfg2.numero_portaria_ccih||'NAO CADASTRADA'),
        'PSP atualizado em: '+(cfg2.data_atualizacao_psp||'NAO CADASTRADO'),
        '',
        'RESUMO DO PERIODO:',
        'Total de notificacoes: '+(dados.total||0),
        'Seguranca do Paciente: '+(dados.sp||0),
        'Eventos sentinela: '+(dados.sentinela||0),
        'Reunioes NSP: '+(dados.reunioes?.length||0),
        'Treinamentos: '+(dados.treinsTodos?.length||0),
        'Registros de auditoria: '+(audit?.length||0),
        'Planos de acao: '+(planos?.length||0),
        '',
        'Conteudo do pacote:',
        '01_notificacoes.csv — todas as notificacoes do periodo',
        '02_audit_log.csv — trilha de auditoria completa',
        '03_treinamentos.csv — capacitacoes registradas',
        '04_protocolos.csv — protocolos e validades',
        '05_planos_acao.csv — planos com efetividade (PDCA)',
        '06_indicadores_dsm.csv — indicadores mensais',
      ].join('\n');
      zip.file('00_LEIA-ME.txt',resumoAnvisa);

      const blob=await zip.generateAsync({type:'blob'});
      const u=URL.createObjectURL(blob);
      const a=document.createElement('a');
      a.href=u;a.download='Pacote_Auditoria_NSP_'+h.short_name+'_'+hoje+'.zip';
      a.click();URL.revokeObjectURL(u);
      showToast('Pacote de auditoria baixado!','success');
    }catch(e){showToast('Erro: '+e.message,'error');}
  };

  const salvarConfig=async()=>{
    setSalvandoConfig(true);
    try{
      await fetch(`${sbUrl}/rest/v1/config_dsm`,{
        method:'POST',
        headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':'application/json',
          'Prefer':'resolution=merge-duplicates,return=minimal','on-conflict':'hospital_id'},
        body:JSON.stringify({...cfgLocal,hospital_id:h.id,updated_at:new Date().toISOString()}),
      });
      showToast('Documentos institucionais salvos!','success');
    }catch(e){showToast('Erro ao salvar: '+e.message,'error');}
    setSalvandoConfig(false);
  };
  const [narrativaIA,setNarrativaIA]=useState('');
  const [loadingIA,setLoadingIA]=useState(false);
  const gerarNarrativaIA=async()=>{
    if(!dados) return;
    setLoadingIA(true);
    try{
      const {label}=getSemestreDatas();
      const resumoSubs=SUBNUCLEOS_HNSA.map(s=>{
        const sub=dados.porSubnucleo[s.id];
        return s.label+': '+sub.treinamentos+' treinamentos, '+sub.participantes+' participantes';
      }).join('; ');
      const reunioesList=dados.reunioes.map(r=>{
        const tipo=r.tipo==='reuniao_mensal'?'Mensal':r.tipo==='reuniao_extraordinaria'?'Extraordinaria':'Reuniao';
        return tipo+' em '+(r.data?new Date(r.data+'T12:00:00').toLocaleDateString('pt-BR'):'-')+(r.descricao?' ('+r.descricao.slice(0,60)+')':'');
      }).join('; ')||'Nenhuma reuniao registrada';
      const text=await callWorker([{role:'user',content:'Voce e o analista do NSP de um hospital fictício de demonstracao. Gere um texto narrativo formal para o Relatorio Semestral de Seguranca do Paciente.\n\nPERIODO: '+label+'\nTOTAL NOTIFICACOES: '+dados.total+' (SP: '+dados.sp+', ADM: '+dados.adm+')\nEVENTOS SENTINELA: '+dados.sentinela+'\nREUNIOES NSP ('+dados.reunioes.length+'): '+reunioesList+'\nTREINAMENTOS: '+resumoSubs+'\nBOAS PRATICAS: '+boasPraticasNSP+'\n\nGere 5 paragrafos formais: 1) Apresentacao do periodo 2) Notificacoes 3) Reunioes e educacao 4) Conformidade ANVISA 5) Conclusao e recomendacoes. Assine como: '+(gestor||'Coordenador NSP - Demonstracao')}],'Analista hospitalar NSP. Responda em portugues formal.');
      setNarrativaIA(text);
    }catch(e){showToast('Erro IA: '+e.message,'error');}
    setLoadingIA(false);
  };

  const getSemestreDatas=()=>{
    const [ano,sem]=semestre.split('-').map(Number);
    if(sem===1) return{inicio:`${ano}-01-01`,fim:`${ano}-06-30`,label:`1 semestre de ${ano}`,meses:['Jan','Fev','Mar','Abr','Mai','Jun'],nums:[1,2,3,4,5,6]};
    return{inicio:`${ano}-07-01`,fim:`${ano}-12-31`,label:`2 semestre de ${ano}`,meses:['Jul','Ago','Set','Out','Nov','Dez'],nums:[7,8,9,10,11,12]};
  };

  const gerar=async()=>{
    if(!sbUrl||!sbKey){showToast('Supabase necessario','error');return;}
    setLoading(true);
    try{
      const {inicio,fim,nums}=getSemestreDatas();
      const hdr2={'apikey':sbKey,'Authorization':'Bearer '+sbKey};
      const [nots,treinamentos,protocolos,indDSM,cfgArr,saqResp,planosAll,notivsaArr]=await Promise.all([
        sbSelect(sbUrl,sbKey,'notifications',`hospital_id=eq.${h.id}&event_date=gte.${inicio}&event_date=lte.${fim}&is_test=neq.true&select=*`).catch(()=>[]),
        sbSelect(sbUrl,sbKey,'treinamentos_nsp',`hospital_id=eq.${h.id}&data=gte.${inicio}&data=lte.${fim}&select=*`).catch(()=>[]),
        sbSelect(sbUrl,sbKey,'protocolos',`hospital_id=eq.${h.id}&select=*`).catch(()=>[]),
        fetch(`${sbUrl}/rest/v1/indicadores_dsm?hospital_id=eq.${h.id}&mes=gte.${inicio}&mes=lte.${fim}&select=*`,{headers:hdr2}).then(r=>r.ok?r.json():Promise.resolve([])).catch(()=>[]),
        fetch(`${sbUrl}/rest/v1/config_dsm?hospital_id=eq.${h.id}&select=*`,{headers:hdr2}).then(r=>r.ok?r.json():Promise.resolve([])).catch(()=>[]),
        sbSelect(sbUrl,sbKey,'saq_respostas',`hospital_id=eq.${h.id}&created_at=gte.${inicio}&select=*`).catch(()=>[]),
        sbSelect(sbUrl,sbKey,'plano_acoes',`hospital_id=eq.${h.id}&select=*`).catch(()=>[]),
        fetch(`${sbUrl}/rest/v1/notivisa_analise?hospital_id=eq.${h.id}&select=notification_id`,{headers:hdr2}).then(r=>r.ok?r.json():Promise.resolve([])).catch(()=>[]),
      ]);
      const cfg=cfgArr&&cfgArr[0]?cfgArr[0]:{};
      const planosAbertos=(planosAll||[]).filter(p=>p.status!=='concluido');
      const notivsaAnalisados=(notivsaArr||[]).length;

      const porMes=nums.map(m=>{
        const mes=nots.filter(n=>{const d=new Date(n.event_date+'T12:00:00');return d.getMonth()+1===m;});
        return{m,total:mes.length,sp:mes.filter(n=>n.notification_type==='seguranca_paciente'||n.notification_type==='ccih').length,ccih:0,adm:mes.filter(n=>n.notification_type==='administrativa').length,quedas:mes.filter(n=>n.event_subtype?.toLowerCase().includes('queda')).length,lpp:mes.filter(n=>n.event_subtype?.toLowerCase().includes('press')).length,sentinela:mes.filter(n=>n.gravidade==='Evento sentinela'||n.event_subtype==='Evento sentinela').length,nearmiss:mes.filter(n=>n.gravidade==='Near miss'||n.event_subtype==='Near miss').length};
      });

      const reunioes=treinamentos.filter(t=>t.tipo==='reuniao');
      const treinsTodos=treinamentos.filter(t=>t.tipo==='treinamento');

      const porSubnucleo={};
      SUBNUCLEOS_HNSA.forEach(s=>{
        const regs=treinamentos.filter(t=>t.subnucleo===s.id);
        const treins=regs.filter(t=>t.tipo==='treinamento');
        porSubnucleo[s.id]={label:s.label,icon:s.icon,color:s.color,

        };
      });

      const getProtocolo=(nome)=>protocolos.find(p=>p.nome?.toLowerCase().includes(nome.toLowerCase()))||null;

      setDados({porMes,reunioes,treinsTodos,porSubnucleo,nots,protocolos,indDSM:indDSM||[],cfg,

          <div style={{marginTop:32,display:'flex',gap:60}}>

{tab==='anvisa'&&dados&&<div style={{display:'flex',flexDirection:'column',gap:12}}>

        <div style={{background:C.card,border:'1px solid '+((cfgLocal.numero_portaria_nsp&&cfgLocal.data_atualizacao_psp)?C.green:C.yellow)+'44',borderRadius:12,padding:'12px 14px',borderLeft:'3px solid '+((cfgLocal.numero_portaria_nsp&&cfgLocal.data_atualizacao_psp)?C.green:C.yellow)}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
            <div style={{fontSize:12,fontWeight:800,color:C.text}}>Documentos Institucionais (C.1 - C.3)</div>

        {/* Score geral */}

            {cod:'C.3', tipo:'Estrutura',   req:false, desc:'Plano de Seguranca do Paciente (PSP) implantado e atualizado', ok:psp_ok&&!!(cfg.data_atualizacao_psp||cfg.link_psp), obs:(cfg.data_atualizacao_psp?'PSP atualizado em '+new Date(cfg.data_atualizacao_psp+'T12:00:00').toLocaleDateString('pt-BR'):'PSP sem data')+' | '+dados.protocolos.length+' protocolos'},

            {cod:'C.7', tipo:'Estrutura',   req:false, desc:'Protocolo parto seguro + capacitacao (ou NAO SE APLICA)', ok:!cfg.tem_internacao||true, obs:'Nao se aplica se servico nao realiza parto'},
            {cod:'C.8', tipo:'Estrutura',   req:false, desc:'Protocolo prevencao LPP + capacitacao', ok:protAtual('lpp')&&treinoOk('lpp'), obs:'Treinamentos: '+dados.porSubnucleo['lpp']?.treinamentos},
            {cod:'C.9', tipo:'Estrutura',   req:false, desc:'Protocolo prevencao quedas + capacitacao', ok:protAtual('queda')&&treinoOk('queda'), obs:'Treinamentos: '+dados.porSubnucleo['queda']?.treinamentos},
            {cod:'C.10',tipo:'Estrutura',   req:false, desc:'Protocolo seguranca medicamentos + capacitacao', ok:protAtual('medicamentos')&&treinoOk('medicamentos'), obs:'Treinamentos: '+dados.porSubnucleo['medicamentos']?.treinamentos},
            {cod:'C.11',tipo:'Estrutura',   req:false, desc:'Protocolo prevencao IPCS (cateter central) + capacitacao', ok:!cfg.tem_cvc||dados.protocolos.some(p=>p.nome?.toLowerCase().includes('ipcs')||p.nome?.toLowerCase().includes('cateter')), obs:cfg.tem_cvc?'Verificar protocolo IPCS':'N/A - sem CVC'},
            {cod:'C.12',tipo:'Estrutura',   req:false, desc:'Protocolo prevencao ITU (cateter vesical) + capacitacao', ok:!cfg.tem_cvd||dados.protocolos.some(p=>p.nome?.toLowerCase().includes('itu')||p.nome?.toLowerCase().includes('urinario')), obs:cfg.tem_cvd?'Verificar protocolo ITU':'N/A - sem CVD'},
            {cod:'C.13',tipo:'Estrutura',   req:false, desc:'Protocolo prevencao PAV + capacitacao', ok:!cfg.tem_uti||dados.protocolos.some(p=>p.nome?.toLowerCase().includes('pav')||p.nome?.toLowerCase().includes('ventilacao')), obs:cfg.tem_uti?'Verificar protocolo PAV':'N/A - sem UTI'},
            {cod:'C.14',tipo:'Estrutura',   req:false, desc:'Protocolo prevencao ISC + capacitacao (ou NAO SE APLICA)', ok:!cfg.tem_centro_cirurgico||dados.protocolos.some(p=>p.nome?.toLowerCase().includes('isc')||p.nome?.toLowerCase().includes('cirurgico')), obs:cfg.tem_centro_cirurgico?'Verificar protocolo ISC':'N/A - sem centro cirurgico'},
            {cod:'C.15',tipo:'Estrutura',   req:false, desc:'Protocolo precaucoes e isolamento + capacitacao', ok:dados.protocolos.some(p=>p.nome?.toLowerCase().includes('isolamento')||p.nome?.toLowerCase().includes('precaucao')), obs:'Verificar protocolo de precaucoes cadastrado'},
            {cod:'C.16',tipo:'Processo',    req:false, desc:'Conformidade avaliacao risco LPP (amostra prontuarios)', ok:dados.nots.filter(n=>n.event_subtype?.includes('LPP')||n.event_subtype?.includes('Lesao')).length>=0, obs:'Monitorado via notificacoes de LPP'},
            {cod:'C.17',tipo:'Processo',    req:false, desc:'Conformidade avaliacao risco de queda (amostra prontuarios)', ok:dados.nots.filter(n=>n.event_subtype?.includes('Queda')).length>=0, obs:'Monitorado via notificacoes de queda'},
            {cod:'C.18',tipo:'Processo',    req:false, desc:'Conformidade LVCS - Lista de Verificacao Cirurgia Segura', ok:true, obs:'Nao se aplica se servico nao possui centro cirurgico'},
            {cod:'C.19',tipo:'Gestao Risco',req:false, desc:'Monitoramento e envio mensal consumo alcool gel (10-12 meses)', ok:mesesIndDSM>=10&&totalAlcoolGel>0, obs:mesesIndDSM+' meses com dados | Total alcool gel: '+(totalAlcoolGel>0?totalAlcoolGel+'mL':'nao preenchido')},
            {cod:'C.20',tipo:'Gestao Risco',req:true,  desc:'Notificacao regular incidentes no NOTIVISA (10-12 meses)', ok:notivsaOk, obs:dados.total+' notificacoes | '+dados.nots.filter(n=>n.notivisa_enviado).length+' no Notivisa'},
            {cod:'C.21',tipo:'Gestao Risco',req:true,  desc:'Monitoramento mensal IRAS com criterios diagnosticos ANVISA (10-12 meses)', ok:notMensal, obs:'IRAS monitoradas regularmente via sistema'},
            {cod:'C.22',tipo:'Gestao Risco',req:false, desc:'Monitoramento mensal antimicrobianos UTI adulto - DDD (10-12 meses)', ok:dados.protocolos.some(p=>p.nome?.toLowerCase().includes('antimicrobiano')||p.nome?.toLowerCase().includes('antibiotico')), obs:'Verificar se monitora DDD de antimicrobianos'},
            {cod:'C.23',tipo:'Processo',    req:false, desc:'Participacao na Avaliacao de Cultura de Seguranca (ultimos 24 meses)', ok:temSAQ, obs:'HSOPSC implementado no sistema - participacao ativa'},

          ];

          const score=criterios.filter(c=>c.ok).length;
          const pct=Math.round(score/criterios.length*100);
          const reqMinOk=['C.1','C.2','C.20','C.21'].every(cod=>criterios.find(c=>c.cod===cod)?.ok);
          const nivel=pct>=80&&reqMinOk?{label:'ALTA CONFORMIDADE',color:C.green}:pct>=60&&reqMinOk?{label:'MEDIA CONFORMIDADE',color:C.yellow}:{label:'BAIXA CONFORMIDADE',color:C.red};
          const tipoColor={'Estrutura':'#1D6FE8','Processo':C.teal,'Gestao Risco':C.yellow};

          return(<div>
            <div style={{background:nivel.color+'15',border:'2px solid '+nivel.color+'55',borderRadius:14,padding:16,marginBottom:14,display:'flex',alignItems:'center',gap:16}}>
              <div style={{textAlign:'center',flexShrink:0}}>
                <div style={{fontSize:36,fontWeight:900,color:nivel.color,lineHeight:1}}>{pct}%</div>
                <div style={{fontSize:10,color:C.muted,fontWeight:700}}>conformidade</div>
              </div>
              <div style={{flex:1}}>
                <div style={{fontSize:16,fontWeight:900,color:nivel.color}}>{nivel.label}</div>
                <div style={{fontSize:12,color:C.muted,marginTop:4}}>{score} de {criterios.length} criterios atendidos · {label}</div>
                {!reqMinOk&&<div style={{fontSize:11,color:C.red,fontWeight:700,marginTop:4}}>Criterios obrigatorios pendentes - risco de nao conformidade na avaliacao ANVISA</div>}
              </div>
            </div>

            <div style={{display:'flex',flexDirection:'column',gap:6}}>
              {criterios.map((c,i)=>(
                <div key={i} style={{background:C.card,border:'1px solid '+(c.ok?C.green:c.req?C.red:C.yellow)+'55',borderRadius:10,padding:'10px 14px',display:'flex',gap:10,alignItems:'flex-start'}}>
                  <div style={{width:28,height:28,borderRadius:'50%',background:c.ok?C.green:c.req?C.red:C.yellow,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:14,fontWeight:900,color:'#fff'}}>
                    {c.ok?String.fromCodePoint(10003):'!'}
                  </div>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
                      <span style={{fontSize:10,fontWeight:800,color:C.muted,background:C.surface,borderRadius:4,padding:'1px 5px'}}>{c.cod}</span>
                      <span style={{fontSize:9,fontWeight:700,color:tipoColor[c.tipo]||C.muted,background:(tipoColor[c.tipo]||C.muted)+'18',borderRadius:4,padding:'1px 5px'}}>{c.tipo}</span>
                      {c.req&&<span style={{fontSize:9,color:C.red,fontWeight:700,background:C.red+'15',borderRadius:4,padding:'1px 5px'}}>REQ. MINIMO</span>}
                    </div>
                    <div style={{fontSize:12,fontWeight:700,color:C.text}}>{c.desc}</div>
                    <div style={{fontSize:11,color:c.ok?C.green:c.req?C.red:C.yellow,marginTop:2}}>{c.obs}</div>
                  </div>
                </div>
              ))}
            </div>

            <div style={{background:C.surface,border:'1px solid '+C.border,borderRadius:12,padding:14,marginTop:8}}>
              <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:8}}>Indicadores que requerem lancamento manual</div>
              <div style={{fontSize:11,color:C.muted,lineHeight:1.7}}>
                Os indicadores abaixo nao sao calculados automaticamente. Lance-os na aba <strong>Indicadores</strong> para completar a avaliacao:<br/>
                C.3.1 Consumo alcool gel (mL/1000 p-d) · C.3.2 Consumo sabonete · C.3.3 Adesao HM % ·
                C.4.1 Pulseira identificacao % · C.4.2 EA falha identificacao ·
                C.6.1 Adesao LVCS % · C.7.4 Incidencia LPP · C.8.2 Quedas com dano %
              </div>
            </div>
          </div>);
        })()}
      </div>}
  </div>);
}

function MembroNSPPainel({sbUrl,sbKey,showToast,hospital,profileMode,userSubnucleo,onBack}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const [stats,setStats]=useState(null);
  const [notifications,setNotifications]=useState([]);
  const [loading,setLoading]=useState(false);
  const [filtroSub,setFiltroSub]=useState(userSubnucleo||'todos');
  useEffect(()=>{if(userSubnucleo)setFiltroSub(userSubnucleo);},[userSubnucleo]);
  const [mesSel,setMesSel]=useState(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;});
  const [notsMes,setNotsMes]=useState([]);
  const [loadingMes,setLoadingMes]=useState(false);
  const [showFormTrein,setShowFormTrein]=useState(null);
  const [formTrein,setFormTrein]=useState({tipo:'treinamento',qtd:1,participantes:'',protocolo:'',data:new Date().toISOString().slice(0,10)});
  const [savingTrein,setSavingTrein]=useState(false);
  const [rcaMembro,setRcaMembro]=useState(null);
  const [notiVisaMembro,setNotiVisaMembro]=useState(null);

  const MESES=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

  const carregar=()=>{
    if(!sbUrl||!sbKey) return;
    setLoading(true);
    Promise.all([
      sbSelect(sbUrl,sbKey,'notifications',`hospital_id=eq.${h.id}&is_test=neq.true&order=created_at.desc&limit=2000&select=*`),
      sbSelect(sbUrl,sbKey,'treinamentos_nsp',`hospital_id=eq.${h.id}&select=*&order=data.desc`).catch(()=>[]),
    ]).then(([nots,treins])=>{
      setNotifications(nots||[]);
      setStats({...computeStats(nots||[]),treins:treins||[]});
    }).catch(()=>showToast('Erro ao carregar','error')).finally(()=>setLoading(false));
  };

  useEffect(()=>{carregar();},[sbUrl,sbKey]);

  useEffect(()=>{
    if(!sbUrl||!sbKey) return;
    setLoadingMes(true);
    const [ano,mes]=mesSel.split('-').map(Number);
    const inicio=new Date(ano,mes-1,1).toISOString().slice(0,10);
    const fim=new Date(ano,mes,0).toISOString().slice(0,10);
    sbSelect(sbUrl,sbKey,'notifications',
      `hospital_id=eq.${h.id}&event_date=gte.${inicio}&event_date=lte.${fim}&is_test=neq.true&order=event_date.asc&limit=200`
    ).then(d=>setNotsMes(d||[])).catch(()=>[]).finally(()=>setLoadingMes(false));
  },[mesSel,sbUrl,sbKey]);

  const navMes=(dir)=>{
    let [ano,mes]=mesSel.split('-').map(Number);
    mes+=dir; if(mes>12){mes=1;ano++;} if(mes<1){mes=12;ano--;}
    setMesSel(`${ano}-${String(mes).padStart(2,'0')}`);
  };

  const salvarTrein=async(subId)=>{
    if(!formTrein.participantes) return showToast('Informe o numero de participantes','error');
    setSavingTrein(true);
    try{
      await sbInsert(sbUrl,sbKey,'treinamentos_nsp',{
        hospital_id:h.id,tipo:formTrein.tipo,
        subnucleo:subId||userSubnucleo||'nsp_pleno',
        protocolo:formTrein.protocolo||null,data:formTrein.data||null,
        participantes:Number(formTrein.participantes)||0,
        descricao:formTrein.protocolo||null,responsavel:profileMode||'membro_nsp',
      });
      showToast('Registro salvo!','success');
      setShowFormTrein(null);
      setFormTrein({tipo:'treinamento',qtd:1,participantes:'',protocolo:'',data:new Date().toISOString().slice(0,10)});
      carregar();
    }catch{showToast('Erro ao salvar','error');}
    setSavingTrein(false);
  };

  if(loading) return(<div style={{display:'flex',justifyContent:'center',padding:60}}><Dots/></div>);

  const s=stats||{total:0,sp:0,ccih:0,adm:0,sentinela:0,culturaScore:0,sectorData:[],diasSemSentinela:null,treins:[]};

  const spMes=notsMes.filter(n=>n.notification_type==='seguranca_paciente'||n.notification_type==='ccih').length;
  const admMes=notsMes.filter(n=>n.notification_type==='administrativa').length;
  const tiposMes=[
    {label:'Quedas',count:notsMes.filter(n=>n.event_subtype?.toLowerCase().includes('queda')||n.description?.toLowerCase().includes('queda')).length,cor:'#F59E0B'},
    {label:'Perda AVP',count:notsMes.filter(n=>n.event_subtype?.toLowerCase().includes('avp')||n.event_subtype?.toLowerCase().includes('acesso')).length,cor:'#3B82F6'},
    {label:'LPP',count:notsMes.filter(n=>n.event_subtype?.toLowerCase().includes('press')||n.event_subtype?.toLowerCase().includes('lpp')).length,cor:'#EF4444'},
    {label:'Medicacao',count:notsMes.filter(n=>n.event_subtype?.toLowerCase().includes('medic')||n.description?.toLowerCase().includes('medic')).length,cor:'#EC4899'},
    {label:'Identificacao',count:notsMes.filter(n=>n.event_subtype?.toLowerCase().includes('identif')).length,cor:'#0D9488'},
  ].filter(t=>t.count>0).sort((a,b)=>b.count-a.count);

  const maxTipo=tiposMes[0]?.count||1;

  const setoresMes=[...new Set(notsMes.map(n=>n.sector).filter(Boolean))].map(setor=>({
    setor,count:notsMes.filter(n=>n.sector===setor).length
  })).sort((a,b)=>b.count-a.count).slice(0,5);
  const maxSetor=setoresMes[0]?.count||1;

  const sub=SUBNUCLEOS_HNSA.find(s=>s.id===userSubnucleo);

  return(<div style={{padding:'0 16px 80px'}}>
    <BackHeader
      title={sub?sub.icon+' '+sub.label:'Painel Membro NSP'}
      subtitle='DEMONSTRACAO - Nucleo de Seguranca do Paciente'
      onBack={onBack}
    />

    <div style={{padding:'16px 0'}}>
    {rcaMembro&&<RCAPanel notification={rcaMembro} sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} onClose={()=>setRcaMembro(null)} onSaved={()=>{setRcaMembro(null);carregar();}}/>}
    {notiVisaMembro&&<NotiVisaPanel notification={notiVisaMembro} sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} onClose={()=>setNotiVisaMembro(null)}/>}

    {/* Metricas totais */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:10,marginBottom:14}}>
      <StatCard icon={String.fromCodePoint(128202)} label='Total notificacoes' value={s.total} color={C.teal}/>
      <StatCard icon={String.fromCodePoint(127973)} label='Seg. Paciente' value={s.sp} color={C.red}/>
      <StatCard icon={String.fromCodePoint(128203)} label='Administrativas' value={s.adm} color={C.purple}/>
    </div>

    {/* Dias sem sentinela */}
    {s.diasSemSentinela!==null&&<div style={{background:s.diasSemSentinela>=30?C.green+'18':C.yellow+'18',border:'1px solid '+(s.diasSemSentinela>=30?C.green:C.yellow)+'44',borderRadius:12,padding:'12px 16px',marginBottom:14,display:'flex',alignItems:'center',gap:12}}>
      <div style={{fontSize:32,fontWeight:900,color:s.diasSemSentinela>=30?C.green:C.yellow,lineHeight:1}}>{s.diasSemSentinela}</div>
      <div><div style={{fontSize:13,fontWeight:700,color:s.diasSemSentinela>=30?C.green:C.yellow}}>dias sem evento sentinela</div>
      <div style={{fontSize:11,color:C.muted}}>Meta ONA: 90 dias</div></div>
    </div>}

    {/* Panorama do mes */}
    <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:'14px 16px',marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:12}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text}}>Panorama do Mes</div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <button onClick={()=>navMes(-1)} style={{background:'none',border:'none',color:C.teal,fontSize:18,cursor:'pointer',padding:'0 2px'}}>{String.fromCodePoint(8249)}</button>
          <span style={{fontSize:12,fontWeight:700,color:C.text,minWidth:64,textAlign:'center'}}>{MESES[Number(mesSel.split('-')[1])-1]}/{mesSel.split('-')[0]}</span>
          <button onClick={()=>navMes(1)} style={{background:'none',border:'none',color:C.teal,fontSize:18,cursor:'pointer',padding:'0 2px'}}>{String.fromCodePoint(8250)}</button>
        </div>
      </div>
      {loadingMes&&<div style={{textAlign:'center',padding:16}}><Dots/></div>}
      {!loadingMes&&(<div>
        <div style={{display:'flex',gap:8,marginBottom:12}}>
          <div style={{flex:1,background:C.red+'10',borderRadius:10,padding:'8px 10px',textAlign:'center'}}>
            <div style={{fontSize:24,fontWeight:900,color:C.red}}>{spMes}</div>
            <div style={{fontSize:10,color:C.muted}}>Seg. Paciente</div>
          </div>
          <div style={{flex:1,background:C.muted+'10',borderRadius:10,padding:'8px 10px',textAlign:'center'}}>
            <div style={{fontSize:24,fontWeight:900,color:C.muted}}>{admMes}</div>
            <div style={{fontSize:10,color:C.muted}}>Administrativas</div>
          </div>
          <div style={{flex:1,background:C.teal+'10',borderRadius:10,padding:'8px 10px',textAlign:'center'}}>
            <div style={{fontSize:24,fontWeight:900,color:C.teal}}>{notsMes.length}</div>
            <div style={{fontSize:10,color:C.muted}}>Total</div>
          </div>
        </div>
        {tiposMes.length>0&&<div style={{marginBottom:12}}>
          <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}>Tipos mais frequentes</div>
          {tiposMes.map((t,i)=>(
            <div key={i} style={{marginBottom:5}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:2}}>
                <span style={{color:C.text}}>{t.label}</span>
                <span style={{color:t.cor,fontWeight:700}}>{t.count}</span>
              </div>
              <div style={{height:4,background:C.border,borderRadius:2,overflow:'hidden'}}>
                <div style={{width:(t.count/maxTipo)*100+'%',height:'100%',background:t.cor,borderRadius:2}}/>
              </div>
            </div>
          ))}
        </div>}
        {setoresMes.length>0&&<div>
          <div style={{fontSize:11,color:C.muted,fontWeight:600,marginBottom:6,textTransform:'uppercase',letterSpacing:'0.06em'}}>Por setor</div>
          {setoresMes.map((d,i)=>(
            <div key={i} style={{marginBottom:5}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:11,marginBottom:2}}>
                <span style={{color:C.text}}>{d.setor}</span>
                <span style={{color:C.teal,fontWeight:700}}>{d.count}</span>
              </div>
              <div style={{height:4,background:C.border,borderRadius:2,overflow:'hidden'}}>
                <div style={{width:(d.count/maxSetor)*100+'%',height:'100%',background:C.teal,borderRadius:2}}/>
              </div>
            </div>
          ))}
        </div>}
        {notsMes.length===0&&<div style={{textAlign:'center',padding:'12px 0',fontSize:12,color:C.muted}}>Nenhuma notificacao neste mes</div>}
      </div>)}
    </div>

    {/* Treinamentos do subnucleo */}
    <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Subnucleos - Treinamentos</div>
    <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:10}}>
      <button onClick={()=>setFiltroSub('todos')} style={{padding:'5px 12px',borderRadius:16,border:'none',background:filtroSub==='todos'?C.teal:'transparent',color:filtroSub==='todos'?'#06101F':C.muted,fontSize:11,fontWeight:700,cursor:'pointer'}}>Todos</button>
      {SUBNUCLEOS_HNSA.map(sub=>(
        <button key={sub.id} onClick={()=>setFiltroSub(sub.id)} style={{padding:'5px 12px',borderRadius:16,border:'none',background:filtroSub===sub.id?sub.color:'transparent',color:filtroSub===sub.id?'#fff':C.muted,fontSize:11,fontWeight:700,cursor:'pointer'}}>
          <span style={{fontSize:13}}>{sub.icon}</span> {sub.label.split(' ')[0]}
        </button>
      ))}
    </div>

    {SUBNUCLEOS_HNSA.filter(sub=>filtroSub==='todos'||filtroSub===sub.id).map(sub=>{
      const regs=s.treins.filter(t=>t.subnucleo===sub.id);
      const treins=regs.filter(t=>t.tipo==='treinamento');
      const totalPart=regs.reduce((acc,r)=>acc+(r.participantes||0),0);
      return(<div key={sub.id} style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'12px 14px',marginBottom:8}}>
        <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
          <span style={{fontSize:20}}>{sub.icon}</span>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text}}>{sub.label}</div>
            <div style={{fontSize:10,color:C.muted}}>{treins.length} treinamento(s) · {totalPart} participantes</div>
          </div>
          <button onClick={()=>setShowFormTrein(showFormTrein===sub.id?null:sub.id)}
            style={{background:sub.color+'22',border:'1px solid '+sub.color+'44',borderRadius:8,padding:'4px 10px',color:sub.color,fontSize:11,fontWeight:700,cursor:'pointer',flexShrink:0}}>
            {showFormTrein===sub.id?'Cancelar':'+ Registrar'}
          </button>
        </div>
        {regs.length>0&&<div style={{display:'flex',gap:8,marginBottom:showFormTrein===sub.id?8:0}}>
          <div style={{flex:1,background:sub.color+'15',borderRadius:8,padding:'6px 10px',textAlign:'center'}}>
            <div style={{fontSize:18,fontWeight:800,color:sub.color}}>{treins.length}</div>
            <div style={{fontSize:9,color:C.muted}}>Treinamentos</div>
          </div>
          <div style={{flex:1,background:C.teal+'15',borderRadius:8,padding:'6px 10px',textAlign:'center'}}>
            <div style={{fontSize:18,fontWeight:800,color:C.teal}}>{regs.filter(t=>t.tipo==='reuniao').length}</div>
            <div style={{fontSize:9,color:C.muted}}>Reunioes</div>
          </div>
          <div style={{flex:1,background:C.blue+'15',borderRadius:8,padding:'6px 10px',textAlign:'center'}}>
            <div style={{fontSize:18,fontWeight:800,color:C.blue}}>{totalPart}</div>
            <div style={{fontSize:9,color:C.muted}}>Participantes</div>
          </div>
        </div>}
        {showFormTrein===sub.id&&(<div style={{background:C.surface,border:'1px solid '+C.border,borderRadius:10,padding:'12px',marginTop:8}}>
          <div style={{display:'flex',gap:6,marginBottom:8}}>
            {['treinamento','reuniao'].map(t=>(
              <button key={t} onClick={()=>setFormTrein(f=>({...f,tipo:t}))}
                style={{flex:1,padding:'6px',borderRadius:8,border:'1px solid '+(formTrein.tipo===t?sub.color:C.border),background:formTrein.tipo===t?sub.color+'22':'transparent',color:formTrein.tipo===t?sub.color:C.muted,fontSize:11,fontWeight:700,cursor:'pointer',textTransform:'capitalize'}}>
                {t==='treinamento'?'Treinamento':'Reuniao NSP'}
              </button>
            ))}
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:3}}>Data</div>
            <input type='date' value={formTrein.data} onChange={e=>setFormTrein(f=>({...f,data:e.target.value}))}
              style={{width:'100%',background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'7px 10px',color:C.text,fontSize:12,outline:'none'}}/>
          </div>
          <div style={{marginBottom:8}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:3}}>Numero de participantes *</div>
            <input type='number' min='1' value={formTrein.participantes} onChange={e=>setFormTrein(f=>({...f,participantes:e.target.value}))}
              placeholder='Ex: 12'
              style={{width:'100%',background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'7px 10px',color:C.text,fontSize:12,outline:'none'}}/>
          </div>
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,color:C.muted,marginBottom:3}}>Tema / Protocolo abordado</div>
            <input type='text' value={formTrein.protocolo} onChange={e=>setFormTrein(f=>({...f,protocolo:e.target.value}))}
              placeholder='Ex: Higienizacao das maos...'
              style={{width:'100%',background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'7px 10px',color:C.text,fontSize:12,outline:'none'}}/>
          </div>
          <button onClick={()=>salvarTrein(sub.id)} disabled={savingTrein}
            style={{width:'100%',background:sub.color,border:'none',borderRadius:10,padding:'10px',color:'#fff',fontWeight:800,fontSize:13,cursor:'pointer'}}>
            {savingTrein?'Salvando...':'Salvar registro'}
          </button>
        </div>)}
        {regs.slice(0,2).map((r,i)=>(
          <div key={i} style={{borderLeft:'2px solid '+sub.color+'44',paddingLeft:8,marginTop:6}}>
            <div style={{fontSize:11,color:C.text}}>{r.protocolo||r.descricao||r.tipo||'-'}</div>
            <div style={{fontSize:10,color:C.muted}}>{r.data?new Date(r.data+'T12:00:00').toLocaleDateString('pt-BR'):'-'} - {r.participantes||0} participantes</div>
          </div>
        ))}
      </div>);
    })}

    {/* Notificacoes para analise */}
    <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:'14px 16px',marginBottom:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
        <div>
          <div style={{fontSize:13,fontWeight:700,color:C.text}}>Notificacoes para analise</div>
          <div style={{fontSize:11,color:C.muted,marginTop:2}}>Somente leitura</div>
        </div>
        <select value={filtroSub} onChange={e=>setFiltroSub(e.target.value)}
          style={{background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'5px 8px',color:C.text,fontSize:11}}>
          <option value='todos'>Todos</option>
          {SUBNUCLEOS_HNSA.map(s=><option key={s.id} value={s.id}>{s.label}</option>)}
        </select>
      </div>
      {(()=>{
        const visiveis=notifications.filter(n=>{
          if(n.is_test) return false;
          if(filtroSub==='todos') return true;
          const subtype=(n.event_subtype||n.occurrence_subtype||'').toLowerCase();
          if(filtroSub==='queda') return subtype.includes('queda');
          if(filtroSub==='lpp') return subtype.includes('press')||subtype.includes('lpp');
          if(filtroSub==='medicamentos') return subtype.includes('medic')||subtype.includes('farmac');
          if(filtroSub==='identificacao') return subtype.includes('identif');
          if(filtroSub==='comunicacao') return subtype.includes('comuni')||subtype.includes('sbar');
          if(filtroSub==='cirurgia') return subtype.includes('cirurg');
          return true;
        }).slice(0,30);
        if(visiveis.length===0) return <div style={{textAlign:'center',color:C.muted,padding:20,fontSize:12}}>Nenhuma notificacao encontrada</div>;
        return visiveis.map((n,i)=>{
          const tag=getTag(n);
          const titulo=getTitle(n);
          const data=n.event_date?new Date(n.event_date+'T12:00:00').toLocaleDateString('pt-BR'):new Date(n.created_at).toLocaleDateString('pt-BR');
          return(<div key={n.id} style={{background:C.surface,borderRadius:10,padding:'10px 12px',marginBottom:6}}>
            <div style={{display:'flex',alignItems:'flex-start',gap:8}}>
              <div style={{background:tag.color+'22',color:tag.color,borderRadius:5,padding:'2px 6px',fontSize:9,fontWeight:700,flexShrink:0,marginTop:1}}>{tag.label}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:2}}>{titulo}</div>
                <div style={{fontSize:10,color:C.muted}}>{n.sector||'-'} - {data}</div>
                {n.description&&<div style={{fontSize:11,color:C.muted,marginTop:3,lineHeight:1.4}}>{n.description.slice(0,120)}{n.description.length>120?'...':''}</div>}
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0}}>
                {!n.rca_gerado&&n.notification_type==='seguranca_paciente'&&<button onClick={()=>setRcaMembro(n)} style={{fontSize:9,background:C.yellow,color:'#000',borderRadius:4,padding:'3px 7px',fontWeight:800,border:'none',cursor:'pointer'}}>Analisar</button>}
                {n.notification_type==='seguranca_paciente'&&<button onClick={()=>setNotiVisaMembro(n)} style={{fontSize:9,background:C.blue,color:'#fff',borderRadius:4,padding:'3px 7px',fontWeight:800,border:'none',cursor:'pointer'}}>Ficha Notivisa</button>}
                {n.gravidade==='Evento sentinela'&&<div style={{fontSize:9,background:C.red+'22',color:C.red,borderRadius:4,padding:'2px 5px',fontWeight:700}}>SENTINELA</div>}
              </div>
            </div>
          </div>);
        });
      })()}
    </div>

    <ProtocoloSubnucleoWidget sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} hospital={h} userSubnucleo={filtroSub==='todos'?userSubnucleo:filtroSub}/>
    <IndicadoresSubnucleoWidget sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} hospital={h} userSubnucleo={filtroSub==='todos'?userSubnucleo:filtroSub}/>
  </div>
  </div>);
}
function HomeView({setView,sbUrl,sbKey,onConfig,showToast,gestorMode,testMode,hospital,refreshKey,setFiltroNotif}) {
  const [stats,setStats]=useState(null);
  const [loading,setLoading]=useState(false);
  const [rcaTarget,setRcaTarget]=useState(null);
  const [notiVisaTarget,setNotiVisaTarget]=useState(null);
  const [riscoTarget,setRiscoTarget]=useState(null);
  const [planoTarget,setPlanoTarget]=useState(null);
  const [alertas,setAlertas]=useState({protsVencidos:[],planosAtrasados:[],rcaPendentes:[]});
  const configured=!!(sbUrl&&sbKey);

  useEffect(()=>{
    if(!configured) return;
    setLoading(true);
    const hid=(hospital||DEFAULT_HOSPITAL).id;
    const hoje=new Date().toISOString().slice(0,10);
    Promise.all([
      sbSelect(sbUrl,sbKey,'notifications',`hospital_id=eq.${hid}&is_test=neq.true&order=created_at.desc&limit=2000&select=*`),
      sbSelect(sbUrl,sbKey,'protocolos',`hospital_id=eq.${hid}&select=nome,proxima_revisao`).catch(()=>[]),
      sbSelect(sbUrl,sbKey,'plano_acoes',`hospital_id=eq.${hid}&status=neq.concluido&select=*`).catch(()=>[]),
    ]).then(([data,prots,planos])=>{
      setStats(computeStats(data));
      const protsVencidos=(prots||[]).filter(p=>p.proxima_revisao&&p.proxima_revisao<hoje);
      const planosAtrasados=(planos||[]).filter(p=>p.prazo&&p.prazo<hoje);
      const rcaPendentes=(data||[]).filter(n=>n.notification_type==='seguranca_paciente'&&!n.rca_gerado&&(n.gravidade==='Evento sentinela'||n.gravidade==='Evento adverso grave'));
      setAlertas({protsVencidos,planosAtrasados,rcaPendentes});
    })
      .catch(()=>showToast('Erro ao carregar dados','error'))
      .finally(()=>setLoading(false));
  },[sbUrl,sbKey,refreshKey]);

  const s=stats||{total:0,totalPrev:0,sp:0,ccih:0,adm:0,sentinela:0,semRCA:0,culturaScore:0,diasSemSentinela:null};
  const diff=s.total-(s.totalPrev||0);
  const diffLabel=diff>0?`+${diff} vs mês anterior`:diff<0?`${diff} vs mês anterior`:'= igual ao mês anterior';
  const diffColor=diff>0?C.red:diff<0?C.green:C.muted;
  const mesAtual=new Date().toLocaleDateString('pt-BR',{month:'long'});

  return(<div style={{padding:'24px 16px 16px',display:'flex',flexDirection:'column',gap:16}}>
    {rcaTarget&&<RCAPanel notification={rcaTarget} sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} onClose={()=>setRcaTarget(null)}/>}
    {notiVisaTarget&&<NotiVisaPanel notification={notiVisaTarget} sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} onClose={()=>setNotiVisaTarget(null)}/>}
    {riscoTarget&&<MatrizRisco notification={riscoTarget} sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} onClose={()=>setRiscoTarget(null)} onSaved={()=>{}}/>}
    {planoTarget&&<PlanoAcaoPanel notification={planoTarget} sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} onClose={()=>setPlanoTarget(null)}/>}

    {/* Header */}
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div style={{display:'flex',alignItems:'center',gap:12}}>
        <div style={{width:44,height:44,borderRadius:14,background:'linear-gradient(135deg,'+C.teal+','+C.blue+')',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',flexShrink:0}}><img src={LOGO_SRC} alt={LOGO_ALT} style={{width:38,height:'auto'}}/></div>
        <div>
          <div style={{fontSize:20,fontWeight:900,color:C.text,letterSpacing:'-0.02em'}}>NotificaAI</div>

        <IconGear size={18} color={configured?C.teal:C.muted}/>
      </button>
