function ProtocoloSubnucleoWidget({sbUrl,sbKey,showToast,hospital,userSubnucleo}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const [registros,setRegistros]=useState({});
  const [editando,setEditando]=useState({});
  const [hoje]=useState(new Date().toISOString().slice(0,10));
  const crits=SUB_PROTOCOLOS[userSubnucleo]||[];
  const meusProt=PROTOCOLOS_DSM.filter(p=>crits.includes(p.crit));
  const sub=SUBNUCLEOS_HNSA.find(s=>s.id===userSubnucleo)||{color:C.teal};

  const carregar=async()=>{
    if(!sbUrl||!sbKey||!meusProt.length)return;
    try{const data=await sbSelect(sbUrl,sbKey,'protocolos',`hospital_id=eq.${h.id}&select=*`);const map={};(data||[]).forEach(p=>{map[p.nome]=p;});setRegistros(map);}catch(e){console.error(e);}
  };
  useEffect(()=>{carregar();},[sbUrl,sbKey,userSubnucleo]);

  const abrirEdit=(def)=>{const r=registros[def.nome];setEditando(e=>({...e,[def.crit]:{aprovado_em:r?.aprovado_em||'',link:r?.link||'',responsavel:r?.responsavel||'',numero:r?.numero||'',saving:false}}));};
  const setEdit=(crit,k,v)=>setEditando(e=>({...e,[crit]:{...e[crit],[k]:v}}));

  const salvar=async(def)=>{
    const ed=editando[def.crit];
    if(!ed?.aprovado_em){showToast('Informe a data de aprovacao','error');return;}
    setEditando(e=>({...e,[def.crit]:{...e[def.crit],saving:true}}));
    try{
      const prox=new Date(ed.aprovado_em);prox.setFullYear(prox.getFullYear()+3);
      const payload={hospital_id:h.id,nome:def.nome,aprovado_em:ed.aprovado_em,proxima_revisao:prox.toISOString().slice(0,10),link:ed.link||null,responsavel:ed.responsavel||null,numero:ed.numero||null,categoria:def.sub,status:'ativo'};
      const existente=registros[def.nome];
      if(existente){await sbPatch(sbUrl,sbKey,'protocolos',`id=eq.${existente.id}`,payload);}
      else{await sbInsert(sbUrl,sbKey,'protocolos',payload);}
      showToast('Protocolo atualizado!','success');
      setEditando(e=>{const n={...e};delete n[def.crit];return n;});
      carregar();
    }catch(e){showToast('Erro: '+e.message,'error');}
    setEditando(e=>({...e,[def.crit]:{...e[def.crit],saving:false}}));
  };

  const getStatus=(def)=>{
    const r=registros[def.nome];if(!r||!r.aprovado_em)return{s:'missing',label:'Nao cadastrado',color:C.muted};
    const prox=r.proxima_revisao||new Date(new Date(r.aprovado_em).setFullYear(new Date(r.aprovado_em).getFullYear()+3)).toISOString().slice(0,10);
    if(prox<hoje)return{s:'vencido',label:'VENCIDO',color:C.red};
    if(prox<=new Date(Date.now()+60*86400000).toISOString().slice(0,10))return{s:'proximo',label:'Vence em 60d',color:C.yellow};
    return{s:'ok',label:'Valido',color:C.green};
  };

  if(!meusProt.length)return null;
  const inp={background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'8px 10px',color:C.text,fontSize:12,outline:'none',width:'100%'};

  return(<div style={{background:C.card,border:'1px solid '+(sub.color||C.teal)+'44',borderRadius:14,padding:16,marginTop:14,borderLeft:'3px solid '+(sub.color||C.teal)}}>
    <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:12}}>
      {meusProt.length===1?'Meu Protocolo':'Meus Protocolos'}
      <span style={{fontSize:11,fontWeight:400,color:C.muted,marginLeft:8}}>clique para atualizar</span>
    </div>
    {meusProt.map(def=>{
      const st=getStatus(def);const r=registros[def.nome];const ed=editando[def.crit];
      return(<div key={def.crit} style={{background:C.surface,borderRadius:10,padding:'12px 14px',marginBottom:10,borderLeft:'3px solid '+st.color}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:ed?10:4}}>
          <div style={{flex:1}}>
            <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:2}}>
              <span style={{background:C.teal+'22',color:C.teal,borderRadius:5,padding:'1px 7px',fontSize:10,fontWeight:800}}>{def.crit}</span>
              <span style={{fontSize:13,fontWeight:700,color:C.text}}>{def.nome}</span>
            </div>
            <div style={{fontSize:10,color:C.muted}}>{def.base}</div>
          </div>
          <div style={{display:'flex',gap:6,alignItems:'center',flexShrink:0}}>
            <span style={{background:st.color+'22',color:st.color,borderRadius:6,padding:'2px 8px',fontSize:10,fontWeight:700}}>{st.label}</span>
            {!ed&&<button onClick={()=>abrirEdit(def)} style={{background:C.card,border:'1px solid '+C.border,borderRadius:7,padding:'4px 10px',color:C.muted,fontSize:11,cursor:'pointer',fontWeight:700}}>{r?'Atualizar':'+ Registrar'}</button>}
          </div>
        </div>
        {!ed&&r&&<div style={{display:'flex',gap:14,fontSize:11,color:C.muted,flexWrap:'wrap'}}>
          <span>Aprovado: {r.aprovado_em?new Date(r.aprovado_em+'T12:00:00').toLocaleDateString('pt-BR'):'-'}</span>
          <span style={{color:st.color}}>Revisao: {r.proxima_revisao?new Date(r.proxima_revisao+'T12:00:00').toLocaleDateString('pt-BR'):'-'}</span>
          {r.responsavel&&<span>Resp.: {r.responsavel}</span>}
          {r.link&&<a href={r.link} target='_blank' rel='noreferrer' style={{color:C.teal}}>Documento</a>}
        </div>}
        {!ed&&!r&&<div style={{fontSize:11,color:C.muted,fontStyle:'italic'}}>Clique em "+ Registrar".</div>}
        {ed&&<div style={{display:'flex',flexDirection:'column',gap:8}}>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            <div><label style={{fontSize:11,color:C.muted,display:'block',marginBottom:3}}>Data de aprovacao *</label><input type='date' value={ed.aprovado_em} onChange={e=>setEdit(def.crit,'aprovado_em',e.target.value)} style={inp}/></div>
            <div><label style={{fontSize:11,color:C.muted,display:'block',marginBottom:3}}>N / codigo</label><input type='text' value={ed.numero} onChange={e=>setEdit(def.crit,'numero',e.target.value)} placeholder='POP-NSP-003' style={inp}/></div>
          </div>
          <div><label style={{fontSize:11,color:C.muted,display:'block',marginBottom:3}}>Responsavel</label><input type='text' value={ed.responsavel} onChange={e=>setEdit(def.crit,'responsavel',e.target.value)} placeholder='Nome ou cargo' style={inp}/></div>
          <div><label style={{fontSize:11,color:C.muted,display:'block',marginBottom:3}}>Link do documento</label>
            <div style={{display:'flex',gap:6}}>
              <input type='text' value={ed.link} onChange={e=>setEdit(def.crit,'link',e.target.value)} placeholder='https://' style={{...inp,flex:1}}/>
              <StorageUploadBtn tipo='protocolo' sbUrl={sbUrl} sbKey={sbKey} meta={{crit:def.crit,nomeProt:def.nome,ano:String(new Date().getFullYear()),semestre:new Date().getMonth()<6?'1':'2'}} onUploaded={link=>setEdit(def.crit,'link',link)} label='Anexar'/>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button onClick={()=>setEditando(e=>{const n={...e};delete n[def.crit];return n;})} style={{flex:1,background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'8px',color:C.muted,fontSize:12,fontWeight:700,cursor:'pointer'}}>Cancelar</button>
            <button onClick={()=>salvar(def)} disabled={ed.saving} style={{flex:2,background:ed.saving?C.border:C.teal,border:'none',borderRadius:8,padding:'8px',color:ed.saving?C.muted:'#06101F',fontSize:12,fontWeight:800,cursor:ed.saving?'default':'pointer'}}>{ed.saving?'Salvando...':'Salvar'}</button>
          </div>
        </div>}
      </div>);
    })}
  </div>);
}

  const salvar=async()=>{

    {titulo:'C.7 LPP',campos:[{label:'Avaliacao risco LPP admissao',key:'lpp_avaliacao_admissao'},{label:'Total admitidos',key:'total_admitidos'},{label:'Medidas preventivas LPP',key:'lpp_medidas_preventivas'},{label:'Pacientes com risco LPP',key:'lpp_pacientes_risco'},{label:'Avaliacao diaria LPP',key:'lpp_avaliacao_diaria'},{label:'Internados com risco LPP',key:'lpp_internados_risco'},{label:'Casos novos de LPP',key:'lpp_casos_novos'},{label:'Pac-dia risco LPP',key:'lpp_paciente_dia_risco'}]},
    {titulo:'C.8 Quedas',campos:[{label:'Prontuarios com avaliacao de risco ok',key:'queda_prontuarios_ok'},{label:'Total prontuarios analisados',key:'queda_prontuarios_total'},{label:'Quedas com dano',key:'quedas_com_dano'},{label:'Total de quedas',key:'quedas_total'}]},

    </div>))}
    {hist.length>0&&<div style={{marginBottom:10}}>
      <div style={{fontSize:13,fontWeight:800,color:C.text,marginBottom:10}}>Dashboard de Indicadores — Acumulado ({hist.length} {hist.length===1?'mes':'meses'})</div>
      {(()=>{
        const sum=(k)=>hist.reduce((a,r)=>a+(Number(r[k])||0),0);
        // Tendência: comparar último mês vs média dos anteriores
        const sumMes=(k,idx)=>idx<hist.length?Number(hist[idx][k]||0):0;
        const ultimo=hist[0]||{};
        const anteriores=hist.slice(1);
        const mediaAnt=(k)=>anteriores.length?anteriores.reduce((a,r)=>a+(Number(r[k])||0),0)/anteriores.length:null;
        const tendencia=(k,inv=false)=>{
          if(hist.length<2) return null;
          const ult=Number(ultimo[k]||0);
          const med=mediaAnt(k);
          if(med===null||med===0) return null;
          const delta=(ult-med)/med*100;
          if(Math.abs(delta)<5) return {seta:'→',cor:C.muted,delta:0};
          const melhorou=inv?delta<0:delta>0;
          return{seta:delta>0?'↑':'↓',cor:melhorou?C.green:C.red,delta:Math.abs(delta).toFixed(0)+'%'};
        };
        const pct=(n,d,dec=1)=>d>0?((n/d)*100).toFixed(dec)+'%':'N/D';
        const taxa=(n,d,mul=1000,dec=2)=>d>0?((n/d)*mul).toFixed(dec):null;
        const pacDia=sum('paciente_dia_total');
        const indicadores=[
          {label:'Taxa de conformidade HM',formula:'acoes/oportunidades',val:pct(sum('hm_acoes_realizadas'),sum('hm_oportunidades')),meta:'>=80%',color:C.teal,
            tend:tendencia('hm_acoes_realizadas',false),ok:sum('hm_oportunidades')>0&&(sum('hm_acoes_realizadas')/sum('hm_oportunidades'))>=0.8},
          {label:'Taxa de identificacao',formula:'pulseiras/total pacientes',val:pct(sum('pacientes_identificados'),sum('pacientes_atendidos')),meta:'>=95%',color:'1D6FE8',
            tend:tendencia('pacientes_identificados',false),ok:sum('pacientes_atendidos')>0&&(sum('pacientes_identificados')/sum('pacientes_atendidos'))>=0.95},
          {label:'Conformidade avaliacao LPP admissao',formula:'avaliacoes/admitidos',val:pct(sum('lpp_avaliacao_admissao'),sum('total_admitidos')),meta:'>=90%',color:'EF4444',
            tend:tendencia('lpp_avaliacao_admissao',false),ok:sum('total_admitidos')>0&&(sum('lpp_avaliacao_admissao')/sum('total_admitidos'))>=0.9},
          {label:'Incidencia de LPP',formula:'casos/pac-dia × 1000',val:taxa(sum('lpp_casos_novos'),pacDia)?taxa(sum('lpp_casos_novos'),pacDia)+'/1000 pac-dia':'N/D',meta:'<3/1000',color:'EF4444',
            tend:tendencia('lpp_casos_novos',true),ok:pacDia>0&&(sum('lpp_casos_novos')/pacDia*1000)<3},
          {label:'Conformidade avaliacao de risco queda',formula:'prontuarios ok/total',val:pct(sum('queda_prontuarios_ok'),sum('queda_prontuarios_total')),meta:'>=90%',color:'F59E0B',
            tend:tendencia('queda_prontuarios_ok',false),ok:sum('queda_prontuarios_total')>0&&(sum('queda_prontuarios_ok')/sum('queda_prontuarios_total'))>=0.9},
          {label:'Taxa de queda com dano',formula:'quedas com dano/total quedas',val:pct(sum('quedas_com_dano'),sum('quedas_total')),meta:'<10%',color:'F59E0B',
            tend:tendencia('quedas_com_dano',true),ok:sum('quedas_total')>0&&(sum('quedas_com_dano')/sum('quedas_total'))<0.1},
          {label:'Taxa de erro na prescricao',formula:'erros/total prescricoes',val:pct(sum('erros_prescricao'),sum('total_prescricoes')),meta:'<1%',color:'8B5CF6',
            tend:tendencia('erros_prescricao',true),ok:sum('total_prescricoes')>0&&(sum('erros_prescricao')/sum('total_prescricoes'))<0.01},
          {label:'Densidade de IPCS/CVC',formula:'IRAS/cateter-dia × 1000',val:taxa(sum('ipcs_cvc'),sum('cateter_dia_cvc'))?taxa(sum('ipcs_cvc'),sum('cateter_dia_cvc'))+'/1000 cat-dia':'N/D',meta:'<2/1000',color:'06B6D4',
            tend:tendencia('ipcs_cvc',true),ok:sum('cateter_dia_cvc')>0&&(sum('ipcs_cvc')/sum('cateter_dia_cvc')*1000)<2},
          {label:'Densidade de ITU/CVD',formula:'ITU/pac-dia CVD × 1000',val:taxa(sum('itu_cvd'),sum('paciente_dia_cvd'))?taxa(sum('itu_cvd'),sum('paciente_dia_cvd'))+'/1000 pac-dia':'N/D',meta:'<3/1000',color:'06B6D4',
            tend:tendencia('itu_cvd',true),ok:sum('paciente_dia_cvd')>0&&(sum('itu_cvd')/sum('paciente_dia_cvd')*1000)<3},
          {label:'Densidade de PAV',formula:'casos/VM-dia × 1000',val:taxa(sum('pav_casos_novos'),sum('pacientes_vm'))?taxa(sum('pav_casos_novos'),sum('pacientes_vm'))+'/1000 VM-dia':'N/D',meta:'<5/1000',color:'EF4444',
            tend:tendencia('pav_casos_novos',true),ok:sum('pacientes_vm')>0&&(sum('pav_casos_novos')/sum('pacientes_vm')*1000)<5},
          {label:'Conformidade LVCS (cirurgia segura)',formula:'LVCS preenchidas/cirurgias',val:pct(sum('lvcs_preenchidas'),sum('cirurgias_realizadas')),meta:'>=95%',color:'10B981',
            tend:tendencia('lvcs_preenchidas',false),ok:sum('cirurgias_realizadas')>0&&(sum('lvcs_preenchidas')/sum('cirurgias_realizadas'))>=0.95},
          {label:'Consumo alcool gel',formula:'mL/pac-dia',val:pacDia>0?((sum('alcool_gel_ml')/pacDia)).toFixed(1)+' mL/pac-dia':'N/D',meta:'>20 mL/pac-dia',color:C.teal,
            tend:tendencia('alcool_gel_ml',false),ok:pacDia>0&&(sum('alcool_gel_ml')/pacDia)>=20},
        ];
        const semaforo=(ind)=>ind.val==='N/D'?C.muted:ind.ok?C.green:C.red;
        return(<div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:8}}>
          {indicadores.map((ind,i)=>(
            <div key={i} style={{background:C.card,border:'1px solid '+semaforo(ind)+'44',borderRadius:10,padding:'10px 12px',borderLeft:'3px solid '+semaforo(ind)}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:4}}>
                <div style={{fontSize:11,fontWeight:700,color:C.text,flex:1,lineHeight:1.3}}>{ind.label}</div>
                <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                  {ind.tend&&<span style={{fontSize:14,color:ind.tend.cor,fontWeight:900}} title={'vs media anterior: '+(ind.tend.delta||'estavel')}>{ind.tend.seta}{ind.tend.delta&&<span style={{fontSize:9}}>{ind.tend.delta}</span>}</span>}
                  <div style={{fontSize:18,fontWeight:900,color:semaforo(ind)}}>{ind.val}</div>
                </div>
              </div>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div style={{fontSize:9,color:C.muted}}>{ind.formula}</div>
                <div style={{fontSize:9,fontWeight:700,color:semaforo(ind),background:semaforo(ind)+'15',borderRadius:4,padding:'1px 5px'}}>
                  {ind.val==='N/D'?'sem dados':ind.ok?'dentro da meta':'fora da meta'} · meta: {ind.meta}
                </div>
              </div>
            </div>
          ))}
        </div>);
      })()}
    </div>}
    {hist.length>0&&<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:14,marginTop:4}}>
      <div style={{fontSize:12,fontWeight:700,color:C.muted,marginBottom:8}}>Historico recente</div>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
        <thead><tr style={{background:C.surface}}>{['Mes','Pac.-dia','Alcool gel (mL)','LPP novos','Quedas'].map(h=>(<th key={h} style={{padding:'7px 10px',textAlign:'left',fontWeight:700,borderBottom:'1px solid '+C.border}}>{h}</th>))}</tr></thead>
        <tbody>{hist.map((r,i)=>(<tr key={r.mes} style={{background:i%2===0?'transparent':C.surface}}>
          <td style={{padding:'6px 10px'}}>{new Date(r.mes+'T12:00:00').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</td>
          <td style={{padding:'6px 10px'}}>{r.paciente_dia_total||'-'}</td>
          <td style={{padding:'6px 10px'}}>{r.alcool_gel_ml||'-'}</td>
          <td style={{padding:'6px 10px'}}>{r.lpp_casos_novos||'-'}</td>
          <td style={{padding:'6px 10px'}}>{r.quedas_total||'-'}</td>
        </tr>))}</tbody>
      </table>
    </div>}
  </div>);
}

function SemestresDSMView({sbUrl,sbKey,showToast,hospital}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const anoAtual=new Date().getFullYear();
  const semAtual=new Date().getMonth()<6?1:2;
  const [semestres,setSemestres]=useState([]);
  const [finalizando,setFinalizando]=useState(null);

  const grid=[];
  for(let i=0;i<4;i++){let a=anoAtual,s=semAtual-i;if(s<1){s+=2;a--;}grid.push({ano:a,semestre:s});}

  const carregar=async()=>{
    if(!sbUrl||!sbKey)return;
    try{const d=await sbSelect(sbUrl,sbKey,'semestres_dsm',`hospital_id=eq.${h.id}&order=ano.desc,semestre.desc&limit=8`);setSemestres(d||[]);}catch(e){console.error(e);}
  };
  useEffect(()=>{carregar();},[sbUrl,sbKey]);

  const getSem=(ano,semestre)=>semestres.find(s=>s.ano===ano&&s.semestre===semestre);

  const criarOuBuscar=async(ano,semestre)=>{
    const exists=getSem(ano,semestre);if(exists)return exists;
    try{await sbInsert(sbUrl,sbKey,'semestres_dsm',{hospital_id:h.id,ano,semestre,status:'aberto'});await carregar();return getSem(ano,semestre);}catch(e){return null;}
  };

  const finalizar=async(ano,semestre)=>{
    setFinalizando(`${ano}-${semestre}`);showToast('Gerando relatorio...','success');
    try{
      const inicio=`${ano}-${semestre===1?'01':'07'}-01`;
      const fim=`${ano}-${semestre===1?'06':'12'}-31`;
      const [ind,trein,notifs]=await Promise.all([
        fetch(`${sbUrl}/rest/v1/indicadores_dsm?hospital_id=eq.${h.id}&mes=gte.${inicio}&mes=lte.${fim}&select=*`,{headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey}}).then(r=>r.json()).catch(()=>[]),
        sbSelect(sbUrl,sbKey,'treinamentos_nsp',`hospital_id=eq.${h.id}&data=gte.${inicio}&data=lte.${fim}&select=id`).catch(()=>[]),
        sbSelect(sbUrl,sbKey,'notifications',`hospital_id=eq.${h.id}&event_date=gte.${inicio}&event_date=lte.${fim}&is_test=neq.true&select=id`).catch(()=>[]),
      ]);
      if(!window.XLSX){showToast('SheetJS nao carregado','error');setFinalizando(null);return;}
      const XLSX=window.XLSX;
      const wb=XLSX.utils.book_new();
      const rows=[['NOTIFICAAI - DEMONSTRACAO'],['RELATORIO SEMESTRAL - NSP'],[h.nome||h.name||'Hospital de Demonstracao'],['INDICADORES DE MONITORAMENTO - NSP'],[`${semestre}o Semestre / ${ano}`],['Gerado em: '+new Date().toLocaleDateString('pt-BR')],[],['Dado','Valor'],['Total de EA notificados',(notifs||[]).length],['Total de treinamentos',(trein||[]).length],['Meses com dados preenchidos',(ind||[]).length]];
      const ws=XLSX.utils.aoa_to_sheet(rows);ws['!cols']=[{wch:40},{wch:20}];
      XLSX.utils.book_append_sheet(wb,ws,'Resumo');
      const wbout=XLSX.write(wb,{bookType:'xlsx',type:'array'});
      const blob=new Blob([wbout],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
      const file=new File([blob],`RelatorioSemestral-DEMO-${ano}-${semestre}S.xlsx`,{type:blob.type});
      let driveLink=null;
      try{driveLink=await uploadToStorage(file,'relatorio',{ano:String(ano),semestre:String(semestre)},sbUrl,sbKey);showToast('Salvo no Storage!','success');}
      catch(storErr){showToast('Upload falhou. Baixando localmente...','error');XLSX.writeFile(wb,file.name);}
      const reg=await criarOuBuscar(ano,semestre);
      if(reg){await sbPatch(sbUrl,sbKey,'semestres_dsm',`id=eq.${reg.id}`,{status:'finalizado',finalizado_em:new Date().toISOString(),drive_relatorio_link:driveLink,meses_preenchidos:(ind||[]).length,total_notificacoes:(notifs||[]).length,total_treinamentos:(trein||[]).length});}
      await carregar();showToast('Semestre finalizado!','success');
    }catch(e){showToast('Erro: '+e.message,'error');}
    setFinalizando(null);
  };

  const marcarEnviado=async(sem)=>{
    await sbPatch(sbUrl,sbKey,'semestres_dsm',`id=eq.${sem.id}`,{status:'enviado_dsm',enviado_dsm_em:new Date().toISOString()});
    await carregar();showToast('Marcado como enviado!','success');
  };

  const ST={aberto:{label:'Em andamento',color:C.teal},finalizado:{label:'Finalizado',color:C.blue},enviado_dsm:{label:'Enviado',color:C.green}};

  return(<div style={{padding:'16px 0 80px'}}>
    <BackHeader title='Semestres' subtitle='Gestao e envio do relatorio semestral'/>
    <div style={{display:'flex',flexDirection:'column',gap:12}}>
      {grid.map(({ano,semestre})=>{
        const reg=getSem(ano,semestre);const key=`${ano}-${semestre}`;
        const isFin=finalizando===key;const st=ST[reg?.status||'aberto']||ST.aberto;
        const isAtual=ano===anoAtual&&semestre===semAtual;
        return(<div key={key} style={{background:C.card,border:'1px solid '+(isAtual?C.teal:C.border),borderRadius:14,padding:'14px 16px',borderLeft:'4px solid '+st.color}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
            <div>
              <div style={{fontSize:16,fontWeight:800,color:C.text}}>
                {semestre}o Semestre / {ano}
                {isAtual&&<span style={{marginLeft:8,fontSize:10,background:C.teal+'22',color:C.teal,borderRadius:6,padding:'2px 7px',fontWeight:700}}>ATUAL</span>}
              </div>
              <div style={{fontSize:12,color:C.muted,marginTop:2}}>{semestre===1?'Janeiro - Junho':'Julho - Dezembro'}</div>
            </div>
            <span style={{background:st.color+'22',color:st.color,borderRadius:8,padding:'4px 10px',fontSize:11,fontWeight:700}}>{st.label}</span>
          </div>
          {reg&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
            {[{label:'Meses c/ dados',n:`${reg.meses_preenchidos||0}/6`,cor:C.teal},{label:'Notificacoes',n:reg.total_notificacoes||0,cor:C.red},{label:'Treinamentos',n:reg.total_treinamentos||0,cor:C.blue}].map(({label,n,cor})=>(<div key={label} style={{background:C.surface,borderRadius:8,padding:'8px',textAlign:'center'}}><div style={{fontSize:18,fontWeight:800,color:cor}}>{n}</div><div style={{fontSize:10,color:C.muted}}>{label}</div></div>))}
          </div>}
          {reg?.drive_relatorio_link&&<div style={{marginBottom:10}}><a href={reg.drive_relatorio_link} target='_blank' rel='noreferrer' style={{display:'inline-flex',alignItems:'center',gap:6,background:C.blue+'18',color:C.blue,borderRadius:8,padding:'6px 12px',fontSize:12,fontWeight:700,textDecoration:'none'}}>Relatorio (Storage)</a>{reg.finalizado_em&&<span style={{fontSize:11,color:C.muted,marginLeft:8}}>Gerado em {new Date(reg.finalizado_em).toLocaleDateString('pt-BR')}</span>}</div>}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            {(!reg||reg.status==='aberto')&&<button onClick={()=>finalizar(ano,semestre)} disabled={isFin} style={{flex:1,background:isFin?C.border:C.teal,border:'none',borderRadius:10,padding:'10px',color:isFin?C.muted:'#06101F',fontWeight:800,fontSize:13,cursor:isFin?'default':'pointer',minWidth:160}}>{isFin?'Gerando...':'Gerar e salvar no Storage'}</button>}
            {reg?.status==='finalizado'&&<><button onClick={()=>finalizar(ano,semestre)} disabled={isFin} style={{background:C.surface,border:'1px solid '+C.border,borderRadius:10,padding:'9px 14px',color:C.muted,fontSize:12,fontWeight:700,cursor:'pointer'}}>Regerar</button><button onClick={()=>marcarEnviado(reg)} style={{flex:1,background:C.green,border:'none',borderRadius:10,padding:'10px',color:'#fff',fontWeight:800,fontSize:13,cursor:'pointer'}}>Marcar como Enviado</button></>}
            {reg?.status==='enviado_dsm'&&<div style={{fontSize:12,color:C.green}}>Enviado em {reg.enviado_dsm_em?new Date(reg.enviado_dsm_em).toLocaleDateString('pt-BR'):'-'}</div>}
          </div>
        </div>);
      })}
    </div>
  </div>);
}

function DocumentosNSPView({sbUrl,sbKey,showToast,hospital}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const anoAtual=new Date().getFullYear();
  const semAtual=new Date().getMonth()<6?1:2;
  const [ano,setAno]=useState(anoAtual);
  const [semestre,setSemestre]=useState(semAtual);
  const [uploadTipo,setUploadTipo]=useState('protocolo');
  const [uploadNome,setUploadNome]=useState('');
  const [protsVigentes,setProtsVigentes]=useState([]);
  const [docs,setDocs]=useState({protocolos:[],treinamentos:[],relatorios:[]});
  const [loading,setLoading]=useState(false);
  const [baixando,setBaixando]=useState(false);
  const BUCKET=`${sbUrl}/storage/v1/object/public/nsp-documentos`;

  const listarPasta=async(prefixo)=>{
    const r=await fetch(`${sbUrl}/storage/v1/object/list/nsp-documentos`,{method:'POST',headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':'application/json'},body:JSON.stringify({prefix:prefixo,limit:200,sortBy:{column:'name',order:'asc'}})});
    const d=await r.json();return Array.isArray(d)?d:[];
  };

  const listarSubpastas=async(prefixo)=>{
    const pastas=await listarPasta(prefixo);const arquivos=[];
    for(const item of pastas){
      if(!item.name)continue;
      if(item.metadata===null){const sub=await listarPasta(`${prefixo}/${item.name}`);sub.filter(f=>f.metadata).forEach(f=>arquivos.push({...f,path:`${prefixo}/${item.name}/${f.name}`,subpasta:item.name}));}
      else{arquivos.push({...item,path:`${prefixo}/${item.name}`,subpasta:null});}
    }
    return arquivos;
  };

  const carregar=async()=>{
    if(!sbUrl||!sbKey)return;setLoading(true);
    const sem=`${ano}/${semestre}S`;
    try{
      const [prots,treins,rels,protsTab]=await Promise.all([listarPasta(`protocolos/${sem}`),listarSubpastas(`treinamentos/${sem}`),listarPasta(`relatorios/${sem}`),sbSelect(sbUrl,sbKey,'protocolos',`hospital_id=eq.${h.id}&order=nome.asc&select=*`).catch(()=>[])]);
      setProtsVigentes(protsTab||[]);
      setDocs({protocolos:prots.filter(f=>f.metadata).map(f=>({...f,path:`protocolos/${sem}/${f.name}`})),treinamentos:treins,relatorios:rels.filter(f=>f.metadata).map(f=>({...f,path:`relatorios/${sem}/${f.name}`}))});
    }catch(e){showToast('Erro ao listar: '+e.message,'error');}
    setLoading(false);
  };
  useEffect(()=>{carregar();},[ano,semestre,sbUrl,sbKey]);

  const totalDocs=docs.protocolos.length+docs.treinamentos.length+docs.relatorios.length;

  const baixarZip=async()=>{
    if(!window.JSZip){showToast('JSZip nao carregado','error');return;}
    if(totalDocs===0){showToast('Nenhum documento neste semestre','error');return;}
    setBaixando(true);showToast('Preparando ZIP...','success');
    try{
      const zip=new window.JSZip();
      const todos=[...docs.protocolos.map(f=>({path:f.path,pasta:'Protocolos',nome:f.name})),...docs.treinamentos.map(f=>({path:f.path,pasta:`Treinamentos/${f.subpasta||'geral'}`,nome:f.name})),...docs.relatorios.map(f=>({path:f.path,pasta:'Relatorios',nome:f.name}))];
      let ok=0;
      for(const doc of todos){try{const resp=await fetch(`${BUCKET}/${doc.path}`);if(resp.ok){zip.file(`${doc.pasta}/${doc.nome}`,await resp.blob());ok++;}}catch(e){console.warn(e);}}
      const content=await zip.generateAsync({type:'blob'});
      const url=URL.createObjectURL(content);const a=document.createElement('a');a.href=url;a.download=`NSP-HNSA-${ano}-${semestre}S-Documentos.zip`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
      showToast(`ZIP gerado com ${ok} documento(s)!`,'success');
    }catch(e){showToast('Erro ao gerar ZIP: '+e.message,'error');}
    setBaixando(false);
  };

  const FileCard=({doc,sub})=>(<div style={{display:'flex',alignItems:'center',gap:10,padding:'8px 12px',background:C.surface,borderRadius:8,marginBottom:4}}>
    <span style={{fontSize:18,flexShrink:0}}>{(doc.name||'').endsWith('.pdf')?'PDF':(doc.name||'').match(/\.xls/)?'XLS':'DOC'}</span>
    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:12,fontWeight:600,color:C.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{doc.name}</div>
      {sub&&<div style={{fontSize:10,color:C.muted}}>{sub}</div>}
      {doc.metadata?.size&&<div style={{fontSize:10,color:C.muted}}>{(doc.metadata.size/1024).toFixed(0)} KB</div>}
    </div>
    <div style={{display:'flex',gap:6,flexShrink:0}}>
      <a href={`${BUCKET}/${doc.path}`} target='_blank' rel='noreferrer' style={{padding:'4px 10px',background:C.card,border:'1px solid '+C.border,borderRadius:6,color:C.teal,fontSize:11,fontWeight:700,textDecoration:'none'}}>Ver</a>
      <a href={`${BUCKET}/${doc.path}?download=${encodeURIComponent(doc.name)}`} download={doc.name} style={{padding:'4px 10px',background:C.teal,border:'none',borderRadius:6,color:'#06101F',fontSize:11,fontWeight:700,textDecoration:'none'}}>Baixar</a>
    </div>
  </div>);

  const Secao=({titulo,itens,emptyMsg,cor,comSub})=>(<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:14,marginBottom:10,borderLeft:`3px solid ${cor}`}}>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
      <div style={{fontSize:13,fontWeight:800,color:C.text}}>{titulo}</div>
      <span style={{background:cor+'22',color:cor,borderRadius:6,padding:'2px 8px',fontSize:11,fontWeight:700}}>{itens.length} arquivo(s)</span>
    </div>
    {itens.length===0?<div style={{fontSize:12,color:C.muted,fontStyle:'italic'}}>{emptyMsg}</div>:itens.map((doc,i)=><FileCard key={i} doc={doc} sub={comSub?doc.subpasta:null}/>)}
  </div>);

  return(<div style={{padding:'16px 0 80px'}}>
    <BackHeader title='Biblioteca de Documentos' subtitle='Protocolos, listas de presenca e relatorios NSP'/>

    {/* UPLOAD PELO GESTOR */}
    <div style={{background:C.card,border:'1px solid '+C.teal+'33',borderRadius:12,padding:'12px 14px',marginBottom:14,borderLeft:'3px solid '+C.teal}}>
      <div style={{fontSize:12,fontWeight:800,color:C.teal,marginBottom:8}}>Enviar documento para a biblioteca</div>
      <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'center'}}>
        <select value={uploadTipo} onChange={e=>setUploadTipo(e.target.value)} style={{padding:'8px 12px',background:C.surface,border:'1px solid '+C.border,borderRadius:8,color:C.text,fontSize:12,outline:'none'}}>
          <option value='protocolo'>Protocolo</option>
          <option value='treinamento'>Lista de treinamento</option>
          <option value='relatorio'>Relatorio</option>
          <option value='institucional'>Documento institucional (Portaria/PSP)</option>
        </select>
        <input value={uploadNome} onChange={e=>setUploadNome(e.target.value)} placeholder='Nome do documento' style={{flex:1,minWidth:160,padding:'8px 12px',background:C.surface,border:'1px solid '+C.border,borderRadius:8,color:C.text,fontSize:12,outline:'none'}}/>
        <StorageUploadBtn tipo={uploadTipo} meta={{ano:String(ano),semestre:String(semestre),nome:uploadNome||'documento'}} sbUrl={sbUrl} sbKey={sbKey} label='Enviar' onUploaded={()=>{showToast('Documento enviado!','success');carregar();}}/>
      </div>
    </div>

    {/* PROTOCOLOS VIGENTES — validade propria de 3 anos, independente de semestre */}
    {protsVigentes.length>0&&(<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'12px 14px',marginBottom:14}}>
      <div style={{fontSize:12,fontWeight:800,color:C.text,marginBottom:8}}>Protocolos Vigentes ({protsVigentes.length}) — validade de 3 anos</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:6}}>
        {protsVigentes.map((p,i)=>{
          const hoje=new Date().toISOString().slice(0,10);
          const vencido=p.proxima_revisao&&p.proxima_revisao<hoje;
          const prox60=p.proxima_revisao&&!vencido&&p.proxima_revisao<=new Date(Date.now()+60*86400000).toISOString().slice(0,10);
          const cor=vencido?C.red:prox60?C.yellow:C.green;
          return(<div key={i} style={{display:'flex',justifyContent:'space-between',alignItems:'center',background:C.surface,borderRadius:8,padding:'8px 10px',borderLeft:'3px solid '+cor}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontSize:11,fontWeight:600,color:C.text,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{p.nome}</div>
              <div style={{fontSize:9,color:cor,fontWeight:700}}>{vencido?'VENCIDO em ':prox60?'Vence em ':'Valido ate '}{p.proxima_revisao?new Date(p.proxima_revisao+'T12:00:00').toLocaleDateString('pt-BR'):'sem data'}</div>
            </div>
            {p.link&&<a href={p.link} target='_blank' rel='noreferrer' style={{fontSize:10,color:C.teal,fontWeight:700,textDecoration:'none',marginLeft:8}}>Abrir</a>}
          </div>);
        })}
      </div>
    </div>)}

    <div style={{fontSize:11,fontWeight:700,color:C.muted,marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Arquivos por semestre (listas, relatorios, versoes)</div>
    <div style={{display:'flex',gap:10,marginBottom:16,flexWrap:'wrap',alignItems:'center'}}>
      <select value={ano} onChange={e=>setAno(Number(e.target.value))} style={{padding:'8px 12px',background:C.card,border:'1px solid '+C.border,borderRadius:8,color:C.text,fontSize:13,outline:'none'}}>
        {[anoAtual-1,anoAtual,anoAtual+1].map(a=>(<option key={a} value={a}>{a}</option>))}
      </select>
      <select value={semestre} onChange={e=>setSemestre(Number(e.target.value))} style={{padding:'8px 12px',background:C.card,border:'1px solid '+C.border,borderRadius:8,color:C.text,fontSize:13,outline:'none'}}>
        <option value={1}>1o Semestre (Jan-Jun)</option>
        <option value={2}>2o Semestre (Jul-Dez)</option>
      </select>
      <button onClick={carregar} style={{padding:'8px 16px',background:C.surface,border:'1px solid '+C.border,borderRadius:8,color:C.muted,fontSize:12,fontWeight:700,cursor:'pointer'}}>Atualizar</button>
      {totalDocs>0&&<button onClick={baixarZip} disabled={baixando} style={{padding:'9px 18px',background:baixando?C.border:C.green,border:'none',borderRadius:10,color:baixando?C.muted:'#fff',fontSize:13,fontWeight:800,cursor:baixando?'default':'pointer'}}>{baixando?'Gerando ZIP...':'Baixar tudo (ZIP)'}</button>}
    </div>
    {loading&&<div style={{textAlign:'center',padding:40,color:C.muted}}>Carregando documentos...</div>}
    {!loading&&<>
      {totalDocs>0&&<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
        {[{label:'Protocolos',n:docs.protocolos.length,cor:C.teal},{label:'Treinamentos',n:docs.treinamentos.length,cor:C.blue},{label:'Relatorios',n:docs.relatorios.length,cor:C.green}].map(({label,n,cor})=>(<div key={label} style={{background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'10px',textAlign:'center'}}><div style={{fontSize:22,fontWeight:800,color:cor}}>{n}</div><div style={{fontSize:11,color:C.muted}}>{label}</div></div>))}
      </div>}
      <Secao titulo='Protocolos Institucionais' itens={docs.protocolos} cor={C.teal} emptyMsg='Nenhum protocolo anexado. Os membros NSP podem anexar em Meu Protocolo.'/>
      <Secao titulo='Listas de Treinamentos' itens={docs.treinamentos} cor={C.blue} comSub={true} emptyMsg='Nenhuma lista de presenca anexada.'/>
      <Secao titulo='Relatorios Gerados' itens={docs.relatorios} cor={C.green} emptyMsg='Nenhum relatorio gerado. Acesse Semestres e clique em Gerar e salvar no Storage.'/>
      {totalDocs===0&&!loading&&<div style={{textAlign:'center',padding:40,background:C.card,borderRadius:14,border:'1px solid '+C.border}}><div style={{fontSize:14,fontWeight:700,color:C.text,marginBottom:4}}>Nenhum documento neste semestre</div><div style={{fontSize:12,color:C.muted}}>Os membros do NSP podem anexar protocolos e listas nos seus paineis.</div></div>}
    </>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<NotificaAI/>);
    </script>
  </body>
</html>
