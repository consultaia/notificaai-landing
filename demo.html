function IndicadoresView({sbUrl,sbKey,showToast,hospital}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const setores=h.sectorsInternacao||h.sectors||[]; // so setores com leito (paciente-dia); ambulatoriais (ex: Oncologia) ficam de fora daqui
  const slug=s=>s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-z0-9]+/g,'_');
  const [dados,setDados]=useState(null);
  const [loading,setLoading]=useState(false);
  const [mesRef,setMesRef]=useState(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;});
  const pdKey=(campo)=>`pd_${mesRef}_${campo}`;
  const lerLocal=()=>{const o={};setores.forEach(s=>{try{o[s]=localStorage.getItem(pdKey(slug(s)))||'';}catch{o[s]='';}});return o;};
  const [pdSetores,setPdSetoresRaw]=useState(lerLocal);
  const [pdSalvo,setPdSalvo]=useState(false);

  const setPdSetor=(s,v)=>setPdSetoresRaw(p=>({...p,[s]:v}));

  const salvarPD=async(vals)=>{
    setores.forEach(s=>{try{localStorage.setItem(pdKey(slug(s)),vals[s]||'');}catch{}});
    if(!sbUrl||!sbKey) return;
    try{
      await fetch(`${sbUrl}/rest/v1/indicadores_mensais`,{
        method:'POST',
        headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey,'Content-Type':'application/json','Prefer':'resolution=merge-duplicates'},
        body:JSON.stringify({hospital_id:h.id,mes_ref:mesRef,pd_setores:vals,pd_geral:setores.reduce((acc,s)=>acc+(Number(vals[s])||0),0),updated_at:new Date().toISOString()})
      });
      setPdSalvo(true);setTimeout(()=>setPdSalvo(false),2000);
    }catch(err){console.warn('Erro ao salvar PD:',err);}
  };

  React.useEffect(()=>{
    setPdSetoresRaw(lerLocal());
    if(!sbUrl||!sbKey) return;
    fetch(`${sbUrl}/rest/v1/indicadores_mensais?hospital_id=eq.${h.id}&mes_ref=eq.${mesRef}&select=*`,{
      headers:{'apikey':sbKey,'Authorization':'Bearer '+sbKey}
    }).then(r=>r.json()).then(data=>{
      if(data&&data[0]&&data[0].pd_setores){
        const ps=data[0].pd_setores;
        const o2={};setores.forEach(s=>{
          if(ps[s]!==undefined&&ps[s]!==null){o2[s]=String(ps[s]);try{localStorage.setItem(pdKey(slug(s)),String(ps[s]));}catch{}}
          else{try{o2[s]=localStorage.getItem(pdKey(slug(s)))||'';}catch{o2[s]='';}}
        });
        setPdSetoresRaw(o2);
      }
    }).catch(()=>{});
  },[mesRef,sbUrl,sbKey]);

  const calcular=async()=>{
    if(!sbUrl||!sbKey) return;
    const algumPreenchido=setores.some(s=>pdSetores[s]);
    if(!algumPreenchido){showToast('Informe ao menos um total de paciente-dia por setor','error');return;}
    await salvarPD(pdSetores);
    setLoading(true);
    try{
      const [ano,mes]=mesRef.split('-').map(Number);
      const inicio=new Date(ano,mes-1,1).toISOString().slice(0,10);
      const fim=new Date(ano,mes,0).toISOString().slice(0,10);
      const nots=await sbSelect(sbUrl,sbKey,'notifications',`hospital_id=eq.${h.id}&event_date=gte.${inicio}&event_date=lte.${fim}&is_test=neq.true&select=*`);

      const isQueda=n=>n.event_subtype?.toLowerCase().includes('queda')||n.description?.toLowerCase().includes('queda');
      const isLPP=n=>n.event_subtype?.toLowerCase().includes('press')||n.event_subtype?.toLowerCase().includes('lpp')||n.description?.toLowerCase().includes('pressao');
      const isIRAS=n=>n.notification_type==='ccih'||n.event_subtype?.startsWith('CCIH');
      const isMed=n=>n.event_subtype?.toLowerCase().includes('medic')||n.description?.toLowerCase().includes('medic');
      const isNearMiss=n=>n.gravidade==='Near miss';
      const isSentinela=n=>n.gravidade==='Evento sentinela';

      const calc=(lista,pd)=>{
        const r={
          total:lista.length,quedas:lista.filter(isQueda).length,lp:lista.filter(isLPP).length,
          iras:lista.filter(isIRAS).length,medicacao:lista.filter(isMed).length,
          nearMiss:lista.filter(isNearMiss).length,sentinela:lista.filter(isSentinela).length,pd,
        };
        r.txQueda=(r.quedas/pd*1000).toFixed(2);
        r.txLP=(r.lp/pd*1000).toFixed(2);
        r.txIRAS=(r.iras/pd*1000).toFixed(2);
        r.txMed=(r.medicacao/pd*1000).toFixed(2);
        r.txNearMiss=r.total>0?Math.round(r.nearMiss/r.total*100):0;
        return r;
      };

      const pdTotal=setores.reduce((acc,s)=>acc+(Number(pdSetores[s])||0),0)||1;
      const geral=calc(nots,pdTotal);

      const porSetor={};
      setores.forEach(s=>{
        const pd=Number(pdSetores[s])||0;
        if(pd>0) porSetor[s]=calc(nots.filter(n=>n.sector===s),pd);
      });

      setDados({geral,porSetor,pdTotal});
    }catch{showToast('Erro ao calcular indicadores','error');}
    setLoading(false);
  };

  const INDICADORES_DEF=[
    {key:'txQueda',label:'Taxa de quedas',unidade:'/1000 p-d',meta:1.5,menor:true,desc:'Quedas / paciente-dia x 1000'},
    {key:'txLP',label:'Taxa de LPP adquirida',unidade:'/1000 p-d',meta:0.8,menor:true,desc:'LPP adquirida no hospital / paciente-dia x 1000 - Meta ONA < 0.8'},
    {key:'txIRAS',label:'Taxa de IRAS',unidade:'/1000 p-d',meta:2.0,menor:true,desc:'Infeccoes relacionadas a assistencia / paciente-dia x 1000 - Meta < 2'},
    {key:'txMed',label:'Erros de medicação notif.',unidade:'/1000 p-d',meta:0.5,menor:true,desc:'Erros de medicação notificados / paciente-dia x 1000'},
    {key:'txNearMiss',label:'Near miss / Total notif.',unidade:'%',meta:20,menor:false,desc:'% de near miss sobre total - meta > 20% indica boa cultura de notificacao'},
  ];

  const SetorCard=({titulo,cor,dados:d,icon})=>{
    if(!d) return null;
    return(<div style={{background:C.card,border:'2px solid '+cor+'44',borderRadius:14,padding:16,marginBottom:14}}>
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:12}}>
        <span style={{fontSize:20}}>{icon}</span>
        <div>
          <div style={{fontSize:14,fontWeight:800,color:cor}}>{titulo}</div>
          <div style={{fontSize:11,color:C.muted}}>{d.pd} paciente-dia · {d.total} notificacao(oes)</div>
        </div>
      </div>
      {INDICADORES_DEF.map((ind,i)=>{
        const val=Number(d[ind.key]);
const ok=ind.menor?val<=ind.meta:val>=ind.meta;
const warn=!ok&&(ind.menor?val<=ind.meta*1.3:val>=ind.meta*0.7);
        return(<div key={i} style={{background:C.surface,borderRadius:10,padding:'10px 12px',marginBottom:8,display:'flex',alignItems:'center',gap:10}}>
          <div style={{flex:1}}>
            <div style={{fontSize:12,fontWeight:700,color:C.text}}>{ind.label}</div>
            <div style={{fontSize:10,color:C.muted}}>{ind.desc} · Meta: {ind.menor?'< ':'> '}{ind.meta}{ind.unidade}</div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontSize:20,fontWeight:900,color:ok?C.green:warn?C.yellow:C.red,lineHeight:1}}>{d[ind.key]}{ind.unidade==='%'?'%':''}</div>
            <div style={{fontSize:9,color:C.muted}}>{ind.unidade!=='%'?ind.unidade:''}</div>
          </div>
          <div style={{background:ok?C.green+'22':C.red+'22',color:ok?C.green:warn?C.yellow:C.red,borderRadius:6,padding:'2px 7px',fontSize:9,fontWeight:700,flexShrink:0}}>{ok?'Meta':'Alerta'}</div>
        </div>);
      })}
      {d.sentinela>0&&<div style={{background:C.red+'22',border:'1px solid '+C.red+'44',borderRadius:8,padding:'8px 12px',fontSize:11,color:C.red,fontWeight:700}}>
        {d.sentinela} evento(s) sentinela - Análise de Causa obrigatória
      </div>}
    </div>);
  };

  const setoresComDados=dados?setores.filter(s=>dados.porSetor[s]):[];

  return(<div style={{paddingBottom:80}}>
    <BackHeader title='Indicadores de Processo' subtitle='RDC 36/2013 - Metas OMS - por setor'/>
    <div style={{padding:'16px',display:'flex',flexDirection:'column',gap:14}}>

    {/* Parametros */}
    <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:16}}>
      <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:12}}>Parametros de calculo</div>

      <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Mes de referencia</label>
      <input type="month" value={mesRef} onChange={e=>setMesRef(e.target.value)}
        style={{background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'9px 10px',color:C.text,fontSize:13,outline:'none',width:'100%',marginBottom:12}}/>

      {/* Paciente-dia por setor */}
      <div style={{background:C.surface,border:'1px solid '+C.border,borderRadius:10,padding:'12px 14px',marginBottom:12}}>
        <div style={{fontSize:12,fontWeight:700,color:C.text,marginBottom:10}}>Total paciente-dia por setor (soma dos dias de internacao no mes)</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
          {setores.map(s=>(
            <div key={s}>
              <label style={{fontSize:10,color:C.muted,display:'block',marginBottom:4,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{s}</label>
              <input type="number" value={pdSetores[s]||''} onChange={e=>setPdSetor(s,e.target.value)} placeholder="0"
                style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'9px 10px',color:C.text,fontSize:13,outline:'none',width:'100%'}}/>
            </div>
          ))}
        </div>
        <div style={{fontSize:10,color:C.muted,marginTop:10,lineHeight:1.6,borderTop:'1px solid '+C.border,paddingTop:8}}>
          Deixe em branco os setores que nao deseja calcular individualmente. O paciente-dia e obtido no censo hospitalar ou SAME. O total Geral e a soma de todos os setores preenchidos.</div>
      </div>

      {pdSalvo&&<div style={{textAlign:'center',fontSize:11,color:'#22C55E',marginBottom:6}}>
        {String.fromCodePoint(9989)} Paciente-dia salvo no banco
      </div>}
      <button onClick={()=>salvarPD(pdSetores)} disabled={!setores.some(s=>pdSetores[s])}
        style={{width:'100%',background:'transparent',border:'1px solid #0D9488',borderRadius:10,padding:'8px',color:'#0D9488',fontSize:12,fontWeight:600,cursor:'pointer',marginBottom:6}}>
        Salvar paciente-dia sem calcular
      </button>
      <button onClick={calcular} disabled={loading||!setores.some(s=>pdSetores[s])}
        style={{width:'100%',background:loading||!setores.some(s=>pdSetores[s])?C.border:C.teal,border:'none',borderRadius:10,padding:'12px',color:loading||!setores.some(s=>pdSetores[s])?C.muted:'#06101F',fontWeight:800,fontSize:13,cursor:loading||!setores.some(s=>pdSetores[s])?'default':'pointer'}}>
        {loading?'Calculando...':'Calcular Indicadores'}
      </button>
    </div>

    {/* Resultados */}
    {dados&&<div>
      <div style={{fontSize:11,color:C.muted,textTransform:'uppercase',letterSpacing:'0.08em',fontWeight:700,marginBottom:12}}>
        {new Date(mesRef+'-15').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}
      </div>

      {/* Comparativo por setor - tabela */}
      {setoresComDados.length>0&&<div style={{background:C.card,border:'1px solid '+C.border,borderRadius:14,padding:16,marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:C.text,marginBottom:10}}>Comparativo por Setor</div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:11}}>
            <thead>
              <tr>
                <th style={{padding:'6px 8px',textAlign:'left',color:C.muted,borderBottom:'1px solid '+C.border,fontWeight:700,position:'sticky',left:0,background:C.card}}>Indicador</th>
                <th style={{padding:'6px 8px',textAlign:'center',color:C.teal,borderBottom:'1px solid '+C.border,fontWeight:700}}>Geral</th>
                {setoresComDados.map(s=><th key={s} style={{padding:'6px 8px',textAlign:'center',color:C.blue,borderBottom:'1px solid '+C.border,fontWeight:700,whiteSpace:'nowrap'}}>{s}</th>)}
                <th style={{padding:'6px 8px',textAlign:'center',color:C.muted,borderBottom:'1px solid '+C.border,fontWeight:700}}>Meta</th>
              </tr>
            </thead>
            <tbody>
              {INDICADORES_DEF.map((ind,i)=>{
                const cor=(v)=>{if(v===null||v===undefined)return C.muted;const ok=ind.menor?v<=ind.meta:v>=ind.meta;const close=ind.menor?v<=ind.meta*1.3:v>=ind.meta*0.7;return ok?C.green:close?C.yellow:C.red;};
                const vG=Number(dados.geral[ind.key]||0);
                return(<tr key={i} style={{borderBottom:'1px solid '+C.border+'22'}}>
                  <td style={{padding:'6px 8px',color:C.text,fontSize:11,position:'sticky',left:0,background:C.card,whiteSpace:'nowrap'}}>{ind.label}</td>
                  <td style={{padding:'6px 8px',textAlign:'center',fontWeight:700,color:cor(vG)}}>{vG}{ind.unidade==='%'?'%':''}</td>
                  {setoresComDados.map(s=>{const v=Number(dados.porSetor[s][ind.key]||0);return(<td key={s} style={{padding:'6px 8px',textAlign:'center',fontWeight:700,color:cor(v)}}>{v}{ind.unidade==='%'?'%':''}</td>);})}
                  <td style={{padding:'6px 8px',textAlign:'center',color:C.muted,fontSize:10,whiteSpace:'nowrap'}}>{ind.menor?'< ':'> '}{ind.meta}{ind.unidade}</td>
                </tr>);
              })}
            </tbody>
          </table>
        </div>
      </div>}

      {/* Cards detalhados por setor */}
      <SetorCard titulo="Hospital - Geral" cor={C.teal} dados={dados.geral} icon={String.fromCodePoint(127973)}/>
      {setoresComDados.map(s=><SetorCard key={s} titulo={s} cor={C.blue} dados={dados.porSetor[s]} icon={String.fromCodePoint(128309)}/>)}

      <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'12px 14px'}}>
        <div style={{fontSize:10,color:C.muted,lineHeight:1.6}}>As taxas sao calculadas com base nas notificacoes registradas. A qualidade depende da completude das notificacoes. Indicadores subnotificados subestimam os valores reais.</div>
      </div>
    </div>}
  </div>
  </div>);
}


function RelatorioMensalPanel({sbUrl,sbKey,showToast,hospital,onClose}) {
  const [loading,setLoading]=useState(false);
  const [loadingIA,setLoadingIA]=useState(false);
  const [narrativaIA,setNarrativaIA]=useState('');
  const [dados,setDados]=useState(null);
  const [mes,setMes]=useState(()=>{const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;});
  const MESES_PT=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const [gestor,setGestor]=useState('');
  const [diretoria,setDiretoria]=useState('');
  const h=hospital||DEFAULT_HOSPITAL;

  const gerar=async()=>{
    if(!sbUrl||!sbKey){showToast('Supabase necessário','error');return;}
    setLoading(true);
    try{
      const [ano,m]=mes.split('-').map(Number);
      const mesCorr={a:ano,m};
      const inicio=new Date(mesCorr.a,mesCorr.m-1,1).toISOString().slice(0,10);
      const fim=new Date(mesCorr.a,mesCorr.m,0).toISOString().slice(0,10);
      const mesRef=`${String(mesCorr.a).padStart(4,'0')}-${String(mesCorr.m).padStart(2,'0')}-01`;
      const hdr={'apikey':sbKey,'Authorization':'Bearer '+sbKey};
      const [notsRaw,treinsMes,protsAll,indMes,cfgArr,saqMes,planosAll]=await Promise.all([
        sbSelect(sbUrl,sbKey,'notifications',`hospital_id=eq.${h.id}&select=*`),
        sbSelect(sbUrl,sbKey,'treinamentos_nsp',`hospital_id=eq.${h.id}&data=gte.${inicio}&data=lte.${fim}&select=*`).catch(()=>[]),
        sbSelect(sbUrl,sbKey,'protocolos',`hospital_id=eq.${h.id}&select=*`).catch(()=>[]),
        fetch(`${sbUrl}/rest/v1/indicadores_dsm?hospital_id=eq.${h.id}&mes=eq.${mesRef}&select=*`,{headers:hdr}).then(r=>r.ok?r.json():Promise.resolve([])).catch(()=>[]),
        fetch(`${sbUrl}/rest/v1/config_dsm?hospital_id=eq.${h.id}&select=*`,{headers:hdr}).then(r=>r.ok?r.json():Promise.resolve([])).catch(()=>[]),
        sbSelect(sbUrl,sbKey,'saq_respostas',`hospital_id=eq.${h.id}&created_at=gte.${inicio}&created_at=lte.${fim}T23:59:59&select=*`).catch(()=>[]),
        sbSelect(sbUrl,sbKey,'plano_acoes',`hospital_id=eq.${h.id}&select=*`).catch(()=>[]),
      ]);
      const nots=(notsRaw||[]).filter(n=>{
        if(n.is_test===true) return false;
        const d=n.event_date||n.created_at?.slice(0,10);
        if(!d) return false;
        return d>=inicio&&d<=fim;
      });
      const s=computeStats(nots);
      const cfg=(cfgArr||[])[0]||{};
      const hoje=new Date().toISOString().slice(0,10);
      const protsVencidos=(protsAll||[]).filter(p=>p.proxima_revisao&&p.proxima_revisao<hoje);
      const protsProximos=(protsAll||[]).filter(p=>p.proxima_revisao&&p.proxima_revisao>=hoje&&p.proxima_revisao<=new Date(Date.now()+60*86400000).toISOString().slice(0,10));
      const planosAbertos=(planosAll||[]).filter(p=>p.status==='pendente'||p.status==='em_andamento');
      const planosConcluidos=(planosAll||[]).filter(p=>p.status==='concluido'&&p.concluido_em>=inicio&&p.concluido_em<=fim);
      const indDSM=(indMes||[])[0]||null;
      setDados({nots,s,inicio,fim,mesCorr,total:nots.length,
        treinsMes:treinsMes||[],protsAll:protsAll||[],protsVencidos,protsProximos,
        indDSM,cfg,saqMes:saqMes||[],planosAbertos,planosConcluidos});
    }catch(e){showToast('Erro ao gerar: '+e.message,'error');}
    setLoading(false);
  };

  const gerarNarrativaIA=async()=>{
    if(!dados)return;
    setLoadingIA(true);
    try{
      const fSP=dados.nots.filter(n=>n.notification_type==='seguranca_paciente'||n.notification_type==='ccih').length;
      const fAdm=dados.nots.filter(n=>n.notification_type==='administrativa').length;
      const fCCIH=dados.nots.filter(n=>n.event_subtype?.startsWith('CCIH')||n.notification_type==='ccih').length;
      const fSemRCA=dados.nots.filter(n=>n.notification_type==='seguranca_paciente'&&!n.rca_gerado).length;
      const fSentinela=dados.nots.filter(n=>n.gravidade==='Evento sentinela').length;
      const fSetores=Object.entries(dados.nots.reduce((acc,n)=>{if(n.sector)acc[n.sector]=(acc[n.sector]||0)+1;return acc;},{})).sort((a,b)=>b[1]-a[1]);
      const fSubtipos=Object.entries(dados.nots.reduce((acc,n)=>{if(n.event_subtype)acc[n.event_subtype]=(acc[n.event_subtype]||0)+1;return acc;},{})).sort((a,b)=>b[1]-a[1]);
      const workerUrl=WORKER_URL;
      const treinTotal=(dados.treinsMes||[]).length;
      const treinPart=(dados.treinsMes||[]).reduce((a,t)=>a+(t.participantes||0),0);
      const protsVenc=(dados.protsVencidos||[]).length;
      const protsProx=(dados.protsProximos||[]).length;
      const planosAb=(dados.planosAbertos||[]).length;
      const planosCon=(dados.planosConcluidos||[]).length;
      const indDSM=dados.indDSM;
      const saqN=(dados.saqMes||[]).length;
      const cfg=dados.cfg||{};
      const prompt='Voce e o analista-chefe do NSP do '+(h.name||'hospital')+'. Gere relatorio narrativo tecnico COMPLETO em 6 paragrafos objetivos. PERIODO: '+MESES_PT[(dados.mesCorr.m-1)]+' de '+dados.mesCorr.a+
        '. NOTIFICACOES: total='+dados.total+' SP='+fSP+' CCIH='+fCCIH+' ADM='+fAdm+' sem_RCA='+fSemRCA+' sentinelas='+fSentinela+
        '. SETORES: '+fSetores.map(([k,v])=>k+'('+v+')').join(';')+
        '. SUBTIPOS: '+fSubtipos.slice(0,6).map(([k,v])=>k+'('+v+')').join(',')+
        '. DIAS SEM SENTINELA: '+(dados.s.diasSemSentinela??'nd')+
        '. TREINAMENTOS: '+treinTotal+' eventos, '+treinPart+' participantes'+
        '. PROTOCOLOS: '+protsVenc+' vencidos, '+protsProx+' vencem em 60d'+
        '. PLANOS DE ACAO: '+planosAb+' abertos, '+planosCon+' concluidos no mes'+
        '. SAQ RESPOSTAS: '+saqN+' respostas de pesquisa de cultura no periodo'+
        (indDSM?'. INDICADORES: pac-dia='+( indDSM.paciente_dia_total||'nd')+' alcool_gel='+( indDSM.alcool_gel_ml||'nd')+'mL lpp_novos='+( indDSM.lpp_casos_novos||0)+' quedas='+( indDSM.quedas_total||0)+' erros_prescricao='+( indDSM.erros_prescricao||0)+' pav='+( indDSM.pav_casos_novos||0):'.')+
        (cfg.numero_portaria_nsp?'. PORTARIA NSP: '+cfg.numero_portaria_nsp:'')+
        (cfg.data_atualizacao_psp?'. PSP atualizado em: '+cfg.data_atualizacao_psp:'')+
        '. USE siglas tecnicas (SNE,LPP,AVP,CCIH,RCA,PSP,NIP,PAV,IPCS,ITU,CVD,CVC).'+
        ' 6 paragrafos: 1)Panorama geral notificacoes 2)Analise setorial e subtipos 3)Cultura seguranca e treinamentos 4)Indicadores assistenciais 5)Protocolos e planos de acao 6)Recomendacoes e pontos de atencao NSP para o proximo mes.';
      const resp=await fetch(workerUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:prompt}]})});
      const r=await resp.json();
      const txt=r.choices?.[0]?.message?.content||r.content?.[0]?.text||'Erro ao gerar';
      setNarrativaIA(txt);
      showToast('Narrativa IA gerada!','success');
    }catch(err){showToast('Erro IA: '+err.message,'error');}
    setLoadingIA(false);
  };

  const imprimir=()=>{
    const el=document.getElementById('relatorio-pdf');
    if(!el)return;
    const w=window.open('','_blank');
    w.document.write("<html><head><title>Relatório NSP</title><style>body{font-family:Arial,sans-serif;padding:24px;color:#1a1a1a;font-size:12px}h1{font-size:18px;color:#c8102e}h2{font-size:14px;border-bottom:2px solid #c8102e;padding-bottom:4px;margin:20px 0 10px}table{width:100%;border-collapse:collapse;margin-bottom:16px}th,td{border:1px solid #ddd;padding:6px 10px;text-align:left}th{background:#f5f5f5;font-weight:700}.badge-sp{color:#c8102e;font-weight:700}.badge-ccih{color:#d97706}.badge-adm{color:#2563eb}.ok{color:#059669;font-weight:700}.alerta{color:#c8102e;font-weight:700}@media print{button{display:none}}</style></head><body>"+el.innerHTML+"<br/><br/><small style=\"color:#999\">Gerado por NotificaAI em "+new Date().toLocaleString('pt-BR')+"</small></body></html>")
    w.document.close();w.print();
  };

  return(<div style={{position:'fixed',inset:0,background:'#000b',zIndex:200,display:'flex',alignItems:'flex-end'}}>
    <div style={{background:C.surface,borderRadius:'20px 20px 0 0',padding:'20px 16px 32px',width:'100%',maxWidth:480,margin:'0 auto',border:'1px solid '+C.border,maxHeight:'94vh',overflowY:'auto'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>
        <div style={{fontSize:15,fontWeight:800,color:C.text}}>Doc Relatório Mensal NSP</div>
        <button onClick={onClose} style={{background:'none',border:'none',color:C.muted,cursor:'pointer',fontSize:20}}>X</button>
      </div>

      {!dados&&(<div style={{display:'flex',flexDirection:'column',gap:10}}>
        <div>
          <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Mês de referência</label>

        <div>

        </div>
        <div>
          <label style={{fontSize:11,color:C.muted,display:'block',marginBottom:4}}>Diretoria / Chefia (destinatário)</label>

          {loading?'Aguarde Gerando...':'documento Gerar Relatório'}
        </button>
      </div>)}

      {dados&&(<div>
        <div style={{display:'flex',gap:8,marginBottom:14}}>
        <button onClick={gerarNarrativaIA} disabled={loadingIA} style={{flex:1,background:loadingIA?C.border:'#7C3AED',border:'none',borderRadius:10,padding:'11px',color:'#fff',fontWeight:700,fontSize:12,cursor:'pointer'}}>{loadingIA?'Gerando...':String.fromCodePoint(129504)+' Narrativa IA'}</button>
          <button onClick={imprimir} style={{flex:1,background:C.blue,border:'none',borderRadius:10,padding:'11px',color:'#fff',fontWeight:800,fontSize:13,cursor:'pointer'}}> Imprimir / PDF</button>
          <button onClick={()=>setDados(null)} style={{flex:1,background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'11px',color:C.muted,fontWeight:700,fontSize:12,cursor:'pointer'}}>Voltar</button>
        </div>

        {/* Preview do relatório */}
        <div id="relatorio-pdf" style={{background:'white',color:'#1a1a1a',borderRadius:10,overflow:'hidden',fontSize:12,lineHeight:1.6}}>

            <div style={{fontSize:10,opacity:.8,marginBottom:4}}>MARINHA DO BRASIL · HOSPITAL NAVAL DE SALVADOR</div>
            <div style={{fontSize:18,fontWeight:700}}>Relatório Mensal - Núcleo de Segurança do Paciente</div>
            <div style={{fontSize:12,opacity:.9,marginTop:4}}>{MESES_PT[(dados.mesCorr.m-1)]} de {dados.mesCorr.a}</div>
          </div>
          <div style={{padding:'16px 20px'}}>
            {/* Identificação */}

              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <tbody>
                  <tr><td style={{padding:'3px 0',color:'#666',width:160}}>Período de referência:</td><td style={{fontWeight:700}}>{new Date(dados.inicio+'T12:00:00').toLocaleDateString('pt-BR')} a {new Date(dados.fim+'T12:00:00').toLocaleDateString('pt-BR')}</td></tr>
                  {gestor&&<tr><td style={{padding:'3px 0',color:'#666'}}>Elaborado por:</td><td style={{fontWeight:700}}>{gestor} - NSP {h.short_name}</td></tr>}
                  {diretoria&&<tr><td style={{padding:'3px 0',color:'#666'}}>Destinatário:</td><td style={{fontWeight:700}}>{diretoria}</td></tr>}
                  <tr><td style={{padding:'3px 0',color:'#666'}}>Data de emissão:</td><td style={{fontWeight:700}}>{new Date().toLocaleDateString('pt-BR')}</td></tr>
                </tbody>
              </table>
            </div>

            {/* 1. Sumário executivo */}

            <table style={{width:'100%',borderCollapse:'collapse',marginBottom:16}}>
              <thead><tr style={{background:'#f5f5f5'}}>{['Indicador','Total','%'].map(h=><th key={h} style={{border:'1px solid #ddd',padding:'6px 10px',textAlign:'left',fontSize:11}}>{h}</th>)}</tr></thead>
              <tbody>
                {[
                  ['Total de notificações',dados.total,'100%'],
                  ['Segurança do Paciente',dados.s.sp,dados.total?Math.round(dados.s.sp/dados.total*100)+'%':'-'],
                  ['Administrativa',dados.s.adm,dados.total?Math.round(dados.s.adm/dados.total*100)+'%':'-'],
                  ['Eventos sentinela',dados.s.sentinela,dados.total?Math.round(dados.s.sentinela/dados.total*100)+'%':'-'],
                  
                ].map(([l,v,p])=><tr key={l}><td style={{border:'1px solid #ddd',padding:'5px 10px'}}>{l}</td><td style={{border:'1px solid #ddd',padding:'5px 10px',fontWeight:700,textAlign:'center'}}>{v}</td><td style={{border:'1px solid #ddd',padding:'5px 10px',textAlign:'center',color:'#666'}}>{p}</td></tr>)}
              </tbody>
            </table>

            {/* 2. Distribuição setorial */}
            <h2 style={{fontSize:14,borderBottom:'2px solid #c8102e',paddingBottom:4,marginBottom:10,color:'#1a1a1a'}}>2. Distribuição por Setor</h2>
            <table style={{width:'100%',borderCollapse:'collapse',marginBottom:16}}>
              <thead><tr style={{background:'#f5f5f5'}}>{['Setor','Notificações'].map(h=><th key={h} style={{border:'1px solid #ddd',padding:'6px 10px',textAlign:'left',fontSize:11}}>{h}</th>)}</tr></thead>
              <tbody>
                {dados.s.sectorData.map(s=><tr key={s.setor}><td style={{border:'1px solid #ddd',padding:'5px 10px'}}>{s.setor}</td><td style={{border:'1px solid #ddd',padding:'5px 10px',fontWeight:700,textAlign:'center'}}>{s.eventos}</td></tr>)}
                {dados.s.sectorData.length===0&&<tr><td colSpan={2} style={{border:'1px solid #ddd',padding:'5px 10px',color:'#999',textAlign:'center'}}>Nenhum dado setorial</td></tr>}
              </tbody>
            </table>

            {/* 3. Tipos mais frequentes */}
            <h2 style={{fontSize:14,borderBottom:'2px solid #c8102e',paddingBottom:4,marginBottom:10,color:'#1a1a1a'}}>3. Tipos de Eventos Mais Frequentes</h2>
            <table style={{width:'100%',borderCollapse:'collapse',marginBottom:16}}>
              <thead><tr style={{background:'#f5f5f5'}}>{['Tipo','Freq.'].map(h=><th key={h} style={{border:'1px solid #ddd',padding:'6px 10px',textAlign:'left',fontSize:11}}>{h}</th>)}</tr></thead>
              <tbody>
                {dados.s.typeData.slice(0,6).map(t=><tr key={t.name}><td style={{border:'1px solid #ddd',padding:'5px 10px'}}>{t.name}</td><td style={{border:'1px solid #ddd',padding:'5px 10px',fontWeight:700,textAlign:'center'}}>{t.value}</td></tr>)}
                {dados.s.typeData.length===0&&<tr><td colSpan={2} style={{border:'1px solid #ddd',padding:'5px 10px',color:'#999',textAlign:'center'}}>Nenhum dado de tipo</td></tr>}
              </tbody>
            </table>

            {/* 4. Ações e encaminhamentos */}
            <h2 style={{fontSize:14,borderBottom:'2px solid #c8102e',paddingBottom:4,marginBottom:10,color:'#1a1a1a'}}>4. Ações e Encaminhamentos</h2>
            <table style={{width:'100%',borderCollapse:'collapse',marginBottom:16}}>
              <tbody>
                {[
                  ['Notificações com RCA concluído',dados.nots.filter(n=>n.rca_gerado).length],
                  ['Notificações com Notivisa enviado',dados.nots.filter(n=>n.notivisa_enviado).length],
                  ['Notificações pendentes de RCA',dados.nots.filter(n=>n.notification_type==='seguranca_paciente'&&!n.rca_gerado).length],
                  ['Notificações com status concluído',dados.nots.filter(n=>n.status==='concluido').length],
                ].map(([l,v])=><tr key={l}><td style={{border:'1px solid #ddd',padding:'5px 10px'}}>{l}</td><td style={{border:'1px solid #ddd',padding:'5px 10px',fontWeight:700,textAlign:'center'}}>{v}</td></tr>)}
              </tbody>
            </table>

            {/* 5. Narrativa IA */}
        {narrativaIA&&<div style={{marginBottom:16}}>
          <h2 style={{fontSize:14,borderBottom:'2px solid #c8102e',paddingBottom:4,marginBottom:10,color:'#1a1a1a'}}>5. Analise Narrativa</h2>
          <div style={{background:'#f9f9f9',borderRadius:6,padding:'12px 14px',fontSize:12,lineHeight:1.7,color:'#1a1a1a',whiteSpace:'pre-wrap'}}>{narrativaIA}</div>
          <div style={{fontSize:10,color:'#999',marginTop:6,textAlign:'right'}}>Gerado por IA - NotificaAI NSP</div>
        </div>}
        {/* 6. Assinaturas */}
            <h2 style={{fontSize:14,borderBottom:'2px solid #c8102e',paddingBottom:4,marginBottom:16,color:'#1a1a1a'}}>5. Assinaturas</h2>
            <div style={{display:'flex',gap:40,marginTop:32}}>
              <div style={{flex:1,borderTop:'1px solid #999',paddingTop:6,textAlign:'center'}}>
                <div style={{fontSize:11,color:'#666'}}>{gestor||'Coordenador NSP'}</div>
                <div style={{fontSize:10,color:'#999'}}>Núcleo de Segurança do Paciente</div>
              </div>
              <div style={{flex:1,borderTop:'1px solid #999',paddingTop:6,textAlign:'center'}}>
                <div style={{fontSize:11,color:'#666'}}>{diretoria||'Direção do Hospital'}</div>
                <div style={{fontSize:10,color:'#999'}}>{h.short_name}</div>
              </div>
            </div>
          </div>
        </div>
      </div>)}
    </div>
  </div>);
}

function NotificacoesView({sbUrl,sbKey,showToast,hospital,onMutate,filtroInicial,onClearFiltro}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const [notifications,setNotifications]=useState([]);
  const [loading,setLoading]=useState(false);
  const [filtroTipo,setFiltroTipo]=useState('todos');
  const [filtroSetor,setFiltroSetor]=useState('todos');
  const [filtroRCA,setFiltroRCA]=useState('todos');
  const [filtroNotivisa,setFiltroNotivisa]=useState('todos');
  const [filtroPeriodo,setFiltroPeriodo]=useState('');
  const [filtroGravidade,setFiltroGravidade]=useState(filtroInicial==='sentinela'?'Evento sentinela':'');
  const [filtroSemRCA,setFiltroSemRCA]=useState(filtroInicial==='semRCA');
  React.useEffect(()=>{if(filtroInicial&&onClearFiltro)onClearFiltro();},[]);
  const [pagina,setPagina]=useState(1);
  const POR_PAGINA=20;
  const [rcaTarget,setRcaTarget]=useState(null);
  const [notiVisaTarget,setNotiVisaTarget]=useState(null);
  const [riscoTarget,setRiscoTarget]=useState(null);
  const [planoTarget,setPlanoTarget]=useState(null);
  const [busca,setBusca]=useState('');
  const [detalhe,setDetalhe]=useState(null);
  const [deletando,setDeletando]=useState(null);
  const [editTarget,setEditTarget]=useState(null);
  const [editForm,setEditForm]=useState({});
  const [salvandoEdit,setSalvandoEdit]=useState(false);

  const load=async()=>{
    if(!sbUrl||!sbKey) return;
    setLoading(true);
    try{
      const data=await sbSelect(sbUrl,sbKey,'notifications',`hospital_id=eq.${h.id}&is_test=neq.true&order=created_at.desc&limit=2000&select=*`);
      setNotifications(data||[]);
    }catch{showToast('Erro ao carregar notificacoes','error');}
    setLoading(false);
  };

  const deletar=async(n)=>{
    if(!window.confirm('Confirma exclusao desta notificacao?')) return;
    setDeletando(n.id);
    try{
      await sbDelete(sbUrl,sbKey,'notifications','id=eq.'+n.id);
      setNotifications(prev=>prev.filter(x=>x.id!==n.id));
      setDetalhe(null);
      showToast('Notificacao excluida','success');if(onMutate)onMutate();
    }catch{showToast('Erro ao excluir','error');}
    setDeletando(null);
  };

  const salvarEdicao=async()=>{
    if(!editTarget) return;
    setSalvandoEdit(true);
    try{
      const patch={
        notification_type:editForm.notification_type,
        event_subtype:editForm.event_subtype||null,
        occurrence_subtype:null,
        sector:editForm.sector||editTarget.sector,
        gravidade:editForm.gravidade||editTarget.gravidade||null,
      };
      await sbPatch(sbUrl,sbKey,'notifications','id=eq.'+editTarget.id,{...patch,updated_at:new Date().toISOString()});
      if(patch.status){await sbAuditLog(sbUrl,sbKey,hospital?.id||DEFAULT_HOSPITAL.id,editTarget.id,'STATUS_ALTERADO','status',editTarget.status||'aberto',patch.status,profileMode||'gestor','gestor');}
      setNotifications(prev=>prev.map(x=>x.id===editTarget.id?{...x,...patch}:x));
      setEditTarget(null);
      setDetalhe(null);
      showToast('Notificacao atualizada!','success');if(onMutate)onMutate();
    }catch(err){console.error('[salvarEdicao] ERRO:',err);showToast('Erro: '+(err?.message||'falha ao salvar'),'error');}
    setSalvandoEdit(false);
  };

  const downloadNotivisa=(n)=>{
    const tag=getTag(n);
    const html='<!DOCTYPE html><html><head><meta charset=UTF-8><title>Notivisa</title>'
      +'<style>body{font-family:Arial,sans-serif;max-width:700px;margin:40px auto;color:#1a1a1a;}'
      +'h1{background:#c8102e;color:#fff;padding:14px;border-radius:6px;font-size:15px;margin-bottom:20px;}'
      +'h2{font-size:10px;color:#666;text-transform:uppercase;margin:12px 0 3px;font-weight:700;}'
      +'p{background:#f5f5f5;border-radius:4px;padding:8px;font-size:12px;margin:0 0 6px;line-height:1.5;}'
      +'.ft{background:#fff3cd;border:1px solid #ffc107;border-radius:6px;padding:10px;font-size:11px;color:#856404;margin-top:20px;}'
      +'</style></head><body>'
      +'<h1>Formulario Notivisa - DEMONSTRACAO<br><small style="font-size:11px;opacity:.8;">'+new Date().toLocaleString('pt-BR')+'</small></h1>'
      +'<h2>Tipo</h2><p>'+(tag.label||'-')+(n.event_subtype?' - '+n.event_subtype:'')+'</p>'
      +'<h2>Data / Turno</h2><p>'+(n.event_date?new Date(n.event_date+'T12:00:00').toLocaleDateString('pt-BR'):'-')+(n.shift?' - '+n.shift:'')+'</p>'
      +'<h2>Setor</h2><p>'+(n.sector||'-')+'</p>'
      +'<h2>Paciente</h2><p>'+(n.patient_age?n.patient_age+' anos':'')+(n.patient_sex?' - '+n.patient_sex:'')+'</p>'
      +(n.admission_reason?'<h2>NIP / Identificacao</h2><p>'+n.admission_reason+'</p>':'')
      +(n.event_subtype==='Perda de AVP'&&n.avp_motivo?'<h2>Motivo da perda do AVP</h2><p>'+n.avp_motivo+'</p>':'')
      +(n.patient_admission?'<h2>Data de Admissao</h2><p>'+new Date(n.patient_admission+'T12:00:00').toLocaleDateString('pt-BR')+'</p>':'')
      +'<h2>Descricao</h2><p>'+(n.description||'-')+'</p>'
      +'<h2>Medidas tomadas</h2><p>'+(n.measures_taken||'-')+'</p>'
      +'<h2>Desfecho</h2><p>'+(n.patient_outcome||'-')+'</p>'
      +'<h2>Evitavel</h2><p>'+(n.was_preventable===true?'Sim':n.was_preventable===false?'Nao':'Nao informado')+'</p>'
      +'<h2>Gravidade</h2><p>'+(n.gravidade||'-')+'</p>'
      +'<div class="ft">Guia de preenchimento. Acesse notivisa.anvisa.gov.br para envio oficial.</div>'
      +'</body></html>';
    const b=new Blob([html],{type:'text/html'});
    const u=URL.createObjectURL(b);
    const a=document.createElement('a');
    a.href=u;
    a.download='Notivisa_'+(n.sector||'DEMO')+'_'+(n.event_date||new Date().toISOString().slice(0,10))+'_'+((n.id||'').slice(0,8).toUpperCase())+'.html';
    a.click();
    URL.revokeObjectURL(u);
    showToast('Notivisa baixado!','success');
  };

  useEffect(()=>{load();},[sbUrl,sbKey]);

  const filtered=notifications.filter(n=>{
    if(filtroTipo!=='todos'&&n.notification_type!==filtroTipo) return false;
    if(filtroSetor!=='todos'&&n.sector!==filtroSetor) return false;
    if(filtroRCA==='sim'&&n.rca_gerado) return false;
    if(filtroRCA==='nao'&&!n.rca_gerado) return false;
    if(filtroGravidade&&n.gravidade!==filtroGravidade) return false;
    if(filtroSemRCA&&n.rca_gerado) return false;
    if(filtroNotivisa==='sim'&&n.notivisa_enviado) return false;
    if(filtroNotivisa==='nao'&&!n.notivisa_enviado) return false;
    if(filtroPeriodo){const d=new Date(n.event_date?n.event_date+'T12:00:00':n.created_at);const ds=d.toISOString().slice(0,7);if(ds!==filtroPeriodo)return false;}
    if(busca){const b=busca.toLowerCase();if(!n.description?.toLowerCase().includes(b)&&!getTitle(n).toLowerCase().includes(b)&&!n.event_subtype?.toLowerCase().includes(b)&&!n.sector?.toLowerCase().includes(b)&&!n.ai_summary?.toLowerCase().includes(b))return false;}
    return true;
  });

  const totalPags=Math.ceil(filtered.length/POR_PAGINA);
  const pagAtual=filtered.slice((pagina-1)*POR_PAGINA,pagina*POR_PAGINA);
  const setores=[...new Set(notifications.map(n=>n.sector).filter(Boolean))].sort();
  const statsSP=notifications.filter(n=>n.notification_type==='seguranca_paciente'&&n.is_test!==true).length;
  const statsAdm=notifications.filter(n=>n.notification_type==='administrativa'&&n.is_test!==true).length;
  const statsTotal=notifications.filter(n=>(n.notification_type==='seguranca_paciente'||n.notification_type==='ccih'||n.notification_type==='administrativa')&&n.is_test!==true).length;
  const statsSemRCA=notifications.filter(n=>n.notification_type==='seguranca_paciente'&&!n.rca_gerado&&n.is_test!==true).length;
  const statsSemNotivisa=notifications.filter(n=>n.notification_type==='seguranca_paciente'&&!n.notivisa_enviado&&n.is_test!==true).length;
  const sel={background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'7px 10px',color:C.text,fontSize:12,appearance:'none',cursor:'pointer'};

  return(<div style={{padding:'0 0 80px',maxWidth:900,margin:'0 auto'}}>
    {(filtroGravidade||filtroSemRCA)&&<div style={{background:C.yellow+'20',border:'1px solid '+C.yellow,borderRadius:8,padding:'8px 12px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <span style={{fontSize:12,color:C.yellow,fontWeight:700}}>{filtroGravidade?'Eventos Sentinela':'Sem Analise - RCA pendente'}</span>
      <button onClick={()=>{setFiltroGravidade('');setFiltroSemRCA(false);}} style={{fontSize:11,background:'none',border:'none',color:C.muted,cursor:'pointer'}}>Limpar filtro</button>
    </div>}
    {/* Modal de edicao */}
    {editTarget&&<div style={{position:'fixed',inset:0,background:'#000a',zIndex:300,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{background:C.surface,borderRadius:'20px 20px 0 0',padding:'20px 16px 32px',width:'100%',maxWidth:520,maxHeight:'80vh',overflowY:'auto'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div style={{fontSize:15,fontWeight:800,color:C.text}}>Corrigir notificacao</div>
          <button onClick={()=>setEditTarget(null)} style={{background:'none',border:'none',color:C.muted,fontSize:20,cursor:'pointer'}}>x</button>
        </div>
        <div style={{fontSize:11,color:C.muted,marginBottom:14}}>Notificacao: {editTarget.description?.slice(0,50)||'sem descricao'}</div>
        <label style={{fontSize:11,color:C.muted,fontWeight:700,display:'block',marginBottom:4}}>Tipo</label>
        <select value={editForm.notification_type||''} onChange={e=>setEditForm(f=>({...f,notification_type:e.target.value,event_subtype:''}))}
          style={{width:'100%',background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:12,marginBottom:12,appearance:'none'}}>
          <option value="seguranca_paciente">Seguranca do Paciente (SP)</option>
          <option value="administrativa">Administrativa</option>
          
        </select>
        <label style={{fontSize:11,color:C.muted,fontWeight:700,display:'block',marginBottom:4}}>Subtipo</label>
        <select value={editForm.event_subtype||''} onChange={e=>setEditForm(f=>({...f,event_subtype:e.target.value}))}
          style={{width:'100%',background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:12,marginBottom:12,appearance:'none'}}>
          <option value="">-- Selecione --</option>
          {editForm.event_subtype&&!['Queda','Lesao por pressao','Perda de AVP','Erro de medicacao','Falha na identificacao','Cirurgia segura','Perda de SNE','Near miss','Evento sentinela','Outro','Seguranca Organica','Acidente de trabalho','Acidente com perfurocortante','Laboratorio','Hotelaria / limpeza','Nutricao / dieta','Vestimenta / adornos','Farmacia','Infraestrutura / manutencao','Comunicacao / documentacao'].includes(editForm.event_subtype)&&<option value={editForm.event_subtype}>{editForm.event_subtype}</option>}
          {editForm.notification_type==='seguranca_paciente'&&[
            'Queda','Lesao por pressao','Perda de AVP','Erro de medicacao','Falha na identificacao',
            'Cirurgia segura','Perda de SNE','Near miss','Evento sentinela','Acidente com perfurocortante','Outro'
          ].map(v=><option key={v} value={v}>{v}</option>)}
          {editForm.notification_type==='administrativa'&&[
            'Seguranca Organica','Acidente de trabalho','Acidente com perfurocortante','Laboratorio','Hotelaria / limpeza','Nutricao / dieta',
            'Vestimenta / adornos','Farmacia','Infraestrutura / manutencao','Comunicacao / documentacao','Outro'
          ].map(v=><option key={v} value={v}>{v}</option>)}
          {editForm.notification_type==='ccih'&&[
            'ITU','PAV','ISC','IPCS','Outro foco'
          ].map(v=><option key={v} value={v}>{v}</option>)}
        </select>
        <label style={{fontSize:11,color:C.muted,fontWeight:700,display:'block',marginBottom:4}}>Setor</label>
        <select value={editForm.sector||''} onChange={e=>setEditForm(f=>({...f,sector:e.target.value}))}
          style={{width:'100%',background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:12,marginBottom:16,appearance:'none'}}>
          <option value="">-- Manter atual ({editTarget.sector||'nao informado'}) --</option>
          {h.sectors.map(sec=><option key={sec} value={sec}>{sec}</option>)}
        </select>
        <button onClick={salvarEdicao} disabled={salvandoEdit}
          style={{width:'100%',background:salvandoEdit?C.border:C.teal,border:'none',borderRadius:12,padding:'13px',color:'#fff',fontWeight:700,fontSize:14,cursor:'pointer'}}>
          {salvandoEdit?'Salvando...':'Salvar correcao'}
        </button>
      </div>
    </div>}
    <BackHeader title='Notificacoes' subtitle={filtered.length+' resultado(s) de '+notifications.length+' total'} right={<button onClick={load} style={{background:'none',border:'1px solid '+C.border,borderRadius:8,padding:'6px 12px',color:C.teal,fontSize:12,fontWeight:700,cursor:'pointer'}}>Atualizar</button>}/>
    <div style={{padding:'16px'}}>
    {rcaTarget&&<RCAPanel notification={rcaTarget} sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} onClose={()=>setRcaTarget(null)} onSaved={()=>{setRcaTarget(null);load();}}/>}
    {notiVisaTarget&&<NotiVisaPanel notification={notiVisaTarget} sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} onClose={()=>{setNotiVisaTarget(null);load();}}/>}
    {riscoTarget&&<MatrizRisco notification={riscoTarget} sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} onClose={()=>{setRiscoTarget(null);load();}}/>}
    {planoTarget&&<PlanoAcaoPanel notification={planoTarget} sbUrl={sbUrl} sbKey={sbKey} showToast={showToast} onClose={()=>{setPlanoTarget(null);load();}}/>}

    {/* Cards resumo */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:14}}>
      {[['Total',statsTotal,C.teal],['SP',statsSP,C.red],['ADM',statsAdm,C.purple],['Sem RCA',statsSemRCA,C.yellow],['Sem Notivisa',statsSemNotivisa,C.blue]].map(([l,v,c])=>(
        <div key={l} style={{background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'10px 8px',textAlign:'center'}}>
          <div style={{fontSize:20,fontWeight:900,color:c}}>{v}</div>
          <div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase',marginTop:2}}>{l}</div>
        </div>
      ))}
    </div>

    {/* Busca */}
    <input value={busca} onChange={e=>{setBusca(e.target.value);setPagina(1);}} placeholder="Buscar por descricao, tipo, setor..."
      style={{width:'100%',background:C.card,border:'1px solid '+C.border,borderRadius:10,padding:'9px 14px',color:C.text,fontSize:12,marginBottom:10,boxSizing:'border-box'}}/>

    {/* Filtros */}
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
      <select value={filtroTipo} onChange={e=>{setFiltroTipo(e.target.value);setPagina(1);}} style={{...sel}}>
        <option value="todos">Todos os tipos</option>
        <option value="seguranca_paciente">Seguranca do Paciente</option>
        <option value="administrativa">Administrativa</option>
      </select>
      <select value={filtroSetor} onChange={e=>{setFiltroSetor(e.target.value);setPagina(1);}} style={{...sel}}>
        <option value="todos">Todos os setores</option>
        {setores.map(s=><option key={s} value={s}>{s}</option>)}
      </select>
      <select value={filtroRCA} onChange={e=>{setFiltroRCA(e.target.value);setPagina(1);}} style={{...sel}}>
        <option value="todos">RCA: todos</option>
        <option value="nao">Sem RCA</option>
        <option value="sim">Com RCA</option>
      </select>
      <select value={filtroNotivisa} onChange={e=>{setFiltroNotivisa(e.target.value);setPagina(1);}} style={{...sel}}>
        <option value="todos">Notivisa: todos</option>
        <option value="nao">Sem Notivisa</option>
        <option value="sim">Com Notivisa</option>
      </select>
    </div>
    <div style={{display:'flex',gap:8,marginBottom:8,alignItems:'center'}}>
      <input value={busca} onChange={e=>{setBusca(e.target.value);setPagina(1);}} placeholder='Buscar...' style={{...sel,flex:1}}/>
      <input type='month' value={filtroPeriodo} onChange={e=>{setFiltroPeriodo(e.target.value);setPagina(1);}} style={{...sel,width:140}}/>
      {(filtroTipo!=='todos'||filtroSetor!=='todos'||filtroRCA!=='todos'||filtroNotivisa!=='todos'||filtroPeriodo||busca||filtroGravidade||filtroSemRCA)&&
        <button onClick={()=>{setFiltroTipo('todos');setFiltroSetor('todos');setFiltroRCA('todos');setFiltroNotivisa('todos');setFiltroPeriodo('');setBusca('');setFiltroGravidade('');setFiltroSemRCA(false);setPagina(1);}} style={{background:C.red+'22',border:'1px solid '+C.red+'44',borderRadius:8,padding:'7px 10px',color:C.red,fontSize:11,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap'}}>
          Limpar filtros
        </button>}
    </div>
    <div style={{fontSize:11,color:C.muted,marginBottom:8}}>{filtered.length} resultado(s)</div>

    {loading&&<div style={{textAlign:'center',padding:40}}><Dots/></div>}
    {!loading&&pagAtual.length===0&&<div style={{textAlign:'center',color:C.muted,padding:40,fontSize:13}}>Nenhuma notificacao encontrada</div>}

    {/* Grid agrupado por mes */}
    {!loading&&pagAtual.length>0&&(()=>{
      const grupos={};
      filtered.forEach(n=>{
        const d=new Date((n.event_date?n.event_date+'T12:00:00':n.created_at));
        const key=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
        const label=d.toLocaleString('pt-BR',{month:'long',year:'numeric'});
        if(!grupos[key]) grupos[key]={label,key,items:[]};
        grupos[key].items.push(n);
      });
      const keys=Object.keys(grupos).sort((a,b)=>b.localeCompare(a));
      if(keys.length===0) return null;
      return(<div>{keys.map(key=>{
        const g=grupos[key];
        const spCount=g.items.filter(n=>n.notification_type==='seguranca_paciente'||n.notification_type==='ccih').length;
        const admCount=g.items.filter(n=>n.notification_type==='administrativa').length;
        const semRCA=g.items.filter(n=>n.notification_type==='seguranca_paciente'&&!n.rca_gerado).length;
        return(<div key={key} style={{marginBottom:20}}>
          <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:8,padding:'7px 10px',background:C.surface,borderRadius:10,border:'1px solid '+C.border}}>
            <div style={{fontSize:13,fontWeight:800,color:C.text,textTransform:'capitalize',flex:1}}>{g.label}</div>
            <span style={{fontSize:11,background:C.teal+'20',color:C.teal,borderRadius:6,padding:'2px 7px',fontWeight:700}}>{g.items.length} total</span>
            {spCount>0&&<span style={{fontSize:11,background:C.red+'20',color:C.red,borderRadius:6,padding:'2px 7px',fontWeight:700}}>{spCount} SP</span>}
            {admCount>0&&<span style={{fontSize:11,background:C.blue+'20',color:C.blue,borderRadius:6,padding:'2px 7px',fontWeight:700}}>{admCount} Adm</span>}
            {semRCA>0&&<span style={{fontSize:11,background:C.yellow+'20',color:C.yellow,borderRadius:6,padding:'2px 7px',fontWeight:700}}>{semRCA} sem RCA</span>}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
            {g.items.map(n=>{
              const tag=getTag(n);
              const title=getTitle(n);
              const isSP=n.notification_type==='seguranca_paciente'||n.notification_type==='ccih';
              const isSentinela=n.gravidade==='Evento sentinela';
              const cor=isSentinela?C.red:tag.color;
              const d2=new Date((n.event_date?n.event_date+'T12:00:00':n.created_at));
              const ds=d2.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit'});
              const aberto=detalhe?.id===n.id;
              return(<div key={n.id}
                style={{background:C.card,border:'1px solid '+(isSentinela?C.red+'88':aberto?C.teal:C.border),borderRadius:10,padding:'10px',cursor:'pointer',position:'relative',overflow:'hidden',transition:'border-color .2s'}}
                onClick={ev=>{if(ev.target.tagName!=='BUTTON')setDetalhe(aberto?null:n);}}>
                <div style={{position:'absolute',left:0,top:0,bottom:0,width:3,background:cor,borderRadius:'10px 0 0 10px'}}/>
                <div style={{paddingLeft:8}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:4}}>
                    <span style={{fontSize:9,background:tag.color+'22',color:tag.color,borderRadius:4,padding:'2px 6px',fontWeight:700,textTransform:'uppercase'}}>{tag.label}</span>
                    <span style={{fontSize:9,color:C.muted}}>{ds}</span>
                  </div>
                  <div style={{fontSize:12,fontWeight:700,color:C.text,lineHeight:1.3,marginBottom:3,textTransform:'capitalize'}}>{title.length>34?title.slice(0,32)+'...':title}</div>
                  {n.sector&&<div style={{fontSize:10,color:C.muted,marginBottom:4,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{n.sector}</div>}
                  <div style={{display:'flex',gap:3,marginBottom:5,flexWrap:'wrap'}}>
                    {isSP&&<span style={{fontSize:9,borderRadius:3,padding:'1px 5px',background:n.rca_gerado?C.green+'20':C.yellow+'20',color:n.rca_gerado?C.green:C.yellow,fontWeight:700}} title={n.rca_gerado&&n.rca_autor?'RCA por: '+n.rca_autor+(n.rca_concluido_em?' em '+new Date(n.rca_concluido_em).toLocaleDateString('pt-BR'):''):'Sem analise de causa raiz'}>{n.rca_gerado?'RCA feito':'Sem RCA'}</span>}
                    {isSP&&<span style={{fontSize:9,borderRadius:3,padding:'1px 5px',background:n.notivisa_enviado?C.green+'20':C.muted+'20',color:n.notivisa_enviado?C.green:C.muted,fontWeight:700}}>{n.notivisa_enviado?'Notivisa OK':'Notivisa pendente'}</span>}
                    {isSentinela&&<span style={{fontSize:9,borderRadius:3,padding:'1px 5px',background:C.red+'20',color:C.red,fontWeight:700}}>SENTINELA</span>}
                  </div>
                  <div style={{display:'flex',gap:3,flexWrap:'wrap'}}>
                    {isSP&&!n.rca_gerado&&<button onClick={ev=>{ev.stopPropagation();setRcaTarget(n);}} style={{fontSize:9,padding:'4px 7px',background:C.blue+'20',color:C.blue,border:'none',borderRadius:5,cursor:'pointer',fontWeight:700}}>Fazer RCA</button>}
                    {isSP&&<button onClick={ev=>{ev.stopPropagation();downloadNotivisa(n);}} style={{fontSize:9,padding:'4px 7px',background:'#7C3AED20',color:'#7C3AED',border:'none',borderRadius:5,cursor:'pointer',fontWeight:700}}>Baixar Notivisa</button>}
                    {isSP&&<button onClick={ev=>{ev.stopPropagation();setRiscoTarget(n);}} style={{fontSize:9,padding:'4px 7px',background:C.yellow+'20',color:C.yellow,border:'none',borderRadius:5,cursor:'pointer',fontWeight:700}}>Avaliar risco</button>}
                  </div>
                  {aberto&&<div style={{marginTop:10,paddingTop:10,borderTop:'1px solid '+C.border}}>
                    {n.description&&<div style={{marginBottom:8}}><div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase',marginBottom:2}}>Relato</div><div style={{fontSize:11,color:C.text,lineHeight:1.5}}>{n.description}</div></div>}
                    {n.measures_taken&&<div style={{marginBottom:8}}><div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase',marginBottom:2}}>Medidas tomadas</div><div style={{fontSize:11,color:C.text,lineHeight:1.5}}>{n.measures_taken}</div></div>}
                    {n.patient_outcome&&<div style={{marginBottom:8}}><div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase',marginBottom:2}}>Desfecho</div><div style={{fontSize:11,color:C.text,lineHeight:1.5}}>{n.patient_outcome}</div></div>}
                    {n.ai_summary&&<div style={{marginBottom:8,background:C.teal+'10',borderRadius:6,padding:'6px 8px'}}><div style={{fontSize:9,color:C.teal,fontWeight:700,marginBottom:2}}>Resumo IA</div><div style={{fontSize:11,color:C.text,lineHeight:1.5}}>{n.ai_summary}</div></div>}
                    {n.admission_reason&&<div style={{marginBottom:8}}><div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase',marginBottom:2}}>Paciente / NIP</div><div style={{fontSize:11,color:C.text}}>{n.admission_reason}</div></div>}
                    {n.patient_admission&&<div style={{marginBottom:8}}><div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase',marginBottom:2}}>Data de admissao</div><div style={{fontSize:11,color:C.text}}>{new Date(n.patient_admission+'T12:00:00').toLocaleDateString('pt-BR')}</div></div>}
                    {n.event_subtype==='Perda de AVP'&&n.avp_motivo&&<div style={{marginBottom:8}}><div style={{fontSize:9,color:C.muted,fontWeight:700,textTransform:'uppercase',marginBottom:2}}>Motivo perda AVP</div><div style={{fontSize:11,color:C.text}}>{n.avp_motivo}</div></div>}
                    <div style={{display:'flex',gap:4,marginTop:8,flexWrap:'wrap'}}>
                      <button onClick={ev=>{ev.stopPropagation();setEditForm({notification_type:n.notification_type,event_subtype:n.event_subtype||n.occurrence_subtype||'',sector:n.sector||''});setEditTarget(n);}} style={{fontSize:10,padding:'5px 10px',background:C.orange+'20',color:C.orange,border:'1px solid '+C.orange+'33',borderRadius:6,cursor:'pointer',fontWeight:700}}>Corrigir tipo</button>
                  {isSP&&<button onClick={ev=>{ev.stopPropagation();setNotiVisaTarget(n);}} style={{fontSize:10,padding:'5px 10px',background:C.teal,color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontWeight:700}}>Formulario Notivisa completo</button>}
                      {isSP&&<button onClick={ev=>{ev.stopPropagation();setPlanoTarget(n);}} style={{fontSize:10,padding:'5px 10px',background:C.green+'20',color:C.green,border:'none',borderRadius:6,cursor:'pointer',fontWeight:700}}>Plano de Acao</button>}
                      <button onClick={ev=>{ev.stopPropagation();deletar(n);}} disabled={deletando===n.id} style={{fontSize:10,padding:'5px 10px',background:C.red+'15',color:C.red,border:'1px solid '+C.red+'33',borderRadius:6,cursor:'pointer',fontWeight:700,marginLeft:'auto'}}>{deletando===n.id?'Excluindo...':'Excluir'}</button>
                    </div>
                  </div>}
                </div>
              </div>);
            })}
          </div>
        </div>);
      })}</div>);
    })()}

    {/* Paginacao */}
    {totalPags>1&&<div style={{display:'flex',justifyContent:'center',gap:8,marginTop:16,flexWrap:'wrap'}}>
      <button onClick={()=>setPagina(p=>Math.max(1,p-1))} disabled={pagina===1} style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'7px 14px',color:pagina===1?C.muted:C.teal,fontSize:12,fontWeight:700,cursor:pagina===1?'default':'pointer'}}>Anterior</button>
      <span style={{padding:'7px 14px',fontSize:12,color:C.muted}}>{pagina}/{totalPags}</span>
      <button onClick={()=>setPagina(p=>Math.min(totalPags,p+1))} disabled={pagina===totalPags} style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'7px 14px',color:pagina===totalPags?C.muted:C.teal,fontSize:12,fontWeight:700,cursor:pagina===totalPags?'default':'pointer'}}>Proxima</button>
    </div>}
  </div>
  </div>);
}

const SUBNUCLEOS_HNSA=[
  {id:'comunicacao',label:'Comunicacao Efetiva',icon:String.fromCodePoint(128172),color:'#1D6FE8'},
  {id:'medicamentos',label:'Seguranca na Administracao de Medicamentos',icon:String.fromCodePoint(128138),color:'#8B5CF6'},
  {id:'identificacao',label:'Identificacao Correta',icon:String.fromCodePoint(128100),color:'#00C9B8'},
  {id:'queda',label:'Queda',icon:String.fromCodePoint(129405),color:'#F59E0B'},
  {id:'lpp',label:'LPP - Lesao por Pressao',icon:String.fromCodePoint(129657),color:'#EF4444'},
  {id:'cirurgia',label:'Cirurgia Segura',icon:String.fromCodePoint(9986),color:'#10B981'},
  {id:'ccih',label:'SCIH - Higienizacao das Maos e IRAS',icon:String.fromCodePoint(129440),color:'#06B6D4'},
];

function TreinamentosView({sbUrl,sbKey,showToast,hospital,profileMode,gestorMode,driveUrl,onSaveDrive}) {
  const h=hospital||DEFAULT_HOSPITAL;
  const [registros,setRegistros]=useState([]);
  const [loading,setLoading]=useState(false);
  const [showForm,setShowForm]=useState(false);
  const [saving,setSaving]=useState(false);
  const [subnucleoAtivo,setSubnucleoAtivo]=useState('todos');
  const [periodoFiltro,setPeriodoFiltro]=useState('semestre_atual');
  const [customDe,setCustomDe]=useState('');
  const [customAte,setCustomAte]=useState('');
  const [form,setForm]=useState({tipo:'treinamento',subnucleo:'comunicacao',protocolo:'',data:'',participantes:'',descricao:'',responsavel:'',link_gdrive:''});

  const canEdit=gestorMode||profileMode==='gestor'||profileMode==='membro_nsp';

  const load=async()=>{
    if(!sbUrl||!sbKey) return;
    setLoading(true);
    try{
      const data=await sbSelect(sbUrl,sbKey,'treinamentos_nsp','select=*&hospital_id=eq.'+h.id+'&order=data.desc');
      setRegistros(data||[]);
    }catch{setRegistros([]);}
    setLoading(false);
  };
  useEffect(()=>{load();},[sbUrl,sbKey]);

  const salvar=async()=>{
    if(!form.data||!form.subnucleo||!form.participantes){showToast('Preencha data, subnucleo e participantes','error');return;}
    setSaving(true);
    try{
      await sbInsert(sbUrl,sbKey,'treinamentos_nsp',{hospital_id:h.id,...form,participantes:Number(form.participantes),created_at:new Date().toISOString()});
      await load();setShowForm(false);
      setForm({tipo:'treinamento',subnucleo:'comunicacao',protocolo:'',data:'',participantes:'',descricao:'',responsavel:'',link_gdrive:''});
      showToast('Registro salvo!','success');
    }catch{showToast('Erro ao salvar. Execute o SQL de criacao da tabela.','error');}
    setSaving(false);
  };

  const filtered=subnucleoAtivo==='todos'?registros:registros.filter(r=>r.subnucleo===subnucleoAtivo);

  // Filtro de periodo: Semestre atual (DSM), Ano anterior (ANVISA), Ano atual, Personalizado
  const periodoRange=(()=>{
    const hoje=new Date();
    const ano=hoje.getFullYear();
    const semAtual=hoje.getMonth()<6?1:2;
    if(periodoFiltro==='semestre_atual'){
      return semAtual===1
        ?{de:`${ano}-01-01`,ate:`${ano}-06-30`,label:`1o Semestre ${ano}`}
        :{de:`${ano}-07-01`,ate:`${ano}-12-31`,label:`2o Semestre ${ano}`};
    }
    if(periodoFiltro==='ano_anterior') return{de:`${ano-1}-01-01`,ate:`${ano-1}-12-31`,label:`Ano ${ano-1} (ANVISA)`};
    if(periodoFiltro==='ano_atual') return{de:`${ano}-01-01`,ate:`${ano}-12-31`,label:`Ano ${ano}`};
    if(periodoFiltro==='custom') return{de:customDe,ate:customAte,label:'Periodo personalizado'};
    return{de:null,ate:null,label:'Todos os periodos'};
  })();

  const filteredPeriodo=periodoRange.de&&periodoRange.ate
    ? filtered.filter(r=>r.data&&r.data>=periodoRange.de&&r.data<=periodoRange.ate)
    : filtered;

  const reunioesNSP=filteredPeriodo.filter(r=>r.tipo==='reuniao_mensal'||r.tipo==='reuniao_extraordinaria');
  const totaisPorSub={};
  SUBNUCLEOS_HNSA.forEach(s=>{
    const recs=filteredPeriodo.filter(r=>r.subnucleo===s.id);
    totaisPorSub[s.id]={
      treinamentos:recs.filter(r=>r.tipo==='treinamento').length,
      reunioes:recs.filter(r=>r.tipo==='reuniao').length,
      participantes:recs.filter(r=>r.tipo==='treinamento').reduce((acc,r)=>acc+(r.participantes||0),0),
    };
  });

  const inp={background:C.surface,border:'1px solid '+C.border,borderRadius:8,padding:'9px 12px',color:C.text,fontSize:13,outline:'none',width:'100%',marginBottom:10};

  return(<div style={{padding:'0 0 80px',maxWidth:900,margin:'0 auto'}}>
    {/* Modal de edicao */}
    <BackHeader title='Treinamentos e Reunioes' subtitle={filteredPeriodo.length+' registro(s) — '+periodoRange.label} right={<button onClick={load} style={{background:C.card,border:'1px solid '+C.border,borderRadius:8,padding:'6px 12px',color:C.teal,fontSize:11,fontWeight:700,cursor:'pointer'}}>Atualizar</button>}/>
    <div style={{padding:'16px'}}>
      {/* Filtro de periodo */}
      <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'10px 14px',marginBottom:10}}>
        <div style={{fontSize:10,fontWeight:700,color:C.muted,marginBottom:6,textTransform:'uppercase',letterSpacing:'0.05em'}}>Periodo de visualizacao</div>
        <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
          {[
            {id:'semestre_atual',label:'Semestre atual'},
            {id:'ano_anterior',label:'Ano anterior (ANVISA)'},
            {id:'ano_atual',label:'Ano atual'},
            {id:'todos',label:'Todos'},
            {id:'custom',label:'Personalizado'},
          ].map(p=>(<button key={p.id} onClick={()=>setPeriodoFiltro(p.id)}
            style={{padding:'6px 12px',borderRadius:8,border:'1px solid '+(periodoFiltro===p.id?C.teal:C.border),
              background:periodoFiltro===p.id?C.teal+'22':'transparent',
              color:periodoFiltro===p.id?C.teal:C.muted,fontSize:11,fontWeight:periodoFiltro===p.id?700:500,cursor:'pointer'}}>
            {p.label}
          </button>))}
        </div>
        {periodoFiltro==='custom'&&<div style={{display:'flex',gap:8,marginTop:8}}>
          <input type='date' value={customDe} onChange={e=>setCustomDe(e.target.value)} style={{flex:1,background:C.surface,border:'1px solid '+C.border,borderRadius:6,padding:'6px 8px',color:C.text,fontSize:11,outline:'none'}}/>
          <input type='date' value={customAte} onChange={e=>setCustomAte(e.target.value)} style={{flex:1,background:C.surface,border:'1px solid '+C.border,borderRadius:6,padding:'6px 8px',color:C.text,fontSize:11,outline:'none'}}/>
        </div>}
      </div>

      <div style={{background:C.card,border:'1px solid '+C.border,borderRadius:12,padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',gap:10}}>
        <span style={{fontSize:18}}>{String.fromCodePoint(128194)}</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontSize:11,fontWeight:700,color:C.text}}>Repositorio NSP (Google Drive)</div>
          {driveUrl?<a href={driveUrl} target='_blank' rel='noreferrer' style={{fontSize:11,color:C.teal,fontWeight:700}}>{driveUrl.length>45?driveUrl.slice(0,45)+'...':driveUrl}</a>:<div style={{fontSize:11,color:C.muted,fontStyle:'italic'}}>Nenhum link configurado</div>}

      </div>
    {canEdit&&<div style={{textAlign:'right',marginBottom:10}}><button onClick={()=>setShowForm(!showForm)} style={{background:C.teal,border:'none',borderRadius:10,padding:'8px 14px',color:'#06101F',fontWeight:800,fontSize:12,cursor:'pointer'}}>+ Novo</button></div>}

      {/* Reunioes NSP */}
      <div style={{background:C.card,border:'1px solid '+C.teal+'44',borderRadius:12,padding:'12px 14px',marginBottom:4}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
          <div>
            <div style={{fontSize:12,fontWeight:800,color:C.teal}}>Reunioes do NSP (Nucleo Pleno)</div>
